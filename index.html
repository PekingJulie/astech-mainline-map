ll=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"330\" y=\"264\" text-anchor=\"middle\" fill=\"#27406e\">六氟化钨 WF₆（电子特气）</text>\n    <rect x=\"500\" y=\"248\" width=\"220\" height=\"24\" rx=\"5\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n    <text x=\"610\" y=\"264\" text-anchor=\"middle\" fill=\"#4a2e9e\">芯片钨塞互连 → 主线1 半导体</text>\n  </g>\n\n  <!-- 行5 钽 Ta -->\n  <g font-size=\"10.5\">\n    <rect x=\"20\" y=\"300\" width=\"120\" height=\"48\" rx=\"8\" fill=\"#eef2f8\" stroke=\"#94a3b8\"/>\n    <text x=\"80\" y=\"320\" text-anchor=\"middle\" font-weight=\"700\" font-size=\"12\" fill=\"#475569\">钽 Ta</text>\n    <text x=\"80\" y=\"336\" text-anchor=\"middle\" font-size=\"9\" fill=\"#64748b\">中国加工端主导</text>\n    <rect x=\"245\" y=\"312\" width=\"170\" height=\"24\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"330\" y=\"328\" text-anchor=\"middle\" fill=\"#27406e\">钽粉 / 钽丝 → 钽电容</text>\n    <rect x=\"500\" y=\"312\" width=\"220\" height=\"24\" rx=\"5\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n    <text x=\"610\" y=\"328\" text-anchor=\"middle\" fill=\"#4a2e9e\">钽电容 → 主线7 被动元件</text>\n  </g>\n\n  <!-- 行6 钴 Co -->\n  <g font-size=\"10.5\">\n    <rect x=\"20\" y=\"364\" width=\"120\" height=\"48\" rx=\"8\" fill=\"#eef2f8\" stroke=\"#94a3b8\"/>\n    <text x=\"80\" y=\"384\" text-anchor=\"middle\" font-weight=\"700\" font-size=\"12\" fill=\"#475569\">钴 Co</text>\n    <text x=\"80\" y=\"400\" text-anchor=\"middle\" font-size=\"9\" fill=\"#64748b\">冶炼/前驱体约 68%</text>\n    <rect x=\"245\" y=\"376\" width=\"170\" height=\"24\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"330\" y=\"392\" text-anchor=\"middle\" fill=\"#27406e\">前驱体 → 锂电正极</text>\n    <rect x=\"500\" y=\"376\" width=\"220\" height=\"24\" rx=\"5\" fill=\"#eef9f6\" stroke=\"#0f8a7e\"/>\n    <text x=\"610\" y=\"392\" text-anchor=\"middle\" fill=\"#0f6a5e\">锂电池正极 → 储能/电动</text>\n  </g>\n\n  <!-- 行7 SiC -->\n  <g font-size=\"10.5\">\n    <rect x=\"20\" y=\"428\" width=\"120\" height=\"48\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"80\" y=\"448\" text-anchor=\"middle\" font-weight=\"700\" font-size=\"12\" fill=\"#1f5fd6\">SiC 粉</text>\n    <text x=\"80\" y=\"464\" text-anchor=\"middle\" font-size=\"9\" fill=\"#27406e\">高纯碳化硅粉</text>\n    <rect x=\"245\" y=\"440\" width=\"170\" height=\"24\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"330\" y=\"456\" text-anchor=\"middle\" fill=\"#27406e\">SiC 导电衬底</text>\n    <rect x=\"500\" y=\"440\" width=\"220\" height=\"24\" rx=\"5\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n    <text x=\"610\" y=\"456\" text-anchor=\"middle\" fill=\"#4a2e9e\">SiC 功率器件 → 主线5 功率</text>\n  </g>\n\n  <!-- 连线 矿→材料 -->\n  <g stroke=\"#94a3b8\" stroke-width=\"1.5\">\n    <line x1=\"140\" y1=\"58\" x2=\"243\" y2=\"48\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"70\" x2=\"243\" y2=\"78\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"125\" x2=\"243\" y2=\"115\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"138\" x2=\"243\" y2=\"141\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"190\" x2=\"243\" y2=\"179\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"203\" x2=\"243\" y2=\"205\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"260\" x2=\"243\" y2=\"260\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"324\" x2=\"243\" y2=\"324\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"388\" x2=\"243\" y2=\"388\" marker-end=\"url(#m12)\"/>\n    <line x1=\"140\" y1=\"452\" x2=\"243\" y2=\"452\" marker-end=\"url(#m12)\"/>\n  </g>\n  <!-- 连线 材料→器件/主线 -->\n  <g stroke=\"#94a3b8\" stroke-width=\"1.5\">\n    <line x1=\"415\" y1=\"48\" x2=\"498\" y2=\"48\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"78\" x2=\"498\" y2=\"78\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"115\" x2=\"498\" y2=\"125\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"141\" x2=\"498\" y2=\"131\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"179\" x2=\"498\" y2=\"190\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"205\" x2=\"498\" y2=\"194\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"260\" x2=\"498\" y2=\"260\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"324\" x2=\"498\" y2=\"324\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"388\" x2=\"498\" y2=\"388\" marker-end=\"url(#m12)\"/>\n    <line x1=\"415\" y1=\"452\" x2=\"498\" y2=\"452\" marker-end=\"url(#m12)\"/>\n  </g>\n\n  <!-- 国产龙头标注栏 -->\n  <line x1=\"12\" y1=\"492\" x2=\"728\" y2=\"492\" stroke=\"#e4e7ec\"/>\n  <text x=\"20\" y=\"510\" font-size=\"11\" font-weight=\"700\" fill=\"#1f5fd6\">国产龙头（点击查看详情）</text>\n  <foreignObject x=\"18\" y=\"516\" width=\"704\" height=\"42\">\n    <div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"font-size:10.5px;line-height:1.7;color:#27406e\">\n      镓 <span class=\"tk\" onclick=\"openDetail('000060','中金岭南','A股')\">中金岭南</span> · <span class=\"tk\" onclick=\"openDetail('000933','神火股份','A股')\">神火股份</span> &nbsp;|&nbsp;\n      锗 <span class=\"tk\" onclick=\"openDetail('600497','驰宏锌锗','A股')\">驰宏锌锗</span> · <span class=\"tk\" onclick=\"openDetail('002428','云南锗业','A股')\">云南锗业</span> &nbsp;|&nbsp;\n      铟 <span class=\"tk\" onclick=\"openDetail('002428','云南锗业','A股')\">云南锗业</span> · <span class=\"tk\" onclick=\"openDetail('600531','豫光金铅','A股')\">豫光金铅</span> &nbsp;|&nbsp;\n      钨 <span class=\"tk\" onclick=\"openDetail('600549','厦门钨业','A股')\">厦门钨业</span> · <span class=\"tk\" onclick=\"openDetail('000657','中钨高新','A股')\">中钨高新</span> · <span class=\"tk\" onclick=\"openDetail('002378','章源钨业','A股')\">章源钨业</span><br/>\n      钽 <span class=\"tk\" onclick=\"openDetail('000962','东方钽业','A股')\">东方钽业</span> &nbsp;|&nbsp;\n      钴 <span class=\"tk\" onclick=\"openDetail('603799','华友钴业','A股')\">华友钴业</span> · <span class=\"tk\" onclick=\"openDetail('603993','洛阳钼业','A股')\">洛阳钼业</span> &nbsp;|&nbsp;\n      SiC <span class=\"tk\" onclick=\"openDetail('688234','天岳先进','A股')\">天岳先进</span> · <span class=\"tk\" onclick=\"openDetail('300316','晶盛机电','A股')\">晶盛机电</span>\n    </div>\n  </foreignObject>\n</svg>\n</div>\n\n<h3>三、定价权 + 出口管制：弹性从何而来</h3>\n<p>普通大宗商品价格由全球供需决定，谁也卡不住别人。但这几种矿不一样——<b>中国同时握着份额和管制权</b>，于是它们的价格逻辑被改写：从 2023 年 8 月起，<b>镓、锗已实施出口许可证管理</b>，2024 年起又对锑、超硬材料等加码。这是<b>双向战略武器</b>：对内是反制美国半导体封锁的\"反制牌\"，对外则直接收紧供给。供给一旦刚性（伴生矿无法快速扩产）叠加管制，<b>价格弹性极大</b>——这正是历史上稀土行情的剧本。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 150\" width=\"100%\">\n  <defs><marker id=\"mt12\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#d23f3f\"/></marker></defs>\n  <line x1=\"40\" y1=\"100\" x2=\"700\" y2=\"100\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#mt12)\"/>\n  <g text-anchor=\"middle\" font-size=\"10.5\">\n    <circle cx=\"120\" cy=\"100\" r=\"5\" fill=\"#d23f3f\"/>\n    <text x=\"120\" y=\"62\" font-weight=\"700\" fill=\"#b3261e\" font-size=\"11\">2023.08</text>\n    <text x=\"120\" y=\"78\" fill=\"#7a2020\">镓 / 锗</text>\n    <text x=\"120\" y=\"124\" fill=\"#64748b\" font-size=\"9.5\">实施出口许可证</text>\n\n    <circle cx=\"320\" cy=\"100\" r=\"5\" fill=\"#d23f3f\"/>\n    <text x=\"320\" y=\"62\" font-weight=\"700\" fill=\"#b3261e\" font-size=\"11\">2024.09</text>\n    <text x=\"320\" y=\"78\" fill=\"#7a2020\">锑 / 超硬材料</text>\n    <text x=\"320\" y=\"124\" fill=\"#64748b\" font-size=\"9.5\">管制名单扩围</text>\n\n    <circle cx=\"520\" cy=\"100\" r=\"5\" fill=\"#d23f3f\"/>\n    <text x=\"520\" y=\"62\" font-weight=\"700\" fill=\"#b3261e\" font-size=\"11\">2024.12</text>\n    <text x=\"520\" y=\"78\" fill=\"#7a2020\">镓锗对美收紧</text>\n    <text x=\"520\" y=\"124\" fill=\"#64748b\" font-size=\"9.5\">禁止对美出口</text>\n\n    <circle cx=\"660\" cy=\"100\" r=\"5\" fill=\"#6a4bbf\"/>\n    <text x=\"660\" y=\"62\" font-weight=\"700\" fill=\"#4a2e9e\" font-size=\"11\">2025→</text>\n    <text x=\"660\" y=\"78\" fill=\"#4a2e9e\">价格重估</text>\n    <text x=\"660\" y=\"124\" fill=\"#64748b\" font-size=\"9.5\">战略资产化</text>\n  </g>\n  <text x=\"40\" y=\"142\" font-size=\"10\" fill=\"#5b6577\">管制持续加码 → 供给刚性放大价格弹性 → 从\"周期大宗\"重估为\"科技战略资产\"（对标 2020 锂矿 / 历史稀土）</text>\n</svg>\n</div>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">卡点 / 管制端（红）</div>镓、锗、钨份额高且已纳入管制，深加工（WF₆ 电子级、高端 InP/GaAs 衬底）仍有日欧外资环节未完全国产。<br><span class=\"pc-s\">管制是矛也是盾：反制筹码 + 供给收紧双重作用</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">投资逻辑（蓝）</div>价值量集中在<b>钨、钽、钴、锗</b>四类（约 75% 利润池）；镓、铟管控后<b>价格弹性最大</b>。看两条线：上游资源量（份额+储量）、中游深加工国产替代（电子级提纯）。<br><span class=\"pc-s\">资源属性 + 科技属性双击，是本线的核心张力</span></div>\n</div>\n\n</div>\n"},{"t":"一、算力矿产 / 关键战略矿产","k":"table","note":"价值量集中在钨、钽、钴、锗四类约 75% 利润池；镓、铟政策管控后价格弹性极大。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["镓（Ga）","Recylex（德）","中金岭南、神火股份","000060、000933","全球份额约 80%，铝土矿伴生提取，已实施出口许可"],["锗（Ge）","Umicore（比）/ Ucore Rare Metals","驰宏锌锗、云南锗业","600497、002428","全球份额约 60%，锌矿伴生，深加工仍有日欧竞争"],["铟（In）","Indium Corp（美）/ JX金属（日）","云南锗业、豫光金铅、柳州华锡有色","002428、600531、未上市","全球份额约 55-60%，ITO 靶材国产化约 60%"],["钨（W）","Global Tungsten & Powders（美）/ H.C. Starck（德）","厦门钨业、中钨高新、章源钨业","600549、000657、002378","全球份额约 80-85%，WF₆ 电子级仍依赖外资"],["钽（Ta）","Global Advanced Metals（美）/ H.C. Starck（德）","东方钽业","000962","储量集中刚果/澳洲，中国加工端主导，全球前 5"],["钴（Co）","Umicore（比）/ Glencore（瑞士）","华友钴业、洛阳钼业","603799、603993","刚果矿+中国加工，冶炼/前驱体国产约 68%"],["SiC 原料粉","Wolfspeed (WOLF) / II-VI / Rohm（日）","天岳先进、晶盛机电","688234、300316","高纯碳化硅粉，6 英寸导电衬底良率攻关中"]]},{"t":"二、稀土·特种陶瓷氧化物（出口管制驱动）","k":"group","note":"稀土管制→陶瓷氧化物涨价→利润上移的核心承接层。优选高端（爱迪特56%/国瓷37%毛利），剔除低端大宗（东方锆业/凯盛~18%）与亏损（黄河旋风）。市值待 push2 网络复核。","children":[{"t":"2.1 氧化钇 Y₂O₃（氧化锆唯一稳定剂，无替代）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["氧化钇","日本东曹 Tosoh / 第一稀元素 DKKK","国瓷材料、三祥新材","300285、603663","China 占全球93%产能；2026 对日出口管制，海外价暴涨逾百倍"]]},{"t":"2.2 氧化锆 / 纳米氧化锆","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["氧化锆 / 纳米氧化锆","东曹 / 圣戈班 / DKKK","国瓷材料、三祥新材、东方锆业、凯盛科技","300285、603663、002167、600552","氧氯化锆涨30%+；东曹断供已实锤（爱迪特已收通知）"]]},{"t":"2.3 YSZ 钇稳定氧化锆（3/5/8YSZ）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["YSZ 高端粉体","东曹 / 圣戈班 ZirPro","国瓷材料、爱迪特","300285、301580","下游 SOFC/固态电池/MLCC/核能；高端粉体 50-150 美元/kg"]]},{"t":"2.4 氧化镝（MLCC 高容添加剂）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["氧化镝","信越 / 越南稀土","华宏科技","002645","超高容 MLCC 添加2-3%；占氧化镝需求15%→27年30%，供给仅3000吨"]]},{"t":"2.5 氧化铪 HfO₂（存储 high-k 栅介质）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["氧化铪","海外供应受限","三祥新材","603663","存储芯片核心材料（high-k），海外供应受限、扩产周期长；纪要『三祥股份』即三祥新材（已确认）"]]},{"t":"2.6 人造金刚石（3D 堆叠终极散热）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["人造金刚石散热衬底","海外早期","力量钻石、四方达、黄河旋风","301071、300179、600172","热导率5×铜，陈立武押注；🟡黄河旋风2026Q1已扭亏(营收+24%/净利+42%、良率85%)回补，培育钻石周期+题材属性强"]]}]},{"t":"三、氦气（半导体刚需稀缺气体 · 供应危机驱动）","k":"group","note":"氦气是晶圆制造/光刻冷却/检漏不可替代的刚需，无法人工合成，中国95%依赖进口。俄出口管制至2027底+卡塔尔停产→2026年4月单日涨近15%，国产替代+涨价双逻辑。注：氦气多为价格/保供驱动，价格回落是主要风险。","children":[{"t":"3.1 国产提氦（LNG-BOG 自主气源）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["LNG-BOG 提氦","美 / 卡塔尔 / 俄垄断","九丰能源（独家保供海南商发）","605090","🔴 产能150万方/年自主可控；LNG主业拖累，2026Q1净利-14%"],["内资最大氦气供应","林德 / 空气化工","广钢气体","688548","🟢 内资氦气份额第一；2026Q1净利+63%"],["半导体级 6N 超高纯氦","—","华特气体","688268","🔴 过ASML认证、直供中芯/台积电；Q1净利-24%、股价周-18%"]]},{"t":"3.2 提氦 / 深冷设备（卖铲人）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["氦罐 / 提氦装备","林德 / 法液空","杭氧股份（氦罐国产化首家）","002430","🟢 氦气全产业链；2026Q1净利+17%"],["深冷提氦核心设备","—","中泰股份","300435","🔴 自研甲烷-氦联产工艺；Q1营收-21%/净利-58%"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 全球市场规模(2025E) | 毛利率 | 占链条总价值% | 代表龙头 |\n|------|-----------------|--------|------------|---------|\n| 镓 原矿/精制 | ~6亿美元 | 35-45% | 8% | 中金岭南 000060 |\n| 锗 精制/靶材 | ~12亿美元 | 40-55% | 18% | 驰宏锌锗 600497、云南锗业 002428 |\n| 铟 精制/ITO靶材 | ~8亿美元 | 30-40% | 10% | 云南锗业 002428 |\n| 钨 APT/钨粉 | ~25亿美元 | 25-35% | 22% | 厦门钨业 600549 |\n| 钽 精炼/电容 | ~18亿美元 | 40-50% | 20% | 东方钽业 000962 |\n| 钴 冶炼/前驱体 | ~30亿美元 | 15-25% | 15% | 华友钴业 603799 |\n| SiC粉/衬底 | ~8亿美元 | 50-65% | 7% | 天岳先进 688234 |\n\n> 价值量集中在**钨、钽、钴、锗**四类，合计约75%链条利润池；镓和铟价格弹性极大（政策管控后价格可瞬间3-5倍）。\n\n---"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023年 | 2025E | 2027目标 | 主要卡点 |\n|-------|--------|-------|---------|---------|\n| 镓 原矿供应全球占比 | ~80% | ~82% | 维持主导 | 中国已实施出口许可，非市场卡点 |\n| 锗 精制全球占比 | ~60% | ~63% | 维持主导 | 深加工（靶材级）仍有日欧竞争 |\n| 铟 ITO靶材国产化 | ~55% | ~60% | 75% | 高纯度铟（5N+）冶炼技术 |\n| 钨 APT全球占比 | ~82% | ~83% | 维持主导 | WF₆电子级纯度（7N+）仍依赖外资 |\n| 钽 电容级粉末 | ~30% | ~40% | 55% | 刚果矿权控制，粉体粒径均一性 |\n| 钴 冶炼/前驱体 | ~65% | ~68% | 75% | 矿山权益仍依赖刚果 DRC |\n| SiC 导电衬底 | ~15% | ~25% | 45% | 4英寸良率尚可，6英寸良率<60% |\n\n---"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 中国镓锗出口管制升级为\"许可证+配额\"双轨制**\n2023年8月起实施的出口许可证制度预计2025年叠加配额限制，历史对标：中国2010年稀土限额导致价格飙升10倍。镓、锗直接受益于价格重估。**受益标的**：中金岭南（000060）、驰宏锌锗（600497）、云南锗业（002428）。\n\n**2. 美国对华半导体出口管制倒逼 WF₆ 国产化加速**\n电子级六氟化钨（WF₆）是芯片钨互连工艺必需品，全球供应集中于三菱化学、阿科玛。大基金三期拨款支持国内华特气体、雅克科技加速 7N+ 纯度突破，预计2025年底实现部分批量替代。**受益标的**：厦门钨业（600549，原料端）、华特气体（688268，WF₆加工端）。\n\n**3. 新能源汽车SiC渗透率加速带动上游粉体扩产**\n主驱逆变器SiC化率2024年约25%，2025E约38%，2027目标60%+。天岳先进6英寸导电衬底月产能从2024年底4万片扩至2025年末8万片。**受益标的**：天岳先进（688234）、晶盛机电（300316，SiC长晶炉）。\n\n**4. 刚果 DRC 地缘动荡推高钴价反弹**\n2024年M23武装冲突影响东部矿区物流，钴价从低点$24/kg反弹至$32/kg。若冲突升级至Lualaba省（Kamoa-Kakula矿区），洛阳钼业股价弹性最大。**受益标的**：华友钴业（603799）、洛阳钼业（603993）。\n\n**5. \"算力金属\"叙事重估——从大宗商品到科技战略资产**\n随 AI 算力需求爆发，Ga/Ge/In/W 脱离传统大宗定价逻辑，被纳入\"科技战略资产\"重估框架，类比2020-2021年锂矿行情。机构资金增配逻辑从基本面驱动切换为政策+叙事双轮驱动。**受益标的**：板块整体，个股弹性：中金岭南（000060）＞驰宏锌锗（600497）＞厦门钨业（600549）。\n\n---"},{"t":"附 · 地缘政治风险","k":"md","md":"**① 美国反制：推动盟友矿产多元化供应**\n美国《关键矿产战略》推动日本、澳洲、加拿大建立镓锗替代来源（Recylex德国、Ucore加拿大），若替代供应成规模（预计3-5年），中国矿产武器化效果递减。\n\n**② 刚果 DRC 政治风险**\n钴、钽矿高度集中刚果，该国政治不稳定性（M23武装、政府征收风险）是系统性风险；洛阳钼业、华友钴业在当地均有巨额资本投入。\n\n**③ 中国出口管制政策执行边界不清**\n出口许可证审批效率低、自由裁量空间大，可能导致下游客户（日韩芯片厂）囤货，短期价格剧烈波动后需求反转，矿产股估值波动率极高。\n\n**④ 美国对盟国施压，限制稀矿再出口至中国**\n镓锗部分来源于铝厂/锌厂废料，部分废料来源于美国、日本；若美国施压日本禁止废料出口中国，影响锗精制产能约10-15%。\n\n---"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 | 2026 | 2027-2028 |\n|---------|------|------|-----------|\n| 镓 Ga 应用扩张 | GaN on SiC 占5G PA市场70% | GaN on Diamond 研发突破 | 氮化镓功率器件全面替代Si MOSFET（部分领域） |\n| 锗 Ge 应用扩张 | 光纤用量随AI数据中心建设放量 | 锗基量子点太阳能电池中试 | Ge薄膜晶体管用于柔性显示（研究阶段）|\n| SiC 衬底 | 6英寸良率≥65%；成本下降30% | 8英寸SiC衬底进入量产 | 8英寸主流化；成本对标Si IGBT |\n| 钨互连材料 | 国产WF₆达到5N级小批量 | 国产WF₆进入主流Fab认证 | 替代率提升至30%+ |\n| 稀矿出口管控 | 镓锗许可证+配额双轨 | 铟、钽纳入管控体系可能性上升 | 形成完整\"矿产外交\"筹码体系 |\n\n---\n\n---"}]},{"id":"08","num":9,"title":"人形机器人 / 具身智能","group":"新兴增长","hook":"减速器/丝杠/伺服/传感器，特斯拉 Optimus 信号源","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">人形机器人最值钱的不是\"外壳\"和\"脑子\"，而是<b>关节里的执行机构</b>——把电机的高速旋转，变成关节又稳又准的力与位置。一台人形机器人有几十个关节，<b>减速器 + 伺服电机 + 丝杠</b>这套传动占整机 BOM 的 <b>55-65%</b>。运动靠精密机械，智能靠 AI 大模型（VLA 端到端）。最大的国产卡点，是<b>行星滚柱丝杠</b>与<b>高精度谐波减速器</b>。</div>\n\n<h3>一、一个关节是怎么\"动\"起来的</h3>\n<p>人形机器人的关节分两类：<b>旋转关节</b>（肩、肘、腰）和<b>线性关节</b>（手臂直线推拉、手指）。旋转关节的链路是：<b>伺服电机</b>高速旋转 → <b>谐波/RV 减速器</b>把转速降下来、把力矩放大几十上百倍 → 带动关节转动；同时<b>编码器</b>实时反馈角度、<b>六维力传感器</b>感知接触力，闭环控制。线性关节则用<b>行星滚柱丝杠</b>把旋转变成直线推力——它能承受比普通滚珠丝杠大得多的负载、寿命更长，但加工极难，是国产化率最低（约 16%）的环节。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 250\" width=\"100%\">\n  <text x=\"370\" y=\"22\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#13233f\">旋转关节模组：电机 → 减速器 → 输出，全程闭环反馈</text>\n  <!-- 伺服电机 -->\n  <rect x=\"30\" y=\"95\" width=\"120\" height=\"70\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <text x=\"90\" y=\"125\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#1f5fd6\">伺服电机</text>\n  <text x=\"90\" y=\"143\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5b6577\">高速旋转 · 提供动力</text>\n  <!-- 减速器 -->\n  <rect x=\"210\" y=\"85\" width=\"140\" height=\"90\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <text x=\"280\" y=\"118\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#b3261e\">谐波 / RV 减速器</text>\n  <text x=\"280\" y=\"136\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">降速 · 放大力矩</text>\n  <text x=\"280\" y=\"152\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">（卡点）</text>\n  <!-- 编码器 -->\n  <rect x=\"210\" y=\"195\" width=\"140\" height=\"36\" rx=\"6\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n  <text x=\"280\" y=\"218\" text-anchor=\"middle\" font-size=\"10\" fill=\"#4a2e9e\">编码器（角度反馈）</text>\n  <!-- 输出关节 -->\n  <circle cx=\"470\" cy=\"130\" r=\"42\" fill=\"#e6f5f1\" stroke=\"#0f8a7e\" stroke-width=\"1.5\"/>\n  <text x=\"470\" y=\"126\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#0f8a7e\">关节输出</text>\n  <text x=\"470\" y=\"142\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0a6a60\">高扭矩 · 低转速</text>\n  <!-- 六维力 -->\n  <rect x=\"560\" y=\"95\" width=\"150\" height=\"70\" rx=\"8\" fill=\"#fff7e6\" stroke=\"#e8b923\"/>\n  <text x=\"635\" y=\"125\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#8a6d1a\">六维力传感器</text>\n  <text x=\"635\" y=\"143\" text-anchor=\"middle\" font-size=\"9\" fill=\"#8a6d1a\">感知接触力（最短缺）</text>\n  <!-- arrows -->\n  <g stroke=\"#94a3b8\" stroke-width=\"2\" marker-end=\"url(#a8)\">\n   <line x1=\"150\" y1=\"130\" x2=\"208\" y2=\"130\"/>\n   <line x1=\"350\" y1=\"130\" x2=\"424\" y2=\"130\"/>\n   <line x1=\"512\" y1=\"130\" x2=\"558\" y2=\"130\"/>\n  </g>\n  <line x1=\"280\" y1=\"195\" x2=\"280\" y2=\"177\" stroke=\"#6a4bbf\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\" marker-end=\"url(#a8p)\"/>\n  <defs>\n   <marker id=\"a8\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker>\n   <marker id=\"a8p\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#6a4bbf\"/></marker>\n  </defs>\n</svg>\n</div>\n\n<h3>二、整机 BOM 成本拆解：钱都花在\"传动\"上</h3>\n<p>和工业机器人不同，人形机器人关节数量多、力矩密度要求高，因此<b>执行机构（减速器+电机+丝杠）是绝对的价值高地</b>。下面是大致的 BOM 占比，越厚的环节越是国产投资主战场。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 200\" width=\"100%\">\n  <text x=\"12\" y=\"18\" font-size=\"11.5\" font-weight=\"700\" fill=\"#13233f\">人形机器人 BOM 成本占比（大致）· 越厚价值越高</text>\n  <g font-size=\"11\">\n   <text x=\"12\" y=\"46\">执行机构（减速器/电机/丝杠）</text><rect x=\"220\" y=\"35\" width=\"360\" height=\"16\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"588\" y=\"48\" fill=\"#d23f3f\" font-weight=\"700\">55-65%（核心·含国产卡点）</text>\n   <text x=\"12\" y=\"76\">感知系统（力觉/视觉/IMU）</text><rect x=\"220\" y=\"65\" width=\"92\" height=\"16\" rx=\"3\" fill=\"#e8b923\"/><text x=\"320\" y=\"78\" fill=\"#8a6d1a\" font-weight=\"700\">10-15%（六维力最短缺）</text>\n   <text x=\"12\" y=\"106\">控制系统（主控SoC/驱动IC）</text><rect x=\"220\" y=\"95\" width=\"62\" height=\"16\" rx=\"3\" fill=\"#6a4bbf\"/><text x=\"290\" y=\"108\" fill=\"#4a2e9e\" font-weight=\"700\">≈10%（AI 大脑）</text>\n   <text x=\"12\" y=\"136\">结构材料（铝合金/碳纤维）</text><rect x=\"220\" y=\"125\" width=\"80\" height=\"16\" rx=\"3\" fill=\"#0f8a7e\"/><text x=\"308\" y=\"138\" fill=\"#0a6a60\" font-weight=\"700\">10-15%（轻量化）</text>\n   <text x=\"12\" y=\"166\">整机集成（品牌/装配）</text><rect x=\"220\" y=\"155\" width=\"50\" height=\"16\" rx=\"3\" fill=\"#94a3b8\"/><text x=\"278\" y=\"168\" fill=\"#5b6577\" font-weight=\"700\">余量</text>\n  </g>\n</svg>\n</div>\n\n<h3>三、国产卡点与代表标的</h3>\n<p>大脑端（VLA 端到端模型 + 主控 SoC）目前仍以 Nvidia Jetson 为主，国产替代早期；运动端的机械传动才是国产能切入、且弹性最大的地方。</p>\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">最大卡点：滚柱丝杠 / 高精度谐波</div>行星滚柱丝杠国产化率约 16%，加工与材料壁垒高；高精度谐波减速器仍追赶日本 Harmonic Drive。<br><span class=\"pc-s\">丝杠：<span class=\"tk\" onclick=\"openDetail('300580','贝斯特','A股')\">贝斯特</span> · <span class=\"tk\" onclick=\"openDetail('601100','恒立液压','A股')\">恒立液压</span> · <span class=\"tk\" onclick=\"openDetail('603667','五洲新春','A股')\">五洲新春</span></span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">减速器 + 伺服电机</div>谐波：<span class=\"tk\" onclick=\"openDetail('688017','绿的谐波','A股')\">绿的谐波</span>（A股唯一，全球约15%）；RV：<span class=\"tk\" onclick=\"openDetail('002472','双环传动','A股')\">双环传动</span> · <span class=\"tk\" onclick=\"openDetail('002896','中大力德','A股')\">中大力德</span>；伺服：<span class=\"tk\" onclick=\"openDetail('300124','汇川技术','A股')\">汇川技术</span> · <span class=\"tk\" onclick=\"openDetail('002747','埃斯顿','A股')\">埃斯顿</span><br><span class=\"pc-s\">线性执行器核心：<span class=\"tk\" onclick=\"openDetail('601689','拓普集团','A股')\">拓普集团</span>（Optimus 供应商，弹性最大）</span></div>\n</div>\n<p style=\"margin-top:6px\">感知端六维力传感器当前最短缺，A股标的 <span class=\"tk\" onclick=\"openDetail('603662','柯力传感','A股')\">柯力传感</span>；整机端优必选（港股 HK9880）已上市，宇树、智元、傅利叶仍未上市。</p>\n\n</div>\n"},{"t":"一、执行机构","k":"group","note":"BOM 成本占比约 55-65%，最重要环节。拓普集团、鸣志电器、三花智控并入本层。","children":[{"t":"1.1 谐波减速器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["谐波减速器","Harmonic Drive Systems (6324.T) / Nidec Drive","绿的谐波、来福谐波、大族传动","688017、未上市、未上市","绿的谐波 A 股唯一，全球市占约 15%"]]},{"t":"1.2 RV 减速器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["RV 减速器","Nabtesco (6268.T)","双环传动、秦川机床、中大力德、恒力传动","002472、000837、002896、未上市","用于腰/肩重型关节，Nabtesco 全球第一"]]},{"t":"1.3 伺服电机 + 驱动器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["伺服电机 + 驱动器","Yaskawa (6506.T) / Fanuc (6954.T) / Siemens / Beckhoff","汇川技术、步科股份、埃斯顿、禾川科技","300124、688160、002747、未上市","汇川工业伺服第一，高功率密度仍有差距"]]},{"t":"1.4 滚柱丝杠","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["滚柱丝杠","THK (6481.T) / Schaeffler (SHA.DE) / NSK (6471.T)","贝斯特、恒立液压、五洲新春","300580、601100、603667","线性关节最大卡点，国产化率约 16%"]]},{"t":"1.5 直线电机","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["直线电机","Beckhoff / Siemens / Yaskawa","雷赛智能","002979","轻量化线性驱动替代丝杠"]]},{"t":"1.6 线性执行器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["线性执行器","—","拓普集团","601689","特斯拉 Optimus 核心供应商，弹性最大"]]},{"t":"1.7 步进电机","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["步进电机 + 驱动器","—","鸣志电器","603728","步进电机+驱动器国内龙头"]]},{"t":"1.8 热管理","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["热管理","—","三花智控","002050","特斯拉热管理供应商，机器人热管理延伸"]]}]},{"t":"二、感知系统","k":"group","note":"BOM 约 10-15%，六维力传感器当前最短缺。","children":[{"t":"2.1 六维力 / 力矩传感器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["六维力 / 力矩传感器","ATI (ABB 旗下) / Sunrise Instruments / Schunk","柯力传感、坤维科技、宇立仪器","603662、未上市、未上市","关节力感知当前最短缺，国产化率约 22%"]]},{"t":"2.2 3D 视觉 / 深度相机","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["3D 视觉 / 深度相机","Stereolabs / Microsoft Azure Kinect (停产)","奥比中光、华锐精密","688322、未上市","手眼协调用，奥比中光 ToF 深度相机"]]},{"t":"2.3 IMU 惯性测量单元","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["IMU 惯性测量单元","Analog Devices (ADI) / Bosch","芯动联科、高精导航","688582、未上市","姿态控制用，ADI/博世精度仍领先"]]}]},{"t":"三、控制系统","k":"group","note":"BOM 约 10%，本地 AI 推理主控国产化早期。","children":[{"t":"3.1 主控 SoC / NPU","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["主控 SoC / NPU","Nvidia Jetson Thor (NVDA) / Qualcomm Robotics RB6 (QCOM)","地平线、华为昇腾","HK9660、未上市","国产替代早期，主流仍采购 Nvidia Jetson"]]},{"t":"3.2 电机驱动 IC","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["电机驱动 IC","TI (TXN) / Infineon (IFX.DE)","汇川技术、思瑞浦","300124、688536","FOC 磁场定向控制，汇川集成驱动方案"]]},{"t":"3.3 实时操作系统 / 机器人 OS","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["实时操作系统 / 机器人 OS","ROS2 (开源主流)","华为鸿蒙实时 OS","未上市","ROS2 为开源主流"]]}]},{"t":"四、结构材料","k":"group","note":"BOM 约 10-15%，轻量化关键。科力远并入本层。","children":[{"t":"4.1 铝合金精密结构件","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["铝合金精密结构件","无特定上市龙头 (分散制造)","爱柯迪、隆盛科技","600933、300680","骨架轻量化，精密铝合金压铸"]]},{"t":"4.2 碳纤维复合材料","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["碳纤维复合材料","Toray (3402.T) / Hexcel (HXL) / Teijin (3401.T)","中简科技、光威复材","300777、300699","四肢轻量化，东丽全球第一约 30% 份额"]]},{"t":"4.3 储能 / 新材料","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["储能 / 新材料","—","科力远","600478","镍氢电池+新材料，机器人储能方向"]]}]},{"t":"五、整机集成","k":"table","note":"BOM 占比由各零部件汇总，品牌整机环节。埃斯顿作为工业机器人整机/具身智能入口并入。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["人形机器人整机","Tesla Optimus (TSLA) / Figure AI / Boston Dynamics / Agility Robotics","优必选、宇树科技、智元机器人、傅利叶智能","HK9880、未上市、未上市、未上市","优必选港股上市，宇树/智元密集融资"],["工业机器人整机 / 系统","—","埃斯顿","002747","工业机器人整机+伺服，具身智能入口"]]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 单台人形机器人 BOM 占比 | 全球市场（2025E）| 全球毛利率 | 占链条总价值 % |\n|------|--------------------|-----------------|---------|----|\n| 谐波减速器 | ~15% BOM | ~$20 亿 | 40-50% | **约 22%** |\n| RV 减速器 | ~12% BOM | ~$15 亿 | 35-45% | **约 15%** |\n| 伺服电机 + 驱动器 | ~20% BOM | ~$30 亿 | 30-42% | **约 27%** |\n| 滚柱丝杠 | ~8% BOM | ~$8 亿 | 38-48% | **约 9%** |\n| 力 / 力矩传感器 | ~8% BOM | ~$5 亿 | 52-62% | **约 8%** |\n| 3D 视觉 / IMU | ~5% BOM | ~$8 亿 | 45-55% | **约 10%** |\n| 控制芯片 / 主控 | ~8% BOM | ~$5 亿 | 60-70% | **约 9%** |\n| 碳纤维 / 结构件 | ~10% BOM | ~$3 亿 | 30-40% | **约 3%** |"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| 谐波减速器（中低精度）| ~42% | **~52%** | 65% | 绿的谐波 vs Harmonic Drive 高精度差距 |\n| 谐波减速器（高精度 ≤1 角分）| ~15% | **~25%** | 42% | 柔轮材料热处理工艺精度不稳定 |\n| RV 减速器 | ~20% | **~32%** | 48% | Nabtesco 精度和使用寿命仍高 1 档 |\n| 伺服电机（中低功率）| ~30% | **~42%** | 58% | 汇川技术竞争力强，高功率密度差距 |\n| 伺服驱动器 | ~35% | **~48%** | 62% | 国产已可用，高动态响应仍差距 |\n| 滚柱丝杠 | ~8% | **~16%** | 30% | 最大国产化卡点，THK 专利壁垒 |\n| 六维力传感器 | ~12% | **~22%** | 40% | 全解耦算法 + 精度一致性 |\n| 碳纤维（T800 航空级）| ~18% | **~28%** | 42% | 东丽专利 + 上浆剂配方 |\n| 控制主控（机器人专用）| ~5% | **~10%** | 22% | 主要采购 Nvidia Jetson，国产替代早期 |\n| IMU（高精度）| ~15% | **~24%** | 38% | ADI / 博世精度差距，温度漂移控制 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 特斯拉 Optimus 量产进度（最大行业信号源）**\n特斯拉计划 2025 年生产约 5,000 台 Optimus，Musk 长期目标是年产 100 万台。每次 Optimus 技术发布会均触发 A 股人形机器人板块轮动。Optimus 用的谐波减速器目前主要自研，供应链开放是市场最期待的验证事件。\n受益标的：绿的谐波 688017、双环传动 002472\n\n**2. 国内整机企业融资 / IPO 节点**\n宇树科技、智元机器人、傅利叶智能 2024-2025 年密集融资（宇树估值已超 100 亿人民币），供应链认证拉动减速器、丝杠、传感器订单放量，是 A 股供应链公司最直接的订单催化。\n受益标的：贝斯特 300580、绿的谐波 688017\n\n**3. AI 大模型赋能具身智能（端到端控制落地）**\nOpenAI 投资 Figure AI，谷歌 DeepMind RT-2 模型验证 VLA（Vision-Language-Action）端到端控制可行性。国内百度 / 华为 / 宇树探索类似方案，AI 能力的突破将大幅降低机器人控制系统研发门槛，加速商业化时间表。\n\n**4. 工业场景批量导入（比 ToC 更快兑现的路径）**\n汽车工厂（比亚迪 / 上汽）、仓储物流（京东 / 顺丰）等场景对人形机器人的柔性抓取需求，比 ToC 家庭场景更快形成批量采购。2025 年工业场景单工厂百台级订单开始出现。\n\n**5. 滚柱丝杠国产化突破（最大边际变量）**\n滚柱丝杠是人形机器人线性关节核心，目前完全依赖 THK / 博世力士乐 / Schaeffler 进口，国产化率仅 8%。贝斯特 300580 / 恒立液压正在攻克，一旦工程化落地，将重估 A 股估值。"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. 日本减速器 / 丝杠出口管制潜在风险**\n谐波减速器（Harmonic Drive 日本）和滚柱丝杠（THK 日本）均为日本企业主导，现阶段不在出口管制范围内，但日本参与多边出口管制体系的趋势值得警惕。若纳入限制，将对国内人形机器人整机量产形成直接冲击。\n\n**2. Nvidia Jetson 芯片供货限制**\n特斯拉 Optimus 和部分国内整机使用 Nvidia Jetson 系列作为主控芯片，若 Nvidia 扩大出口管制范围至机器人专用 AI 芯片，国内整机厂商需转向国产替代（华为 / 地平线），转换成本和周期约 6-12 个月。\n\n**3. 碳纤维东丽专利和出口管制**\n日本东丽高性能碳纤维（T800/T1000）出口历史上受日本安全贸易限制，机器人用高性能碳纤维若供应受限，将增加国内结构件成本并影响轻量化设计。\n\n**4. 人形机器人军事应用引发地缘担忧**\n部分双用途机器人技术（双足运动、力控技术）可能涉及军事领域，中美双方均可能加大审查力度，影响技术合作和跨境供应链。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| 整机自由度 | 25-35 个自由度（Optimus / Figure 02）| 40+ 自由度（手指灵巧度提升）| 全身 50+ 自由度精细操作 |\n| 行走速度 | 1.5-2.5 m/s | 3-4 m/s（接近人类快走）| 跑步能力（>4 m/s）商业验证 |\n| 减速器精度 | 谐波：≤3 角分（国产）、≤1 角分（进口）| 国产谐波突破 ≤1.5 角分 | 国产减速器出口日本 / 欧洲 |\n| 滚柱丝杠 | 依赖进口（THK / 博世）| 国内贝斯特 / 恒立进入量产 | 国产滚柱丝杠全面替代进口 |\n| 端到端 AI 控制 | VLA 模型验证阶段 | 端到端控制在工厂场景落地 | 家庭通用场景 AI 控制商业化 |\n| 成本路径 | 首台整机 $100,000-200,000 | 批量生产后降至 $30,000-50,000 | 目标 $20,000 以下（工业场景盈亏平衡）|\n\n---\n\n---"}]},{"id":"09","num":10,"title":"卫星互联网 / 低轨卫星","group":"新兴增长","hook":"中国星网 GW 星座+相控阵+商业火箭","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">卫星互联网的核心选择是<b>轨道高度</b>。传统通信卫星挂在 36000km 的高轨（GEO），延迟高达 500ms 以上；低轨卫星（LEO）只有 <b>300-1200km</b>，延迟降到 20-40ms，接近地面光纤体验。但代价是——轨道越低，单星覆盖越小、过顶越快，<b>必须用成百上千颗卫星组成\"星座\"接力</b>。这就是 Starlink 和中国星网 GW 都在抢着发射的根本原因。</div>\n\n<h3>一、为什么非要\"低轨 + 海量组网\"</h3>\n<p>延迟正比于信号往返距离。高轨卫星离地远，光跑一个来回就要半秒，打游戏、视频通话都卡。低轨把卫星拉到几百公里高，延迟一下降到几十毫秒。<b>但低轨卫星跑得飞快</b>（约 90 分钟绕地球一圈），任何一颗卫星从地面看只能\"露脸\"几分钟就跑出视野，而且覆盖面积小。要让地面任意一点 24 小时都有卫星在头顶，就必须发<b>几百上千颗卫星编织成一张网</b>，前一颗刚要离开、后一颗马上补上——这就是\"星座\"组网。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 210\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">高轨 GEO vs 低轨 LEO：延迟与组网数量的取舍</text>\n  <!-- 地球 -->\n  <path d=\"M40 195 Q370 130 700 195\" fill=\"#dbeafe\" stroke=\"#1f5fd6\" stroke-width=\"1.5\"/>\n  <text x=\"370\" y=\"190\" text-anchor=\"middle\" font-size=\"10\" fill=\"#1f5fd6\">地面</text>\n  <!-- GEO -->\n  <ellipse cx=\"370\" cy=\"150\" rx=\"300\" ry=\"0\" fill=\"none\"/>\n  <circle cx=\"200\" cy=\"55\" r=\"9\" fill=\"#94a3b8\"/><text x=\"200\" y=\"42\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5b6577\">GEO 卫星</text>\n  <line x1=\"200\" y1=\"64\" x2=\"290\" y2=\"160\" stroke=\"#94a3b8\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/>\n  <text x=\"120\" y=\"80\" font-size=\"9.5\" fill=\"#5b6577\">36000km · 延迟 ~500ms · 3 颗覆盖全球</text>\n  <!-- LEO 星座 -->\n  <g fill=\"#d23f3f\">\n   <circle cx=\"120\" cy=\"118\" r=\"5\"/><circle cx=\"200\" cy=\"112\" r=\"5\"/><circle cx=\"280\" cy=\"110\" r=\"5\"/><circle cx=\"360\" cy=\"110\" r=\"5\"/><circle cx=\"440\" cy=\"110\" r=\"5\"/><circle cx=\"520\" cy=\"112\" r=\"5\"/><circle cx=\"600\" cy=\"118\" r=\"5\"/>\n  </g>\n  <text x=\"500\" y=\"100\" font-size=\"9.5\" fill=\"#b3261e\">300-1200km · 延迟 20-40ms · 需数千颗组网</text>\n  <!-- 星间激光 -->\n  <g stroke=\"#6a4bbf\" stroke-width=\"1.5\">\n   <line x1=\"120\" y1=\"118\" x2=\"200\" y2=\"112\"/><line x1=\"200\" y1=\"112\" x2=\"280\" y2=\"110\"/><line x1=\"280\" y1=\"110\" x2=\"360\" y2=\"110\"/><line x1=\"360\" y1=\"110\" x2=\"440\" y2=\"110\"/><line x1=\"440\" y1=\"110\" x2=\"520\" y2=\"112\"/><line x1=\"520\" y1=\"112\" x2=\"600\" y2=\"118\"/>\n  </g>\n  <text x=\"360\" y=\"135\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#4a2e9e\">星间激光链路（卫星之间直接组网，不落地）</text>\n</svg>\n</div>\n\n<h3>二、相控阵天线与星间激光：两大核心技术</h3>\n<p><b>① 地面终端为什么用相控阵：</b>低轨卫星在天上飞快移动，地面天线必须时刻\"盯住\"它。传统卫星天线靠机械马达转动\"锅盖\"对准，又慢又重还易坏。<b>相控阵天线</b>用一大片阵列单元，通过<b>电子调节每个单元的相位</b>来合成并偏转波束方向——没有任何机械转动，就能毫秒级地从一颗卫星切换跟踪到下一颗。这是 Starlink 终端能做成\"披萨盒\"形态的关键，也是国产铖昌科技 MMIC 芯片切入的核心壁垒。</p>\n<p><b>② 星间激光链路：</b>卫星之间不再都依赖地面中转，而是用<b>激光</b>直接互联组网。激光带宽极高、抗干扰、不占用无线电频谱，让数据可以\"在天上绕路\"传到全球任意角落，是 LEO 实现低延迟全球覆盖的关键。国产化率仍低（约 10%），由德国 Tesat 主导。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 230\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">卫星互联网端到端架构</text>\n  <!-- LEO 星座 -->\n  <g fill=\"#d23f3f\"><circle cx=\"180\" cy=\"55\" r=\"7\"/><circle cx=\"370\" cy=\"48\" r=\"7\"/><circle cx=\"560\" cy=\"55\" r=\"7\"/></g>\n  <g stroke=\"#6a4bbf\" stroke-width=\"1.5\"><line x1=\"180\" y1=\"55\" x2=\"370\" y2=\"48\"/><line x1=\"370\" y1=\"48\" x2=\"560\" y2=\"55\"/></g>\n  <text x=\"370\" y=\"38\" text-anchor=\"middle\" font-size=\"10\" fill=\"#6a4bbf\" font-weight=\"700\">星间激光链路</text>\n  <text x=\"180\" y=\"78\" text-anchor=\"middle\" font-size=\"9\" fill=\"#b3261e\">LEO 卫星</text>\n  <text x=\"560\" y=\"78\" text-anchor=\"middle\" font-size=\"9\" fill=\"#b3261e\">LEO 卫星</text>\n  <!-- 地面相控阵终端 -->\n  <rect x=\"100\" y=\"150\" width=\"160\" height=\"50\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <text x=\"180\" y=\"172\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#1f5fd6\">相控阵用户终端</text>\n  <text x=\"180\" y=\"189\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5b6577\">电子波束扫描·无机械转动</text>\n  <!-- 关口站 -->\n  <rect x=\"480\" y=\"150\" width=\"160\" height=\"50\" rx=\"8\" fill=\"#e6f5f1\" stroke=\"#0f8a7e\"/>\n  <text x=\"560\" y=\"172\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#0f8a7e\">地面关口站</text>\n  <text x=\"560\" y=\"189\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0a6a60\">接入骨干互联网</text>\n  <!-- 上下行链路 -->\n  <g stroke=\"#94a3b8\" stroke-width=\"1.6\" stroke-dasharray=\"4 3\" marker-end=\"url(#a9)\">\n   <line x1=\"180\" y1=\"62\" x2=\"180\" y2=\"148\"/>\n   <line x1=\"560\" y1=\"62\" x2=\"560\" y2=\"148\"/>\n  </g>\n  <defs><marker id=\"a9\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <text x=\"370\" y=\"180\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5b6577\">用户 ↔ 卫星 ↔ 星间激光 ↔ 关口站 ↔ 互联网</text>\n</svg>\n</div>\n\n<h3>三、中国星网 GW vs Starlink 与国产标的</h3>\n<p>Starlink（SpaceX）凭借猎鹰 9 可复用火箭低成本批量发射，已在轨数千颗，全球绝对领先。中国以<b>星网 GW</b>、<b>千帆星座（G60）</b>为主力快速追赶，叠加发射降本（蓝箭可复用火箭研发中）与宇航级元器件国产化的政策驱动，确定性较高。</p>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">地面终端 / 相控阵（最大 C 端市场）</div>相控阵核心 MMIC：<span class=\"tk\" onclick=\"openDetail('001270','铖昌科技','A股')\">铖昌科技</span>；功率器件：<span class=\"tk\" onclick=\"openDetail('688375','国博电子','A股')\">国博电子</span>；车/船/航终端：<span class=\"tk\" onclick=\"openDetail('002465','海格通信','A股')\">海格通信</span> · <span class=\"tk\" onclick=\"openDetail('300762','上海瀚讯','A股')\">上海瀚讯</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">宇航级元器件（政策驱动·确定性高）</div>宇航 FPGA：<span class=\"tk\" onclick=\"openDetail('002049','紫光国微','A股')\">紫光国微</span>；宇航 MLCC/电源/电阻：<span class=\"tk\" onclick=\"openDetail('000733','振华科技','A股')\">振华科技</span><br><span class=\"pc-s\">运营：<span class=\"tk\" onclick=\"openDetail('601698','中国卫通','A股')\">中国卫通</span>（A股唯一卫星通信运营商）；卫星平台：<span class=\"tk\" onclick=\"openDetail('600118','中国卫星','A股')\">中国卫星</span></span></div>\n</div>\n<p style=\"margin-top:6px\">星间激光、商业火箭（蓝箭、中科宇航、星际荣耀、深蓝航天）多为未上市，星间激光链路是国产化率最低（约10%）的硬骨头。</p>\n\n</div>\n"},{"t":"一、卫星本体","k":"group","note":"在轨卫星硬件，含平台、通信载荷与星间激光。","children":[{"t":"1.1 卫星平台","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["卫星平台","Boeing (BA) / Airbus Defence (AIR.PA) / Maxar / Thales Alenia","中国卫星、格思航天、微纳星空、天仪研究院","600118、未上市、未上市、未上市","星体结构/电源/姿控/推进，LEO 批量制造起步"]]},{"t":"1.2 通信载荷","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["通信载荷","L3Harris (LHX) / Honeywell (HON) / Viasat (VSAT)","航天科工二院/八院、中国电子科技","未上市、未上市","Ka/Ku/Q/V 频段+激光，关键器件有进口依赖"]]},{"t":"1.3 星间激光链路","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["星间激光链路","Tesat (德，空客旗下)","空间光通信技术所、凌空天行","未上市、未上市","LEO 低延时关键，国产化率约 10%"]]}]},{"t":"二、地面终端","k":"group","note":"最大的 C 端市场。上海瀚讯并入本层。","children":[{"t":"2.1 相控阵天线","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["相控阵天线","Viasat (VSAT) / Kymeta / ThinKom","铖昌科技、华测导航、国博电子","001270、300627、688375","波束扫描核心壁垒，铖昌 MMIC 突破"]]},{"t":"2.2 手持 / 消费终端","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["手持 / 消费终端","Starlink (SpaceX) / Iridium (IRDM) / Viasat (VSAT)","中国卫通、北斗星通","601698、002151","直连手机方向，Starlink 全球绝对龙头"]]},{"t":"2.3 车载 / 船载 / 航空终端","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["车载 / 船载 / 航空终端","Viasat (VSAT) / SES (SESG.F) / Eutelsat (ETGSY)","海格通信、上海瀚讯","002465、300762","宇航级/宽带卫星通信终端"]]}]},{"t":"三、发射服务","k":"group","note":"运载火箭，LEO 批量发射与降本核心。","children":[{"t":"3.1 商业运载火箭","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["商业运载火箭","SpaceX Falcon 9 / Rocket Lab (RKLB) / ULA / Arianespace","蓝箭航天、中科宇航、星际荣耀、深蓝航天","未上市、未上市、未上市、未上市","SpaceX 低轨发射近乎垄断，国内多家研发"]]},{"t":"3.2 可复用火箭","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["可复用火箭","SpaceX Starship","蓝箭航天","未上市","蓝箭朱雀 3 可复用研发中，降本关键"]]}]},{"t":"四、宇航级元器件","k":"group","note":"所有卫星的必需配套，国产化政策驱动确定性高。国博电子的宇航级微波器件可见地面终端层。","children":[{"t":"4.1 宇航级 FPGA / SoC","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["宇航级 FPGA / SoC","Microchip (MCHP) / BAE Systems","紫光国微、振华科技","002049、000733","紫光 7 系 FPGA 进入型号使用"]]},{"t":"4.2 宇航级 MLCC / 电阻","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["宇航级 MLCC / 电阻","KEMET / Yageo (2327.TW) / AVX (Kyocera)","振华科技、潮州三环","000733、未上市","耐辐照版本，替代部分进口"]]},{"t":"4.3 宇航级电源 IC / DC-DC","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["宇航级电源 IC / DC-DC","Vicor (VICR) / Empower Semiconductor","振华科技","000733","国产替代推进中"]]}]},{"t":"五、应用服务","k":"group","note":"卫星运营、北斗定位与遥感。中国卫通、航天宏图、中科星图并入本层。","children":[{"t":"5.1 卫星互联网运营","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["卫星互联网运营","Starlink (SpaceX) / Iridium (IRDM) / Viasat (VSAT)","中国卫通","601698","国内唯一卫星通信运营商 A 股标的"]]},{"t":"5.2 北斗精准定位增强","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["北斗精准定位增强","Trimble (TRMB) / Hexagon (HEXA.B.ST)","北斗星通、华测导航、千寻位置","002151、300627、未上市","国内已主导，国产化率约 65%"]]},{"t":"5.3 遥感 / 对地观测","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["遥感 / 对地观测","Maxar / Planet Labs (PL) / Airbus Defence","中科星图、航天宏图、二十一世纪空间","688568、688066、未上市","中科星图天地图平台，航天宏图 SAR 数据"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| LEO 卫星互联网服务（运营）| ~$80 亿 | 45-60% | **约 30%** | Starlink (SpaceX)、Iridium (IRDM) |\n| 卫星制造（本体）| ~$200 亿 | 18-28% | **约 18%** | Boeing (BA)、Airbus (AIR.PA) |\n| 地面相控阵终端 | ~$150 亿 | 30-42% | **约 20%** | Viasat (VSAT)、铖昌科技 003015 |\n| 发射服务 | ~$100 亿 | 15-25%（SpaceX 复用后更高）| **约 10%** | SpaceX（未上市）、Rocket Lab (RKLB) |\n| 宇航级元器件 | ~$50 亿 | 45-58% | **约 12%** | Microchip (MCHP)、振华科技 000733 |\n| 通信载荷（转发器）| ~$30 亿 | 35-45% | **约 7%** | L3Harris (LHX)、Honeywell (HON) |\n| 北斗 / GNSS 应用服务 | ~$50 亿 | 35-45% | **约 8%** | 北斗星通 002151、Trimble (TRMB) |"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| GEO 卫星本体（国内需求）| ~60% | **~68%** | 78% | 通信载荷关键器件仍有进口依赖 |\n| LEO 小卫星批量制造 | ~35% | **~48%** | 62% | 批量制造供应链配套体系尚在建立 |\n| 相控阵 MMIC 芯片 | ~10% | **~18%** | 32% | 铖昌科技 003015 突破，但功耗 / 效率差距 |\n| 可复用运载火箭 | ~5% | **~12%** | 28% | 蓝箭 / 星际荣耀研发中，可复用关键技术 |\n| 宇航级 FPGA | ~12% | **~20%** | 35% | 紫光国微 7 系 FPGA 进入型号使用 |\n| 宇航级 MLCC | ~18% | **~28%** | 42% | 振华科技 / 潮州三环替代部分进口 |\n| 星间激光链路 | ~5% | **~10%** | 22% | 光路精对准、热控管理技术 |\n| 卫星互联网运营服务 | ~8%（全球）| **~12%** | 20% | 中国星网 GW 星座建设期，服务尚未商用 |\n| 北斗精准定位服务 | ~55% | **~65%** | 75% | 国内已主导，出海竞争仍弱 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 中国星网 GW 星座批量部署启动（最大政策驱动）**\n中国星网公司计划部署约 1.3 万颗 LEO 卫星，2024-2025 年进入首批实验星后的工程卫星部署阶段。每次批量发射（100-200 颗）将带动发射、卫星制造、地面终端的完整产业链需求。\n受益标的：铖昌科技 003015、振华科技 000733、海格通信 002465\n\n**2. 直连手机技术商业化（杀手级应用）**\nStarlink 直连手机（T-Mobile 合作）2024 年测试成功，苹果 / 华为卫星通话功能普及。国内北斗短报文 + 低轨卫星直连手机结合，将大幅扩大消费终端市场。\n受益标的：北斗星通 002151、中国卫通 600118\n\n**3. 商业航天火箭可复用突破（降低部署成本）**\n蓝箭航天朱雀 3 号（液氧甲烷，可复用）预计 2025-2026 年首飞。若成功，LEO 发射成本将从目前 $5000/kg 降至 $1000/kg 以下，大幅提升低轨星座商业可行性。\n\n**4. 宇航级元器件国产化需求（型号导入）**\n中国航天型号的国产化比率要求持续提升，振华科技、紫光国微在宇航 FPGA 和无源元器件的型号进入速度加快，这是高确定性的政策驱动增量。\n受益标的：振华科技 000733、紫光国微 002049\n\n**5. 相控阵天线民用化降本（地面终端爆发前提）**\n铖昌科技相控阵 MMIC 芯片进入大批量量产，单个终端相控阵模块成本从 $2000 降至 $300-500 目标。届时卫星宽带终端实现消费级定价，启动 C 端市场。"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. 频率轨道资源争夺（中美卫星互联网轨位竞争）**\nITU 国际电信联盟频率轨道资源「先用先得」规则下，SpaceX 已部署 6000+ 颗 Starlink 卡位多数优质轨位。中国星网 GW 计划若部署不及时将错失最佳低轨轨位。这是国内卫星互联网最重要的战略风险。\n\n**2. 美国出口管制限制宇航级器件进口**\n宇航级芯片（Microchip / Radiation-Hardened FPGA）一直在 EAR 管制范围内，国内航天型号长期需依靠国产替代（振华 / 紫光国微）。管制范围扩大将进一步倒逼国产化但也影响研制周期。\n\n**3. 中东 / 红海航运对卫星通信需求的正面催化**\n红海局势导致船只绕行好望角，航行时间延长，船舶卫星宽带（VSAT）需求显著增加。这是中东局势对卫星互联网的间接利好，推升 VSAT 终端和卫星通信服务需求。\n\n**4. 台海风险下卫星通信的战略价值提升**\n军事冲突场景下地面通信基础设施可能被干扰或破坏，LEO 卫星通信的战略价值凸显，推动国家加大星网投入并加速相关器件国产化。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| 星座规模（中国）| 批量实验星（<100 颗）| 首批工程卫星部署（200-500 颗）| 星座达千颗级覆盖亚太 |\n| Starlink 全球 | 6,000+ 颗在轨 | 8,000-10,000 颗（二代部署）| Starlink V3 + Starship 超级巡航 |\n| 相控阵终端成本 | $2,000-3,000 / 终端 | 国产方案降至 $500-800 | C 端消费级（$200 以下）|\n| 直连手机带宽 | 短报文 + 窄带（<1Mbps）| 数 Mbps（真正宽带直连手机）| 5G NTN 标准成熟，运营商集成 |\n| 星间激光链路 | Starlink 已部署，国内研发 | 国内首批工程卫星激光验证 | 国内星座激光链路全覆盖 |\n| 可复用火箭 | 蓝箭朱雀 3 首飞在即 | 首次成功回收 | 可复用火箭发射成本 <$2000/kg |\n\n---\n\n---"}]},{"id":"10","num":11,"title":"汽车电子 / 智能驾驶","group":"新兴增长","hook":"激光雷达/智驾 SoC/域控，弱化处理","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">智能驾驶本质是给汽车装上\"眼睛—大脑—手脚\"：<b>感知层</b>（激光雷达/毫米波雷达/摄像头）看清世界 → <b>计算层</b>（自动驾驶 SoC + 域控制器）做决策 → <b>执行层</b>（转向/制动/油门）落地动作。这两年最大的变化是算法范式切换到 <b>BEV + Transformer 端到端大模型</b>，对车端算力的胃口暴涨——主控芯片从 Orin 的 254 TOPS 一路冲到 Thor 的 2000 TOPS。</div>\n\n<h3>一、感知 → 计算 → 执行：三层架构</h3>\n<p>智驾系统是一条数据流水线。<b>感知层</b>用多种传感器互补：摄像头看颜色/纹理/红绿灯但怕黑怕逆光，毫米波雷达测速测距、全天候但分辨率低，激光雷达（LiDAR）用点云精确建模 3D 世界、夜间也准但贵。多传感器数据融合后送入<b>计算层</b>：自动驾驶 SoC 跑神经网络做目标检测、轨迹预测与路径规划，域控制器把这些算力和功能集中到一个\"盒子\"里。最后<b>执行层</b>通过线控转向/制动把决策变成车轮的动作。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 250\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#13233f\">智能驾驶系统三层架构</text>\n  <!-- 感知层 -->\n  <rect x=\"20\" y=\"50\" width=\"200\" height=\"170\" rx=\"10\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <text x=\"120\" y=\"74\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#1f5fd6\">① 感知层</text>\n  <rect x=\"40\" y=\"88\" width=\"160\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#1f5fd6\"/><text x=\"120\" y=\"109\" text-anchor=\"middle\" font-size=\"10\">激光雷达 LiDAR（点云3D）</text>\n  <rect x=\"40\" y=\"128\" width=\"160\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#1f5fd6\"/><text x=\"120\" y=\"149\" text-anchor=\"middle\" font-size=\"10\">毫米波雷达（测速/全天候）</text>\n  <rect x=\"40\" y=\"168\" width=\"160\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#1f5fd6\"/><text x=\"120\" y=\"189\" text-anchor=\"middle\" font-size=\"10\">车载摄像头 CIS（视觉）</text>\n  <!-- 计算层 -->\n  <rect x=\"290\" y=\"50\" width=\"200\" height=\"170\" rx=\"10\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <text x=\"390\" y=\"74\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#b3261e\">② 计算层</text>\n  <rect x=\"310\" y=\"92\" width=\"160\" height=\"48\" rx=\"5\" fill=\"#fff\" stroke=\"#d23f3f\"/><text x=\"390\" y=\"112\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"700\">自动驾驶 SoC</text><text x=\"390\" y=\"128\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">BEV+Transformer 推理</text>\n  <rect x=\"310\" y=\"150\" width=\"160\" height=\"48\" rx=\"5\" fill=\"#fff\" stroke=\"#d23f3f\"/><text x=\"390\" y=\"170\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"700\">域控制器</text><text x=\"390\" y=\"186\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">算力/功能集中</text>\n  <!-- 执行层 -->\n  <rect x=\"560\" y=\"50\" width=\"160\" height=\"170\" rx=\"10\" fill=\"#e6f5f1\" stroke=\"#0f8a7e\"/>\n  <text x=\"640\" y=\"74\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#0f8a7e\">③ 执行层</text>\n  <rect x=\"576\" y=\"92\" width=\"128\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#0f8a7e\"/><text x=\"640\" y=\"113\" text-anchor=\"middle\" font-size=\"10\">线控转向</text>\n  <rect x=\"576\" y=\"132\" width=\"128\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#0f8a7e\"/><text x=\"640\" y=\"153\" text-anchor=\"middle\" font-size=\"10\">线控制动</text>\n  <rect x=\"576\" y=\"172\" width=\"128\" height=\"34\" rx=\"5\" fill=\"#fff\" stroke=\"#0f8a7e\"/><text x=\"640\" y=\"193\" text-anchor=\"middle\" font-size=\"10\">驱动 / 油门</text>\n  <!-- arrows -->\n  <g stroke=\"#94a3b8\" stroke-width=\"2.2\" marker-end=\"url(#a10)\">\n   <line x1=\"220\" y1=\"135\" x2=\"288\" y2=\"135\"/>\n   <line x1=\"490\" y1=\"135\" x2=\"558\" y2=\"135\"/>\n  </g>\n  <defs><marker id=\"a10\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <text x=\"254\" y=\"128\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5b6577\">数据融合</text>\n  <text x=\"524\" y=\"128\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5b6577\">控制指令</text>\n</svg>\n</div>\n\n<h3>二、端到端大模型推升车端算力</h3>\n<p>过去智驾是\"规则堆叠\"：人工写一堆 if-else 处理各种路况，长尾场景永远写不完。<b>BEV（鸟瞰图）+ Transformer</b> 把多路摄像头/雷达数据统一投影到一张俯视的\"上帝视角\"地图，再用 <b>Transformer</b> 直接从传感器输入端到端输出驾驶决策，更像人类司机的直觉。代价是模型参数量和推理算力需求暴涨——这直接把车端主控 SoC 的算力门槛抬高了一个数量级。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 150\" width=\"100%\">\n  <text x=\"12\" y=\"20\" font-size=\"11.5\" font-weight=\"700\" fill=\"#13233f\">车端主控 SoC 算力演进（端到端大模型驱动）</text>\n  <g font-size=\"11\">\n   <text x=\"12\" y=\"56\">上一代 Orin</text><rect x=\"130\" y=\"44\" width=\"60\" height=\"18\" rx=\"3\" fill=\"#9fb3c8\"/><text x=\"200\" y=\"58\" fill=\"#5b6577\" font-weight=\"700\">254 TOPS</text>\n   <text x=\"12\" y=\"92\">当前主流 Orin-X</text><rect x=\"130\" y=\"80\" width=\"120\" height=\"18\" rx=\"3\" fill=\"#1f5fd6\"/><text x=\"260\" y=\"94\" fill=\"#1f5fd6\" font-weight=\"700\">~508 TOPS（双 Orin）</text>\n   <text x=\"12\" y=\"128\">下一代 Thor</text><rect x=\"130\" y=\"116\" width=\"470\" height=\"18\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"610\" y=\"130\" fill=\"#d23f3f\" font-weight=\"700\">2000 TOPS</text>\n  </g>\n</svg>\n</div>\n<p>算力暴涨意味着：自动驾驶 SoC 成为整车价值高地，也是国产替代的关键窗口——Nvidia 仍是全球第一，但地平线 Journey 6、黑芝麻已开始放量。</p>\n\n<h3>三、国产格局与代表标的</h3>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">感知层（激光雷达国产已领先）</div>激光雷达：禾赛科技（美股 HSAI，全球第一）· 速腾聚创（港股 HK2498）；毫米波雷达：<span class=\"tk\" onclick=\"openDetail('603197','保隆科技','A股')\">保隆科技</span>；车规 CIS：<span class=\"tk\" onclick=\"openDetail('603501','韦尔股份','A股')\">韦尔股份</span>（豪威快速渗透）</div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">计算层（SoC + 域控制器替代窗口）</div>自动驾驶 SoC：地平线（港股 HK9660）· 黑芝麻（港股 HK2533）；域控制器：<span class=\"tk\" onclick=\"openDetail('002920','德赛西威','A股')\">德赛西威</span> · <span class=\"tk\" onclick=\"openDetail('600699','均胜电子','A股')\">均胜电子</span> · <span class=\"tk\" onclick=\"openDetail('688326','经纬恒润','A股')\">经纬恒润</span>（华为 MDC 政策强推）</div>\n</div>\n<p style=\"margin-top:6px\">智能座舱端：座舱 SoC 高通骁龙 8295 市占超 70% 极难撼动，国产 <span class=\"tk\" onclick=\"openDetail('603893','瑞芯微','A股')\">瑞芯微</span> 切中低端；AR-HUD 光学：<span class=\"tk\" onclick=\"openDetail('002273','水晶光电','A股')\">水晶光电</span> · <span class=\"tk\" onclick=\"openDetail('002906','华阳集团','A股')\">华阳集团</span>。主驱 SiC（<span class=\"tk\" onclick=\"openDetail('603290','斯达半导','A股')\">斯达半导</span>）详见主线 05。</p>\n\n</div>\n"},{"t":"一、感知层","k":"group","note":"激光雷达国产已全球领先，毫米波雷达与高端车规 CIS 仍由海外主导。","children":[{"t":"1.1 激光雷达 LiDAR","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["激光雷达","Luminar (LAZR) / Innoviz (INVZ)","禾赛科技、速腾聚创、图达通","HSAI、HK2498、未上市","禾赛全球第一，速腾进大众供应链"]]},{"t":"1.2 毫米波雷达（77GHz）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["毫米波雷达","Bosch（德，最大份额） / Continental (CON.DE) / NXP (NXPI) / TI (TXN)","保隆科技、加特兰微电子、楚航科技","603197、未上市、未上市","Bosch/Continental 主导，国产起步"]]},{"t":"1.3 车载摄像头 / ADAS 图像传感器（CIS）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["车规 CIS","Sony (6758.T，全球第一) / ON Semiconductor (ON)","韦尔股份、舜宇光学","603501、HK2382","韦尔/豪威快速渗透，高端仍 Sony"]]}]},{"t":"二、计算层","k":"group","note":"自动驾驶 SoC 国产替代窗口打开，域控制器随华为/德赛快速追赶。","children":[{"t":"2.1 自动驾驶 SoC","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["自动驾驶 SoC","Nvidia (NVDA，全球第一) / Mobileye (MBLY) / Qualcomm (QCOM)","地平线、黑芝麻智能","HK9660、HK2533","地平线 Journey 6 量产，渗透加速"]]},{"t":"2.2 域控制器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["域控制器","Bosch（德） / Continental (CON.DE) / Aptiv (APTV)","德赛西威、均胜电子、经纬恒润、华为 MDC","002920、600699、688326、未上市","德赛快速追赶，华为 MDC 政策强推"]]}]},{"t":"三、智能座舱","k":"group","note":"座舱 SoC 高通市占超 70% 极难撼动，车载显示与 AR-HUD 光学国产稳步渗透。","children":[{"t":"3.1 座舱 SoC","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["座舱 SoC","Qualcomm (QCOM，全球 70%+) / NXP (NXPI) / Renesas (6723.T)","瑞芯微、华为麒麟座舱","603893、未上市","高通骁龙 8295 主导，国产中低端"]]},{"t":"3.2 车载显示","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["车载显示","LG Display (034220.KS) / BOE","深天马、TCL 华星","000050、未上市","国产份额上升，毛利率偏低"]]},{"t":"3.3 AR-HUD 光学","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["AR-HUD 光学","Continental（德） / Denso (6902.T) / Nippon Seiki（日）","水晶光电、华阳集团","002273、002906","水晶光电进入主要 HUD 供应链"]]}]},{"t":"四、车规级功率半导体","k":"table","note":"与主线 05 高度重叠，此处简列；主驱 SiC 与车载 OBC/DC-DC 为核心。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["主驱 SiC 模块","Infineon (IFX.DE)","斯达半导","603290","三电核心，详见主线 05"],["车载 OBC / DC-DC","STMicro (STM)","宏微科技","688711","IGBT/SiC，详见主线 05"]]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| 自动驾驶 SoC 芯片 | ~$40 亿 | 60-70% | **约 20%** | Nvidia (NVDA)、Mobileye (MBLY) |\n| 车载摄像 CIS | ~$30 亿 | 45-55% | **约 12%** | Sony（6758.T）、韦尔股份 603501 |\n| 激光雷达 | ~$15 亿 | 25-40% | **约 5%** | 禾赛科技 (HSAI)、Luminar (LAZR) |\n| 毫米波雷达 | ~$25 亿 | 30-42% | **约 8%** | Bosch（德）、Continental (CON.DE) |\n| 座舱 SoC | ~$35 亿 | 55-65% | **约 18%** | Qualcomm (QCOM) |\n| 域控制器整机 | ~$30 亿 | 20-30% | **约 7%** | 德赛西威 002920、Bosch |\n| 车载显示 | ~$50 亿 | 18-28% | **约 10%** | LG Display、深天马 000050 |\n| AR-HUD 光学 | ~$8 亿 | 38-48% | **约 3%** | 水晶光电 002273、Continental |\n| 车规电源 / PMIC | ~$20 亿 | 42-52% | **约 8%** | TI (TXN)、NXP (NXPI) |"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| L2 级自动驾驶芯片（国内车）| ~12% | **~22%** | 40% | 地平线 Journey 6 量产渗透加速 |\n| L3+ 高阶驾驶芯片 | ~3% | **~8%** | 18% | ASIL-D 安全等级认证，性能仍差距 |\n| 激光雷达（国内整车）| ~42% | **~56%** | 72% | 禾赛 / 速腾已全球领先 |\n| 毫米波雷达（77GHz）| ~15% | **~22%** | 35% | 加特兰起步，Bosch / Continental 主导 |\n| 车规 CIS（摄像头）| ~18% | **~25%** | 38% | 韦尔 / 豪威快速渗透，Sony 仍主导高端 |\n| 座舱 SoC（高端）| ~5% | **~8%** | 15% | 高通骁龙 8295 市占>70%，极难撼动 |\n| 域控制器整机 | ~32% | **~45%** | 60% | 德赛西威快速追赶，华为 MDC 政策强推 |\n| AR-HUD 光学 | ~25% | **~35%** | 50% | 水晶光电进入主要 HUD 供应链 |\n| 车规连接器 | ~22% | **~30%** | 45% | 立讯精密布局中，高压连接器差距大 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 国内智能驾驶竞争倒逼芯片国产化（结构性机会）**\n华为、地平线与比亚迪 / 理想 / 小鹏 / 奇瑞深度绑定，大众 / 奥迪也在中国采购地平线 Journey 6 芯片。国内汽车厂商 AI 算力军备竞赛推动 SoC 快速迭代，规模效应降低成本。\n\n**2. L3 商业化政策放开（监管催化）**\n工信部 / 公安部 2024 年开始试点有限场景 L3（高速 / 停车场），L3 一旦政策大范围落地，自动驾驶芯片（Nvidia Orin / 地平线）和高精度传感器（禾赛 / 速腾）需求量级提升。\n\n**3. 激光雷达国内出海（全球竞争力验证）**\n禾赛科技已出货全球 30+ 个国家，速腾聚创进入大众汽车供应链，是中国汽车零部件出海的标志性案例，也验证了国内 LiDAR 企业的技术竞争力。\n\n**4. 端到端大模型驾驶算法普及（硬件升级驱动）**\n特斯拉 FSD V12 / 小鹏 XNGP 端到端算法对算力需求远高于规则型算法，推动整车芯片从 Mobileye（固定指令）转向 Nvidia Orin（通用 GPU 算力），带动域控制器升级换代。\n\n**5. 华为 ADS 3.0 + 问界 / 鸿蒙智行生态带动供应链**\n华为智能驾驶方案（ADS 3.0）出现在 Mito、问界、享界等多个品牌，软件能力溢出带动德赛西威等域控制器供应商快速扩大营收。"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. Mobileye / Nvidia 对华出口政策**\nNvidia DRIVE Orin / Thor 已纳入出口管制考量（>规定算力上限），中国车企被迫转向地平线等国产芯片，形成国产替代窗口。\n\n**2. 激光雷达技术双用途（民用 / 军事）**\n禾赛 / 速腾的激光雷达面临美国国防部「中国军事公司」名单风险，一旦被列入将影响其全球供应链和美国上市地位。这是禾赛在美国 ADR 持续被做空的核心逻辑之一。\n\n**3. 汽车供应链局势（欧盟对华电动车关税）**\n欧盟 2024 年对中国电动车加征关税（最高 45.3%），影响整车出口，间接影响国内汽车电子零部件的产量预期。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| 自动驾驶级别 | L2+ 主流，L3 部分试点 | L3 高速场景政策大范围放开 | L3/L4 城区落地（有条件）|\n| 驾驶芯片算力 | 254 TOPS（Orin）主流 | 2000 TOPS（Nvidia Thor）量产 | 地平线 Journey 7（>1000 TOPS）|\n| 激光雷达成本 | $500-800 / 个（量产）| <$300 量产（MEMS / 半固态）| $100 固态 LiDAR 目标 |\n| 座舱 AI 能力 | 大模型语音助手（GPT-4 级接入）| 多模态感知（视觉+语音+手势）| 座舱 / 驾驶 AI 融合统一架构 |\n| 国产驾驶芯片 | 地平线 Journey 6 量产 | 地平线 Journey 7 发布（BEV+占主导）| 国产芯片进入欧美车厂供应链 |\n| AR-HUD | W-HUD 主流，AR-HUD 旗舰车 | AR-HUD 渗透率>15% | AR-HUD 标配（$30 万以上车型）|\n\n---\n\n---"}]},{"id":"11","num":12,"title":"AI 眼镜 / AR 眼镜","group":"新兴增长","hook":"Micro OLED/光波导/AR SoC，Meta Ray-Ban 定义品类","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">AI 眼镜要做到\"既能显示信息、又轻薄到能日常戴\"，最难的环节是<b>显示与光学</b>。怎么把一块指甲盖大小的微显示屏（Micro-OLED）发出的画面，\"塞\"进镜片、再精准投到人眼里，同时镜片还得是透明的能看见真实世界？答案是<b>光波导</b>——靠光在玻璃片内的<b>全反射</b>传播、再由<b>衍射光栅</b>把光\"出瞳\"到眼睛。这就是 AR 眼镜能做薄的核心黑科技。</div>\n\n<h3>一、光波导原理：让光在镜片里\"拐弯\"进眼睛</h3>\n<p>链路是这样的：<b>Micro-OLED</b> 微显示屏发出画面光 → 经<b>耦入光栅</b>把光\"折\"进一片很薄的玻璃（波导片）→ 光在玻璃上下表面之间<b>全内反射</b>不断弹射、向前传播（就像光在光纤里跑）→ 到达眼睛正前方时，<b>耦出光栅（衍射光栅）</b>把光按精确角度\"出瞳\"投射到瞳孔 → 与穿过镜片的真实世界光叠加，形成 AR 画面。整片波导是透明的，所以看起来就是一副普通眼镜。难点在<b>衍射光栅的纳米压印良率</b>和光效率，国产仍有差距。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 230\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"700\" fill=\"#13233f\">光波导 AR 显示原理：Micro-OLED → 波导全反射 → 衍射出瞳 → 人眼</text>\n  <!-- Micro-OLED -->\n  <rect x=\"40\" y=\"90\" width=\"80\" height=\"60\" rx=\"6\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <text x=\"80\" y=\"116\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"#b3261e\">Micro</text>\n  <text x=\"80\" y=\"132\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"#b3261e\">-OLED</text>\n  <text x=\"80\" y=\"170\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">微显示屏</text>\n  <!-- 波导片 -->\n  <rect x=\"180\" y=\"95\" width=\"420\" height=\"50\" rx=\"3\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\" opacity=\"0.55\"/>\n  <text x=\"390\" y=\"166\" text-anchor=\"middle\" font-size=\"10\" fill=\"#1f5fd6\">光波导玻璃片（透明，可看见真实世界）</text>\n  <!-- 耦入光栅 -->\n  <rect x=\"195\" y=\"95\" width=\"22\" height=\"50\" fill=\"#6a4bbf\" opacity=\"0.7\"/>\n  <text x=\"206\" y=\"86\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#4a2e9e\">耦入光栅</text>\n  <!-- 耦出光栅 -->\n  <rect x=\"500\" y=\"95\" width=\"22\" height=\"50\" fill=\"#6a4bbf\" opacity=\"0.7\"/>\n  <text x=\"511\" y=\"86\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#4a2e9e\">衍射出瞳光栅</text>\n  <!-- 光从OLED进入 -->\n  <line x1=\"120\" y1=\"120\" x2=\"195\" y2=\"120\" stroke=\"#e8b923\" stroke-width=\"3\" marker-end=\"url(#a11)\"/>\n  <!-- 全反射 zigzag -->\n  <polyline points=\"217,120 255,103 293,137 331,103 369,137 407,103 445,137 483,103 500,120\" fill=\"none\" stroke=\"#e8b923\" stroke-width=\"2.5\"/>\n  <text x=\"360\" y=\"200\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#8a6d1a\">光在玻璃内全内反射传播（之字形弹射）</text>\n  <!-- 出瞳到眼 -->\n  <line x1=\"511\" y1=\"120\" x2=\"600\" y2=\"120\" stroke=\"#e8b923\" stroke-width=\"3\" marker-end=\"url(#a11)\"/>\n  <!-- 眼睛 -->\n  <ellipse cx=\"650\" cy=\"120\" rx=\"26\" ry=\"16\" fill=\"#fff\" stroke=\"#0f8a7e\" stroke-width=\"1.5\"/>\n  <circle cx=\"650\" cy=\"120\" r=\"7\" fill=\"#0f8a7e\"/>\n  <text x=\"650\" y=\"160\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0f8a7e\">人眼</text>\n  <defs><marker id=\"a11\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#e8b923\"/></marker></defs>\n</svg>\n</div>\n\n<h3>二、光波导 vs Birdbath：两条显示路线</h3>\n<p>显示方案目前是两条路线之争。<b>光波导</b>是 AR 真显示的终极形态，最轻薄、透光好，但工艺极难、成本高、亮度损失大；<b>Birdbath（反射棱镜）</b>用一块半透半反的棱镜把 Micro-OLED 的光折射到眼睛，光效率高、成本低、画质好，但体积偏大、偏向观影类 AR。当前低成本主流是 Birdbath/直接显示（如 Meta Ray-Ban 同类），光波导随良率提升逐步上量。</p>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">光波导（AR 真显示·终极形态）</div>全反射+衍射出瞳，最轻薄透明、可日常佩戴；难点在衍射光栅纳米压印良率与光效率。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('002273','水晶光电','A股')\">水晶光电</span>（最大弹性）· 珑璟光电 / 灵犀微光（未上市）</span></div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">Birdbath（反射棱镜·低成本主流）</div>半透半反棱镜折射成像，光效率高、成本低、画质好，但体积偏大。<br><span class=\"pc-s\">代表：舜宇光学（港股 HK2382）· Meta Ray-Ban 同类方案</span></div>\n</div>\n\n<h3>三、计算与传感：让眼镜\"聪明\"起来</h3>\n<p>除了显示，AI 眼镜还需要：<b>AR SoC</b> 跑应用与端侧 AI（高通 QXR 系列垄断、软件生态锁定）；<b>端侧 NPU</b> 做语音/图像推理（这是国产恒玄科技切入的口子）；以及<b>摄像头、MEMS 麦克风、IMU/眼动追踪</b>等传感交互——后者国产模组已具全球竞争力。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 130\" width=\"100%\">\n  <g font-size=\"10.5\" text-anchor=\"middle\">\n  <rect x=\"20\" y=\"45\" width=\"150\" height=\"50\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/><text x=\"95\" y=\"66\" font-weight=\"700\" fill=\"#b3261e\">AR SoC</text><text x=\"95\" y=\"82\" font-size=\"9\" fill=\"#7a2020\">高通垄断·生态锁定</text>\n  <rect x=\"200\" y=\"45\" width=\"150\" height=\"50\" rx=\"8\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/><text x=\"275\" y=\"66\" font-weight=\"700\" fill=\"#4a2e9e\">端侧 NPU</text><text x=\"275\" y=\"82\" font-size=\"9\" fill=\"#4a2e9e\">语音/图像推理</text>\n  <rect x=\"380\" y=\"45\" width=\"150\" height=\"50\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"455\" y=\"66\" font-weight=\"700\" fill=\"#1f5fd6\">摄像头模组</text><text x=\"455\" y=\"82\" font-size=\"9\" fill=\"#5b6577\">国产具竞争力</text>\n  <rect x=\"560\" y=\"45\" width=\"160\" height=\"50\" rx=\"8\" fill=\"#e6f5f1\" stroke=\"#0f8a7e\"/><text x=\"640\" y=\"66\" font-weight=\"700\" fill=\"#0f8a7e\">MEMS 麦克风/IMU</text><text x=\"640\" y=\"82\" font-size=\"9\" fill=\"#0a6a60\">语音+眼动交互</text>\n  </g>\n</svg>\n</div>\n<p><b>国产标的：</b>计算芯片 AR SoC 高通主导，国产 <span class=\"tk\" onclick=\"openDetail('603893','瑞芯微','A股')\">瑞芯微</span>（RK3588 备选）· <span class=\"tk\" onclick=\"openDetail('300458','全志科技','A股')\">全志科技</span>；端侧 NPU 主力 <span class=\"tk\" onclick=\"openDetail('688608','恒玄科技','A股')\">恒玄科技</span>（AI 眼镜语音交互芯片）。光学元件：精密镜片 <span class=\"tk\" onclick=\"openDetail('002273','水晶光电','A股')\">水晶光电</span> · <span class=\"tk\" onclick=\"openDetail('002456','欧菲光','A股')\">欧菲光</span>，DOE 衍射光学 <span class=\"tk\" onclick=\"openDetail('688195','腾景科技','A股')\">腾景科技</span>。传感与组装：MEMS 麦克风/代工龙头 <span class=\"tk\" onclick=\"openDetail('002241','歌尔股份','A股')\">歌尔股份</span> · <span class=\"tk\" onclick=\"openDetail('002475','立讯精密','A股')\">立讯精密</span>；显示 Micro-OLED 国产研发期（<span class=\"tk\" onclick=\"openDetail('000725','京东方','A股')\">京东方</span> · <span class=\"tk\" onclick=\"openDetail('002387','维信诺','A股')\">维信诺</span>，Sony 独家量产）。整机品牌（Meta、华为、小米、字节）多未上市或海外。</p>\n\n</div>\n"},{"t":"一、显示模组","k":"group","note":"最高技术壁垒环节，Micro OLED 由 Sony 垄断，光波导是 AR 真显示核心，Birdbath 为低成本主流方案。","children":[{"t":"1.1 Micro OLED","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["Micro OLED","Sony (6758.T，全球唯一大规模量产)","京东方、维信诺、视涯科技","000725、002387、未上市","Sony 独家量产，国内研发/扩产期"]]},{"t":"1.2 光波导（Waveguide）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["光波导","Dispelix（芬兰） / Lumus（以色列） / WaveOptics（Snap 旗下）","水晶光电、珑璟光电、灵犀微光","002273、未上市、未上市","SRG 纳米压印良率与设计能力仍差距"]]},{"t":"1.3 Birdbath 反射棱镜","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["Birdbath","Luxexcel（荷兰）","舜宇光学、玉晶光 (3406.TW)","HK2382、—","低成本方案，Meta Ray-Ban 同类"]]}]},{"t":"二、光学元件","k":"group","note":"决定成像质量、体积与成本；精密镜片国产已有优势，DOE 与高端镜架仍待突破。","children":[{"t":"2.1 精密光学镜片","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["精密光学镜片","Largan (3008.TW) / Zeiss（德，私有） / Viavi (VIAV)","水晶光电、欧菲光","002273、002456","水晶光电最大弹性标的"]]},{"t":"2.2 DOE 衍射光学元件","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["DOE 衍射光学","HOLO/OR（以色列） / Jenoptik (JEN.DE)","腾景科技","688195","光波导核心光学部件，国产追赶"]]},{"t":"2.3 镜架 / 铰链","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["镜架 / 铰链","EssilorLuxottica (EL.PA) / Safilo（意大利）","明月镜片、精诚工科","301101、未上市","眼镜形态集成，国产光学镜片切入"]]}]},{"t":"三、计算芯片","k":"group","note":"AR SoC 高通垄断且软件生态锁定，端侧 NPU 国产借音频/边缘 AI 路径切入。","children":[{"t":"3.1 AR SoC","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["AR SoC","Qualcomm (QCOM，QXR8450/8550 主导)","瑞芯微、全志科技、华为麒麟","603893、300458、未上市","高通主导，瑞芯微 RK3588 为备选"]]},{"t":"3.2 端侧 AI 推理 NPU","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["端侧 NPU","Qualcomm (QCOM) / Google Edge TPU (GOOGL)","恒玄科技、地平线","688608、HK9660","恒玄 AI 眼镜语音交互芯片主力"]]}]},{"t":"四、传感摄像","k":"group","note":"摄像头模组与 MEMS 麦克风国产已具全球竞争力，眼动/IMU 交互仍处早期。","children":[{"t":"4.1 AI 摄像头模组","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["摄像头模组","LG Innotek (011070.KS) / Sony 模组业务","欧菲光、舜宇光学、丘钛科技","002456、HK2382、HK1478","欧菲光/舜宇/丘钛全球有竞争力"]]},{"t":"4.2 MEMS 麦克风","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["MEMS 麦克风","Knowles (KN) / TDK-InvenSense (6762.T)","歌尔股份","002241","歌尔声学快速追赶 Knowles"]]},{"t":"4.3 IMU / 眼动追踪","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["IMU / 眼动追踪","Tobii (TOBII.ST) / Eyeware（私有）","奥比中光","688322","ToF+眼动追踪，AR 交互核心"]]}]},{"t":"五、整机品牌与组装","k":"group","note":"Meta Ray-Ban 定义当前市场，国产品牌快速追赶；歌尔/立讯/领益主导组装与精密件。","children":[{"t":"5.1 整机品牌","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["整机品牌","Meta Ray-Ban (META) / Snap (SNAP) / Apple (AAPL)","华为、小米、字节跳动、百度小度","未上市、未上市、未上市、未上市","Meta 当前市场定义者，国产追赶"]]},{"t":"5.2 整机组装 / 精密结构件","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["整机代工","Foxconn 连接器 (FIT)","歌尔股份、立讯精密、领益智造","002241、002475、002600","歌尔/立讯 VR/AR 代工能力强"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| AR SoC 芯片 | ~$15 亿 | 60-68% | **约 22%** | **Qualcomm (QCOM)**——主导 |\n| Micro OLED 显示 | ~$20 亿 | 45-55% | **约 21%** | **Sony（6758.T）**——垄断 |\n| 光波导模组 | ~$8 亿 | 50-62% | **约 12%** | 珑璟（未上市）、WaveOptics（Snap 旗下）|\n| 精密光学镜片 | ~$12 亿 | 40-50% | **约 13%** | 水晶光电 002273、大立光（3008.TW）|\n| 摄像头模组 | ~$15 亿 | 22-32% | **约 10%** | 欧菲光 002456、舜宇（港股 2382）|\n| 整机品牌增值 | ~$20 亿 | 35-45% | **约 18%** | Meta Ray-Ban (META)、Apple (AAPL) |\n| MEMS 麦克风 | ~$5 亿 | 45-55% | **约 6%** | 歌尔股份 002241、Knowles (KN) |"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| 光学镜片（普通 / 非球面）| ~48% | **~58%** | 72% | 水晶光电 / 欧菲光已有优势 |\n| 光波导衍射光学 | ~10% | **~18%** | 32% | SRG 纳米压印良率，设计能力差距 |\n| Micro OLED | ~3% | **~6%** | 15% | Sony 独家量产，国内研发期 |\n| AR SoC 芯片 | ~2% | **~4%** | 10% | 高通 QXR8450 主导，软件生态锁定 |\n| 摄像头模组 | ~55% | **~65%** | 75% | 欧菲光 / 舜宇 / 丘钛全球有竞争力 |\n| MEMS 麦克风 | ~35% | **~45%** | 58% | 歌尔声学快速追赶 Knowles |\n| 整机代工 | ~55% | **~65%** | 75% | 歌尔 / 立讯 VR 代工能力强 |\n| 整机品牌（中国市场）| ~30% | **~48%** | 65% | 华为 / 小米快速追赶 Meta |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. Meta Ray-Ban 2 \n\n**1. Meta Ray-Ban 2 爆款效应带动 AI 眼镜品类渗透**\nMeta Ray-Ban 二代 2024年出货量突破 400 万副，验证\"无AR显示、纯AI助手\"路线的市场可行性。国内华为、小米、字节将2025年定为AI眼镜集中发布年，预计合计出货超200万副。**受益标的**：欧菲光（002456，摄像头模组）、水晶光电（002273，光学镜片）、歌尔股份（002241，声学+组装）。\n\n**2. 苹果 Vision Pro 生态降维至消费级**\n苹果预计2025-2026年推出 Vision Pro Lite（定价＜2500美元），带动全球 Micro OLED、光波导供应链扩产。A股联创电子（002036）、水晶光电等已进入苹果光学供应链预备名单。**受益标的**：水晶光电（002273）、联创电子（002036）、京东方A（000725，Micro OLED 扩产）。\n\n**3. 国内 AI 大模型轻量化端侧部署**\n文心、通义、混元 Lite 版本参数量压缩至 1B 以下，支持眼镜端 NPU 本地运行。本地推理消除隐私顾虑，是企业级/政务级 AI 眼镜铺量的前提。**受益标的**：瑞芯微（603893，边缘 AI 芯片）、恒玄科技（688608，TWS+AI 芯片）。\n\n**4. 大基金三期+专项补贴加速 Micro OLED 国产线投产**\nMicro OLED 当前良率约 60-65%，良率爬坡是成本下降关键。2025年京东方成都 Micro OLED 6代线、维信诺柔性线进入量产准备期，规模化后 BOM 成本有望下降 30-40%。**受益标的**：京东方A（000725）、维信诺（002387）。\n\n**5. 光波导国产化突破，衍射光栅量产**\n珑璟光电、灵犀微光完成 A+/B 轮融资，衍射光波导 FOV 达到 50°+、透过率 ＞70%，接近商用门槛。2025-2026年有望完成对 Birdbath 的技术代差追平，引发整机 BOM 重构。**受益标的**：水晶光电（002273，精密光学件配套）、欧菲光（002456，模组代工）。\n\n---\n\n### 6. 地缘政治 / 外部风险\n\n**① 美国对华 XR 芯片出口管制扩围**\n高通 Snapdragon XR2 Gen2 已列入 Entity List 审查范围，若升级管控，国内 AR 眼镜量产芯片来源切换至瑞芯微 RK3588 或恒玄，性能差距约1-2代，影响旗舰产品体验。\n\n**② Micro OLED 设备及材料依赖日本**\n蒸镀设备（佳能特机 Canon Tokki）、OLED 发光材料（出光兴产、默克）均受日本/德国出口管控。国内替代方案（蒸镀：华宇新能，材料：瑞联新材 688550）尚在中试阶段，供应中断风险约2-3年内仍高。\n\n**③ 台积电先进封装产能限制**\nAR SoC 多依赖台积电 4nm/3nm 工艺，两岸紧张局势下供应链单点风险显著。大陆代工替代方案：中芯国际 N+2 工艺（约7-8nm 等效），性能功耗不达标。\n\n**④ 稀土/铟出口管制对波导材料影响**\nInP（磷化铟）光波导依赖铟，中国2023年已启动铟出口许可证管理。若收紧，影响部分激光扫描方案（LSS）波导供应链。\n\n---\n\n### 7. 技术路线图 2025–2028\n\n| 技术方向 | 2025 | 2026 | 2027-2028 |\n|---------|------|------|-----------|\n| 显示方案 | AI眼镜（无显示）爆量；Birdbath折叠光学普及 | Micro OLED量产跌价30%；衍射光波导中高端应用 | 全息光波导/体全息成熟；瞳孔重建型显示 |\n| AI能力 | 端侧NPU+云端混合推理 | 1B模型完全本地化；多模态理解 | 持续学习、个人记忆AI助理 |\n| 芯片 | 高通XR2 Gen2；国内瑞芯微入局 | 3nm专用AR SoC量产 | 车规级AR SoC兼顾HUD场景 |\n| 交互 | 语音+手势为主 | 眼动追踪+语音融合 | 神经接口辅助（研究阶段） |\n| 整机形态 | 普通眼镜外形（Ray-Ban类） | 轻薄AR（重量＜60g，FOV≥40°） | 全天候 AR 眼镜（FOV≥70°，全日续航） |\n\n---\n\n---"},{"t":"附 · 地缘政治风险","k":"md","md":"**① 美国对华 XR 芯片出口管制扩围**\n高通 Snapdragon XR2 Gen2 已列入 Entity List 审查范围，若升级管控，国内 AR 眼镜量产芯片来源切换至瑞芯微 RK3588 或恒玄，性能差距约1-2代，影响旗舰产品体验。\n\n**② Micro OLED 设备及材料依赖日本**\n蒸镀设备（佳能特机 Canon Tokki）、OLED 发光材料（出光兴产、默克）均受日本/德国出口管控。国内替代方案（蒸镀：华宇新能，材料：瑞联新材 688550）尚在中试阶段，供应中断风险约2-3年内仍高。\n\n**③ 台积电先进封装产能限制**\nAR SoC 多依赖台积电 4nm/3nm 工艺，两岸紧张局势下供应链单点风险显著。大陆代工替代方案：中芯国际 N+2 工艺（约7-8nm 等效），性能功耗不达标。\n\n**④ 稀土/铟出口管制对波导材料影响**\nInP（磷化铟）光波导依赖铟，中国2023年已启动铟出口许可证管理。若收紧，影响部分激光扫描方案（LSS）波导供应链。\n\n---"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 | 2026 | 2027-2028 |\n|---------|------|------|-----------|\n| 显示方案 | AI眼镜（无显示）爆量；Birdbath折叠光学普及 | Micro OLED量产跌价30%；衍射光波导中高端应用 | 全息光波导/体全息成熟；瞳孔重建型显示 |\n| AI能力 | 端侧NPU+云端混合推理 | 1B模型完全本地化；多模态理解 | 持续学习、个人记忆AI助理 |\n| 芯片 | 高通XR2 Gen2；国内瑞芯微入局 | 3nm专用AR SoC量产 | 车规级AR SoC兼顾HUD场景 |\n| 交互 | 语音+手势为主 | 眼动追踪+语音融合 | 神经接口辅助（研究阶段） |\n| 整机形态 | 普通眼镜外形（Ray-Ban类） | 轻薄AR（重量＜60g，FOV≥40°） | 全天候 AR 眼镜（FOV≥70°，全日续航） |\n\n---\n\n---"}]},{"id":"13","num":13,"title":"信创 / 国产软件","group":"国产替代","hook":"CPU/OS/数据库/中间件，政策强驱动国产替代","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">信创（信息技术应用创新）的目标只有一句话：<b>把信息系统从底层芯片到上层应用，整条技术栈都换成自主可控的国产货</b>。从 CPU/GPU、操作系统、数据库、中间件，一直到 ERP/办公应用，每一层都要有国产替代。驱动力是<b>去美化、安全可控、以及党政与关键行业的政策强制采购</b>——这是一条由政策确定性托底、自下而上层层替换的长期主线。</div>\n\n<h3>一、为什么信创是\"全栈自主可控\"</h3>\n<p>一套完整的信息系统像一座大厦：最底下是<b>硬件底座</b>（CPU/GPU/服务器/存储），中间是<b>基础软件</b>（操作系统、数据库、中间件），上面是<b>行业应用</b>（ERP、办公、GIS），再加一条贯穿全栈的<b>网络安全</b>。过去这些环节大量依赖 Intel、微软、Oracle、SAP 等美国厂商。信创就是要把每一层都替换成国产——而且<b>各层必须互相适配兼容</b>（比如麒麟操作系统要能跑在龙芯 CPU 上、达梦数据库要能装在麒麟上），这种\"全栈生态打通\"才是真正的壁垒。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 300\" width=\"100%\">\n  <text x=\"290\" y=\"20\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"700\" fill=\"#13233f\">信创技术栈分层（自下而上替换）</text>\n  <!-- SaaS 应用 -->\n  <rect x=\"60\" y=\"35\" width=\"460\" height=\"46\" rx=\"6\" fill=\"#e6f5f1\" stroke=\"#0f8a7e\"/>\n  <text x=\"290\" y=\"54\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"700\" fill=\"#0f8a7e\">③ SaaS 行业应用</text>\n  <text x=\"290\" y=\"71\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#0a6a60\">ERP/财务 · OA 协同 · WPS 办公 · GIS（用友/金山/泛微/超图）</text>\n  <!-- PaaS 基础软件 -->\n  <rect x=\"60\" y=\"90\" width=\"460\" height=\"46\" rx=\"6\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n  <text x=\"290\" y=\"109\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"700\" fill=\"#4a2e9e\">② PaaS 基础软件</text>\n  <text x=\"290\" y=\"126\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#4a2e9e\">操作系统（麒麟/统信）· 数据库（达梦）· 中间件（东方通/宝兰德）</text>\n  <!-- IaaS 底座 -->\n  <rect x=\"60\" y=\"145\" width=\"460\" height=\"46\" rx=\"6\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <text x=\"290\" y=\"164\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"700\" fill=\"#1f5fd6\">① IaaS 硬件底座</text>\n  <text x=\"290\" y=\"181\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5b6577\">CPU（龙芯/飞腾）· GPU（景嘉微）· 服务器/存储（浪潮）</text>\n  <!-- 适配箭头 -->\n  <g stroke=\"#94a3b8\" stroke-width=\"1.6\" marker-end=\"url(#a13)\" marker-start=\"url(#a13s)\">\n   <line x1=\"290\" y1=\"145\" x2=\"290\" y2=\"136\"/>\n   <line x1=\"290\" y1=\"90\" x2=\"290\" y2=\"81\"/>\n  </g>\n  <defs>\n   <marker id=\"a13\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#94a3b8\"/></marker>\n   <marker id=\"a13s\" markerWidth=\"7\" markerHeight=\"7\" refX=\"0\" refY=\"3\" orient=\"auto\"><path d=\"M5,0 L0,3 L5,6 Z\" fill=\"#94a3b8\"/></marker>\n  </defs>\n  <!-- 安全贯穿全栈 -->\n  <rect x=\"545\" y=\"35\" width=\"135\" height=\"156\" rx=\"6\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <text x=\"612\" y=\"100\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"700\" fill=\"#b3261e\">④ 网络安全</text>\n  <text x=\"612\" y=\"120\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">（贯穿全栈）</text>\n  <text x=\"612\" y=\"138\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">防火墙·零信任</text>\n  <text x=\"612\" y=\"153\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">国密·数据安全</text>\n  <!-- 驱动力 -->\n  <text x=\"370\" y=\"225\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#13233f\">驱动力：去美化 · 安全可控 · 党政/关键行业政策强制采购</text>\n  <rect x=\"120\" y=\"240\" width=\"160\" height=\"40\" rx=\"6\" fill=\"#fff7e6\" stroke=\"#e8b923\"/><text x=\"200\" y=\"265\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8a6d1a\">党政先行 → 八大行业</text>\n  <rect x=\"300\" y=\"240\" width=\"160\" height=\"40\" rx=\"6\" fill=\"#fff7e6\" stroke=\"#e8b923\"/><text x=\"380\" y=\"265\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8a6d1a\">外资退出 → 国产放量</text>\n  <rect x=\"480\" y=\"240\" width=\"160\" height=\"40\" rx=\"6\" fill=\"#fff7e6\" stroke=\"#e8b923\"/><text x=\"560\" y=\"265\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8a6d1a\">替换有时间表/确定性</text>\n</svg>\n</div>\n\n<h3>二、各层国产化进度不一</h3>\n<p>替换难度自下而上递增、进度也参差。<b>网络安全</b>国产化已基本完成、外资加速退出；<b>应用层</b>（办公、OA、ERP）党政渗透率较高；<b>基础软件</b>（OS、数据库）国产可用但生态仍在补；<b>硬件底座</b>尤其 CPU/GPU 性能与 Intel/Nvidia 仍有 20-30% 差距，是最硬的骨头。越靠底层、替换越难，但一旦切入粘性也越强。</p>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">替换较易 / 进度领先</div>网络安全（已基本完成）· 办公/OA/WPS · GIS——党政场景渗透率高、外资退出快。</div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">替换最难 / 卡点所在</div>CPU/GPU 性能差距 20-30%；核心数据库与 OS 生态适配仍在补——底层自主可控是攻坚重点。</div>\n</div>\n\n<h3>三、全栈国产龙头标的</h3>\n<p>注意：信创最核心的 OS（麒麟/统信）、龙头数据库（达梦/人大金仓）多<b>未上市</b>，已上市标的因此享稀缺溢价。</p>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">① IaaS 底座</div>CPU：<span class=\"tk\" onclick=\"openDetail('688047','龙芯中科','A股')\">龙芯中科</span>（LoongArch 自主，飞腾/申威未上市）；GPU：<span class=\"tk\" onclick=\"openDetail('300474','景嘉微','A股')\">景嘉微</span>（军用迁入党政）；服务器/存储：<span class=\"tk\" onclick=\"openDetail('000977','浪潮信息','A股')\">浪潮信息</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">② PaaS 基础软件</div>数据库/中间件：<span class=\"tk\" onclick=\"openDetail('688058','宝兰德','A股')\">宝兰德</span> · <span class=\"tk\" onclick=\"openDetail('300379','东方通','A股')\">东方通</span>（达梦/人大金仓未上市）；虚拟化云：<span class=\"tk\" onclick=\"openDetail('688152','麒麟信安','A股')\">麒麟信安</span>（OS 麒麟/统信均未上市）</div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">③ SaaS 行业应用</div>ERP/财务：<span class=\"tk\" onclick=\"openDetail('600588','用友网络','A股')\">用友网络</span> · <span class=\"tk\" onclick=\"openDetail('600756','浪潮软件','A股')\">浪潮软件</span>（金蝶 HK0268）；OA：<span class=\"tk\" onclick=\"openDetail('603039','泛微网络','A股')\">泛微网络</span> · <span class=\"tk\" onclick=\"openDetail('688369','致远互联','A股')\">致远互联</span>；办公：<span class=\"tk\" onclick=\"openDetail('688111','金山办公','A股')\">金山办公</span>（WPS）；GIS：<span class=\"tk\" onclick=\"openDetail('300036','超图软件','A股')\">超图软件</span></div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">④ 网络安全（贯穿全栈）</div>防火墙：<span class=\"tk\" onclick=\"openDetail('300454','深信服','A股')\">深信服</span> · <span class=\"tk\" onclick=\"openDetail('002212','天融信','A股')\">天融信</span>；零信任/EDR：<span class=\"tk\" onclick=\"openDetail('688561','奇安信','A股')\">奇安信</span>；国密：<span class=\"tk\" onclick=\"openDetail('002268','卫士通','A股')\">卫士通</span> · <span class=\"tk\" onclick=\"openDetail('688489','三未信安','A股')\">三未信安</span>；数据安全：<span class=\"tk\" onclick=\"openDetail('688023','安恒信息','A股')\">安恒信息</span></div>\n</div>\n<p style=\"margin-top:6px\">行业实施落地主力：银行 <span class=\"tk\" onclick=\"openDetail('000555','神州信息','A股')\">神州信息</span> · 系统迁移 <span class=\"tk\" onclick=\"openDetail('301236','软通动力','A股')\">软通动力</span> · 保险 <span class=\"tk\" onclick=\"openDetail('603927','中科软','A股')\">中科软</span>。</p>\n\n</div>\n"},{"t":"一、IaaS 底座","k":"group","note":"国产 CPU/GPU/存储；CPU 党政渗透率快速提升，性能仍有差距，GPU 借军用迁入信创。","children":[{"t":"1.1 国产 CPU","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["国产 CPU","Intel (INTC) / AMD","龙芯中科、飞腾信息、申威","688047、未上市、未上市","龙芯 LoongArch 自主，性能差 20-30%"]]},{"t":"1.2 国产 GPU / AI 加速","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["国产 GPU","Nvidia (NVDA) / AMD","景嘉微、摩尔线程","300474、未上市","景嘉微军用 GPU 迁入党政信创"]]},{"t":"1.3 国产存储 / 信创服务器","columns":["细分 ["细分","全球龙头","国产龙头","代码","现状"],"rows":[["密码安全","Thales（法） / Entrust（美）","卫士通（电科网安）、三未信安","002268、688489","国密 SM 系列替换倒计时倒逼放量"]]},{"t":"4.4 数据安全 / 数据库审计","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["数据安全","Imperva（美） / Varonis (VRNS)","安恒信息","688023","数据库审计与数据安全龙头"]]}]},{"t":"五、行业 IT 实施与服务","k":"table","note":"补充标的：金融/银行、保险及通用信创迁移实施主力，承接核心系统替换攻坚。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["银行 IT 实施","IBM / Accenture (ACN)","神州信息","000555","银行信创核心实施商"],["IT 服务 / 系统迁移","Accenture (ACN) / IBM","软通动力","301236","信创系统迁移实施主力"],["保险 IT 实施","IBM / Accenture (ACN)","中科软","603927","保险行业信创最大受益方"]]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 市场规模(2025E) | 毛利率 | 占链条总价值% | 代表龙头 |\n|------|--------------|--------|------------|---------|\n| 国产 CPU/GPU | ~80亿元 | 45-60% | 12% | 龙芯中科 688047、景嘉微 300474 |\n| 操作系统 | ~90亿元 | 70-80% | 18% | 麒麟/统信（未上市） |\n| 数据库 | ~120亿元 | 75-85% | 26% | 达梦/人大金仓（未上市）、宝兰德 688058 |\n| 中间件 | ~60亿元 | 65-75% | 11% | 东方通 300379、宝兰德 688058 |\n| ERP/行业应用 | ~150亿元 | 50-65% | 24% | 用友网络 600588、金山办公 688111 |\n| 网络安全 | ~80亿元 | 55-70% | 9% | 奇安信 688561、深信服 300454 |\n\n> 数据库和 ERP/行业应用合计贡献约50%利润池，但上市标的稀缺（核心数据库企业均未上市），导致已上市 A 股享受\"稀缺溢价\"。\n\n---"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023年 | 2025E | 2027目标 | 主要卡点 |\n|-------|--------|-------|---------|---------|\n| 党政 CPU | ~30% | ~55% | 80% | 指令集生态（软件兼容性）、性能差距约20-30% |\n| 党政操作系统 | ~45% | ~70% | 90% | 驱动程序适配覆盖率不足（外设兼容） |\n| 党政数据库 | ~40% | ~65% | 85% | 高并发性能、Oracle 迁移成本极高 |\n| 党政中间件 | ~50% | ~72% | 88% | WebLogic/JBoss 迁移工作量 |\n| 党政 OA/ERP | ~55% | ~75% | 90% | 定制化需求繁杂，实施周期长 |\n| 国企/金融信创 | ~20% | ~35% | 60% | 性能稳定性、历史数据迁移风险 |\n| 网络安全国产化 | ~60% | ~75% | 90% | 已基本完成，外资退出加速 |\n\n---"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 党政信创三期采购周期启动（2025-2027年）**\n一期（2022-2023）覆盖党政核心系统，二期（2024）延伸至事业单位，三期预计启动全面国企铺量。预计三期采购规模约2000亿元/年，同比增长约35%。**受益标的**：用友网络（600588）、金山办公（688111）、泛微网络（603039）、东方通（300379）。\n\n**2. 金融行业信创\"核心系统替换\"进入攻坚期**\n银保监会要求2027年底国有大行核心系统完成信创替换，核心银行系统（科目/账务）迁移成本极高（单行10-50亿元），一旦启动采购额巨大。**受益标的**：宝兰德（688058，中间件）、东方通（300379）、神州信息（000555，银行IT）。\n\n**3. AI 大模型与信创深度融合（\"信创+AI\"双轮驱动）**\n华为盘古、百度文心嵌入政务云+信创操作系统，麒麟软件计划2025年推出 KylinAI 版本，将国产 LLM 直接集成至桌面OS。**受益标的**：龙芯中科（688047，AI推理适配）、金山办公（688111，WPS AI信创版）。\n\n**4. 国密算法强制落地时间表倒逼密码国产化**\n国家密码局要求2025年底前金融、关基系统完成 SM2/SM3/SM4 国密算法替换，SSL 证书、VPN、数据库加密均需重建。**受益标的**：卫士通（002268）、三未信安（688489）、奇安信（688561）。\n\n**5. 央国企 IT 预算向自主可控倾斜（考核指标化）**\n国资委将\"信创采购比例\"纳入央企数字化转型考核指标，2025年目标央企核心业务系统信创比例≥60%。采购行为从自愿转为强制完成考核，需求确定性大幅提升。**受益标的**：用友网络（600588）、浪潮信息（000977）、深信服（300454）。\n\n---"},{"t":"附 · 地缘政治风险","k":"md","md":"**① 美国制裁国产 CPU 设计工具（EDA 断供）**\n龙芯、飞腾等 CPU 设计依赖 Synopsys、Cadence EDA 工具；若 BIS 将其列入出口管制，国产替代（华大九天 301269）尚需3-5年成熟，新一代 CPU 迭代速度将放缓。\n\n**② 国产软件性能差距触发\"假替换\"风险**\n部分信创采购停留于\"采购备用、实际运行仍用 Oracle/Windows\"，若政府加强审计，短期采购会出现虚报，实质渗透率低于统计数据，存在估值泡沫风险。\n\n**③ 开源协议风险（Linux/PostgreSQL 基础开放性）**\n麒麟、统信均基于 Linux 内核；PostgreSQL 系数据库（如 openGauss）依赖开源社区。若美国以\"军事用途\"为由对开源协议施加条款限制（参照 ITAR 对开源的讨论），影响国产 OS/DB 合规性。\n\n**④ 市场化环境竞争：民企抵制\"行政信创\"**\n民营企业对信创采购无强制要求，倾向于选择 AWS/Azure/Oracle 保持竞争力；信创市场高度依赖行政推动，若政策力度退坡，市场规模扩展预期将落空。\n\n---"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 | 2026 | 2027-2028 |\n|---------|------|------|-----------|\n| CPU 性能 | 龙芯3A6000性能对标Intel十代i5；龙芯3C6000服务器版发布 | 3A7000（7nm）流片；飞腾 FT-2500+ | 逼近Intel主流服务器性能的80% |\n| 数据库 | 达梦 DM8 TPC-C 世界级基准测试通过 | 分布式事务数据库成熟化 | 完成国有大行核心系统替换 |\n| 操作系统 | 麒麟V10 SP3全面支持龙芯/飞腾/申威 | KylinAI桌面版发布 | 服务器OS市场份额≥40%（党政领域） |\n| AI融合 | WPS AI信创版；政务云LLM落地试点 | 国产AI助手内嵌信创OS | 具备完整AI-native信创软件栈 |\n| 安全 | 全面国密算法替换（金融/关基） | 量子密码试点（QKD网络接入信创） | 抗量子密码标准国产化落地 |\n\n---\n\n---"}]}],"tickers":{"01":[{"name":"中金岭南","code":"000060","market":"A股","role":""},{"name":"东方钽业","code":"000962","market":"A股","role":""},{"name":"康强电子","code":"002119","market":"A股","role":"龙头"},{"name":"TCL中环","code":"002129","market":"A股","role":""},{"name":"通富微电","code":"002156","market":"A股","role":""},{"name":"华天科技","code":"002185","market":"A股","role":""},{"name":"北方华创","code":"002371","market":"A股","role":""},{"name":"多氟多","code":"002407","market":"A股","role":"龙头"},{"name":"雅 function mcTxt(code,market){
  const d=DATA.details[code];
  if(d&&d.mcap!=null) return ` <small class="mc">${d.mcap}${market==='港股'?'亿HK':'亿'}</small>`;
  return '';
}
function tokenCN(name,code){
  name=String(name).trim(); code=String(code||'').trim();
  if(/^[0368]\d{5}$/.test(code))
    return `<span class="tk" onclick="openDetail('${code}','${esc(name)}','A股')"><b>${code}</b> ${esc(name)}${mcTxt(code,'A股')}</span>`;
  if(/^HK\d{3,5}$/.test(code)){const c=code.slice(2);
    return `<span class="tk hk" onclick="openDetail('${c}','${esc(name)}','港股')"><b>${c}</b> ${esc(name)}${mcTxt(c,'港股')}</span>`;}
  return `<span class="tk dim">${esc(name)}<span class="tkx">${esc(code||'未上市')}</span></span>`;
}
function cnCell(names,codes){
  const ns=String(names).split(/[、,，/]+/).map(s=>s.trim()).filter(Boolean);
  const cs=String(codes).split(/[、,，/\s]+/).map(s=>s.trim()).filter(Boolean);
  return ns.map((nm,i)=>tokenCN(nm,cs[i]||'')).join('<br>');
}
function globalCell(text){
  let s=esc(String(text));
  FK.forEach(name=>{
    const en=esc(name);
    if(s.includes(en) && !s.includes('data-fx="'+en+'"')){
      const f=FOREIGN[name];
      const tok=`<span class="tk fx" data-fx="${en}" onclick="openForeign('${f.t}','${en.replace(/'/g,'')}','${f.m}')"><b>${f.t}</b> ${en}</span>`;
      s=s.split(en).join(tok);
    }
  });
  return s;
}
function renderTable(t){
  const cols=t.columns;
  const ci=cols.indexOf('代码');
  let li=cols.findIndex(c=>c.includes('国产'));
  if(li<0) li=cols.findIndex(c=>c.includes('龙头'));
  const gi=cols.findIndex(c=>c.includes('全球'));
  const out=cols.map((c,i)=>i).filter(i=>i!==ci);   // 删掉独立“代码”列
  let h='<table class="dt"><thead><tr>'+out.map(i=>`<th>${esc(cols[i])}</th>`).join('')+'</tr></thead><tbody>';
  for(const r of t.rows){
    h+='<tr>'+out.map(i=>{
      if(i===li) return `<td class="cn-lead">${cnCell(r[li], ci>=0?r[ci]:'')}</td>`;
      if(i===gi) return `<td>${globalCell(r[i])}</td>`;
      return `<td>${esc(r[i])}</td>`;
    }).join('')+'</tr>';
  }
  return h+'</tbody></table>';
}
function renderBlock(b){
  const chev='<span class="chev">▶</span>';
  if(b.k==='html'){
    return `<details class="l1 prin" open><summary>${chev}${esc(b.t)}</summary><div class="l1-body">${b.html}</div></details>`;
  }
  if(b.k==='group'){
    const note=b.note?`<div class="blknote">${esc(b.note)}</div>`:'';
    const kids=b.children.map(ch=>`<details class="l2"><summary>${chev}${esc(ch.t)}</summary><div class="l2-body">${renderTable(ch)}</div></details>`).join('');
    return `<details class="l1"><summary>${chev}${esc(b.t)}</summary><div class="l1-body">${note}${kids}</div></details>`;
  }
  if(b.k==='table'){
    const note=b.note?`<div class="blknote">${esc(b.note)}</div>`:'';
    return `<details class="l1"><summary>${chev}${esc(b.t)}</summary><div class="l1-body">${note}${renderTable(b)}</div></details>`;
  }
  // md
  return `<details class="l1"><summary>${chev}${esc(b.t)}</summary><div class="l1-body"><div class="md">${marked.parse(b.md)}</div></div></details>`;
}

function sparkSVG(code){
  const pts=DATA.prices[code];
  if(!pts||!pts.length) return '<div class="spark"><div class="ph">近一月走势 · 待核验</div></div>';
  const xs=pts.map(p=>p.close),min=Math.min(...xs),max=Math.max(...xs),w=140,h=28,n=xs.length;
  const path=xs.map((v,i)=>`${(i/(n-1)*w).toFixed(1)},${(h-(max==min?h/2:(v-min)/(max-min)*h)).toFixed(1)}`).join(' ');
  const up=xs[n-1]>=xs[0],col=up?'#d23f3f':'#2a9d4a',pct=(((xs[n-1]-xs[0])/xs[0])*100).toFixed(1);
  return `<div class="spark"><svg width="${w}" height="${h}"><polyline fill="none" stroke="${col}" stroke-width="1.6" points="${path}"/></svg><span style="font-size:11px;color:${col};margin-left:6px">${up?'+':''}${pct}%</span></div>`;
}

function bigSpark(code){

  if(!pts||!pts.length) return '<div class="md-na">近一月行情：暂无（疑似停牌或未抓取）</div>';
  const xs=pts.map(p=>p.close),min=Math.min(...xs),max=Math.max(...xs),w=620,h=90,pad=5,n=xs.length;
  const X=i=>(i/(n-1)*(w-2*pad)+pad),Y=v=>(h-pad-(max==min?(h-2*pad)/2:(v-min)/(max-min)*(h-2*pad)));
  const path=xs.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const up=xs[n-1]>=xs[0],col=up?'#d23f3f':'#2a9d4a',pct=(((xs[n-1]-xs[0])/xs[0])*100).toFixed(2);
  return `<div class="bigspark"><svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">

}
