球龙头","国产龙头","代码","现状"],"rows":[["电解铜","Freeport-McMoRan (FCX) / Glencore (GLEN.L) / Southern Copper (SCCO)","江西铜业、铜陵有色、紫金矿业","600362、000630、601899","铜价受南美/非洲矿区集中影响，波动大"]]},{"t":"6.2 硫酸铜溶液（铜箔电镀用）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["硫酸铜溶液","—","铜陵有色","000630","铜陵有色自配，基本国产化"]]}]},{"t":"七、PCB 钻针 / 刀具（精密耗材）","k":"table","note":"PCB 钻针是高速 PCB 钻孔的关键精密耗材，AI 高多层板对微钻（≤0.1mm）需求激增。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["PCB 微型钻针（微钻）","Union Tool（日）/ Tera Automation","鼎泰高科","301377","PCB 微钻国内龙头，≤0.1mm 微钻量产"],["超硬刀具 / 钻头","Sandvik（瑞典）/ 联合工具","沃尔德","688028","超硬材料刀具，PCB/精密加工"],["钨基硬质合金（钻针基材）","—","中钨高新","000657","钨基合金，钻针上游材料"]]},{"t":"八、PCB 专用化学品 / 电镀药水","k":"group","note":"高端 PCB 制造必需，成本占 PCB 约10%，传统减成法有物理极限，国产替代加速。","children":[{"t":"8.1 MSAP / 水平电镀药水","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["MSAP 电镀药水","上村工业(日) / Atotech-MKS(美)","光华科技、天承科技、三孚新科","002741、688603、688359","光华弹性最大；天承毛利38%、三孚刚扭亏需甄别"]]}]},{"t":"九、PCB 全检 / X 射线设备","k":"group","children":[{"t":"9.1 X 射线 / CT 全检设备","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["X-ray/CT 全检","Nikon(日) / YXLON(德)","日联科技","688531","PCB 层数增加拉动全检需求，国产 X 射线源龙头，毛利43%"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| PCB 成品制造 | ~$800 亿 | 22-35% | **约 45%** | 深南电路 002916、TTM (TTMI) |\n| 覆铜板 CCL | ~$180 亿 | 28-38% | **约 16%** | 生益科技 600183、Rogers (ROG) |\n| 高频 PTFE/M6+ CCL | ~$20 亿 | 45-58% | **约 4%** | Rogers Corp (ROG)——高溢价 |\n| 铜箔（电子级）| ~$100 亿 | 22-30% | **约 7%** | 三井金属（5706.T）、嘉元科技 688388 |\n| 玻纤布 | ~$50 亿 | 28-35% | **约 5%** | 中国巨石 600176 |\n| 高频玻纤布（NE/D 玻）| ~$8 亿 | 42-52% | **约 2%** | Nittobo（日本，近垄断）|\n| BT 树脂（封装基板）| ~$5 亿 | 55-65% | **约 1%** | 三菱瓦斯化学（4182.T，垄断）|\n| 阻焊油墨 | ~$15 亿 | 38-48% | **约 2%** | 太阳油墨（日本 4626.T）、互联科技 |\n\n> **核心结论**：PCB 成品制造体量最大（45% 价值），但毛利率仅 22-35%；高频 CCL（Rogers）和 BT 树脂是整条链毛利率最高的「隐形卡点」，Rogers 的 PTFE 基材国内几乎无法替代；中国巨石在玻纤布是真正意义上的全球龙头。"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| PCB 成品（高速 AI 服务器）| ~28% | **~36%** | 48% | AI 服务器高速背板阻抗控制 |\n| PCB 成品（5G / 通信）| ~42% | **~50%** | 60% | 沪电、深南已有优势 |\n| PCB 成品（消费电子）| ~48% | **~55%** | 65% | 鹏鼎/东山已是全球龙头 |\n| 覆铜板 CCL（标准 FR-4）| ~50% | **~58%** | 68% | 生益科技全球前三 |\n| 覆铜板 CCL（高速 M6/M7）| ~15% | **~22%** | 35% | 高 Tg 树脂体系配方 |\n| 高频 PTFE CCL（Rogers 级）| ~3% | **~6%** | 12% | 含氟聚合物改性+介电一致性 |\n| BT 树脂 | ~2% | **~4%** | 10% | 三菱瓦斯化学近垄断，专利壁垒 |\n| 铜箔（12-18μm 标准）| ~38% | **~46%** | 58% | 工艺相对成熟，国内扩产快 |\n| 铜箔（4μm 极薄）| ~12% | **~20%** | 32% | 表面粗糙度（Rz）控制难度 |\n| 玻纤布（E 玻标准）| ~60% | **~68%** | 75% | 中国巨石全球第一，已超越 |\n| 高频玻纤布（NE/D 玻）| ~8% | **~15%** | 28% | 低介电配方（ε<4.0）技术差距 |\n| 阻焊油墨 | ~25% | **~35%** | 48% | 太阳油墨（日）专利封锁 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. AI 服务器高速 PCB 层数 / 价值量提升（最直接驱动）**\nAI 训练服务器主板层数 40-60 层（普通服务器 8-16 层），单板价值量约 $800-1200（普通服务器 $150-300）。全球 AI 服务器 2025 年预计出货 400 万台以上，高速 PCB 需求爆发。深南电路高速 PCB 已进入 Supermicro / 浪潮供应链。\n受益标的：深南电路 002916、沪电股份 002463\n\n**2. 高频铜箔 / 极薄铜箔需求提升（技术升级驱动）**\nAI 服务器信号速率从 112Gbps 升至 224Gbps，要求铜箔表面粗糙度（Rz）从 3μm 降至 1.5μm 以下，极薄铜箔需求增加。国内嘉元科技 4μm 极薄铜箔量产，价格比进口低 20-30%。\n受益标的：嘉元科技 688388\n\n**3. 中国巨石玻纤布出口提价逻辑**\n全球高频玻纤布（NE/D 玻）主要依赖日本 Nittobo，中国巨石 / 泰玻正在突破 NE 玻配方，若实现规模量产将颠覆日本垄断格局。同时 AI 服务器 PCB 扩产带动标准 E 玻需求。\n受益标的：中国巨石 600176\n\n**4. 高频高速 CCL 国产化替代（生益科技中长期）**\nRogers Corp CCL 产品占全球高频高速板市场超 50%，生益科技正向 M7 / Rogers 4350B 同级产品进攻，5G 毫米波 / AI 服务器是两大新需求入口，国产化率从 15% 上升空间大。\n受益标的：生益科技 600183、华正新材 603186\n\n**5. 铜价上涨传导：铜箔企业提价空间扩大**\n铜价上涨（铜箔成本 60%+ 为铜材）通常 1-2 季度滞后传导到铜箔价格，同期带来一定毛利波动。AI 服务器拉动极薄铜箔量价双升是更确定的逻辑。\n受益标的：诺德股份 600110、嘉元科技 688388"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. 日本 PCB 材料供应链风险（最关键）**\n高频 PTFE CCL（Rogers）、极薄铜箔（三井金属）、高频玻纤布（Nittobo）、BT 树脂（三菱瓦斯化学）均由日本或美国企业主导。若中日关系恶化或日本扩大出口管制范围，高端 PCB 材料供应将受影响。\n\n**2. 铜价地缘波动：矿区集中于南美 / 非洲**\n全球铜矿高度集中（智利 28%、秘鲁 10%、刚果 8%），政局不稳、罢工、洪涝灾害均可导致铜价剧烈波动，直接传导到铜箔成本。中东局势导致运费上涨亦间接推高铜箔物流成本。\n\n**3. 台湾 PCB 供应链断裂风险**\n台湾是全球 PCB 最重要产区之一（台系企业全球份额约 30%），任何台海局势紧张将造成全球 PCB 供给缺口，短期利好大陆 PCB 企业抢占订单转移。\n\n**4. 中国碳排放政策对玻纤 / 铜箔高耗能产业的影响**\n玻纤熔制窑炉和铜箔电镀均为高耗能工序，碳排放配额趋严将推高生产成本。但中国企业规模优势可消化部分成本。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| PCB 信号速率 | 112Gbps PAM4 | 224Gbps PAM4（AI 服务器 224G SerDes）| 448Gbps 预研 |\n| PCB 层数（AI 服务器）| 40-60 层 | 80 层以上高密度互联 | 光电混合板（有光纤嵌入）|\n| 铜箔厚度（高速）| RTF 3μm 铜箔主流 | 极薄 1.5μm 铜箔量产 | 纳米铜箔 / 压延铜箔升级 |\n| 覆铜板介电常数 | Dk=3.5（M6）主流 | Dk=3.2-3.0（M7 级）量产 | Dk=2.5 以下（类 Rogers 级国产化）|\n| 玻纤布介电 | NE 玻（Dk=4.2）主要靠进口 | 国内 NE 玻量产尝试（泰玻）| 国产高频玻纤布渗透率>20% |\n| 封装基板（ABF→玻璃）| ABF 载板主流（AI 封装）| 玻璃核心基板（Glass Core）试生产 | 玻璃基板量产（Intel 2027 目标）|\n\n---\n\n---"}]},{"id":"07","num":7,"title":"被动元器件","group":"横切与资源","hook":"MLCC/电感/电容/连接器，AI 服务器隐形受益者","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">被动元件（电容、电感、电阻、连接器）<b>不放大、不运算信号</b>，只做储能、滤波、分压、互连——却<b>无处不在</b>。它是 AI 算力的\"隐形受益者\"：一台 AI 服务器要用 <b>MLCC 1–3 万颗</b>，是普通服务器的 <b>10–100 倍</b>。其中工艺壁垒最深、国产替代弹性最大的是 <b>MLCC（多层陶瓷电容）</b>。下面从\"它是什么\"，到 MLCC 的<b>底层原理与叠层剖面</b>，再到电感/连接器与产业格局，一层层拆。</div>\n\n<h3>一、被动元件是什么：不放大信号，却无处不在</h3>\n<p>有源器件（芯片、晶体管）<b>放大或处理</b>信号，需要外部供电；被动元件只<b>消耗、储存、释放</b>能量，是电路里的\"配角\"，但每一颗芯片周围都要密密麻麻铺一圈：电容稳压去耦、电感滤波储能、电阻分压限流、连接器把信号搬来搬去。AI 服务器电流大、瞬态快、电压轨道多，每颗 GPU/CPU 旁都要海量电容压住电压波动——这就是用量爆发到普通服务器 10–100 倍的根本原因。</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">电容（MLCC 为主）</div>储存/释放电荷，<b>去耦稳压、滤波</b>。用量最大、价值最高、工艺最难。<br><span class=\"pc-s\">AI 服务器单台 1–3 万颗，核心卡点</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">电感</div>储存磁场能量，<b>滤波、储能、DC-DC 转换</b>。核心是磁芯材料。<br><span class=\"pc-s\">供电模块每路都要，AI 多轨供电放量</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">电阻</div>分压、限流、采样。<br><span class=\"pc-s\">数量多、单值低，精度是差距点</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">连接器</div>板间/机间<b>高速数据互连</b>。<br><span class=\"pc-s\">PCIe Gen5/6、背板高速对，单值高</span></div>\n</div>\n\n<h3>二、★ MLCC 底层原理：薄层化 + 多层化（叠层剖面）</h3>\n<p>MLCC 的本质是把\"<b>陶瓷介质 + 金属内电极</b>\"像千层糕一样交替叠起来。陶瓷介质用的是<b>钛酸钡 BaTiO₃</b>——一种介电常数 ε 极高的铁电材料；内电极用<b>镍 Ni</b>（贱金属，BME 工艺），两端再用<b>端电极</b>把所有同极性的内电极引出，并联成一个大电容。</p>\n<p>容值公式说明了一切：<b>C = ε × (单层面积 A × 层数 N) / 介质厚度 d</b>。要在指甲盖大小里做出大容值，只有两条路并行：① <b>薄层化</b>——把单层介质做到 <b>&lt;1μm</b>（d 越小 C 越大）；② <b>多层化</b>——堆叠<b>几百到上千层</b>（N 越多 C 越大）。两者都逼近材料和工艺极限：介质太薄容易击穿、内电极要印得又薄又匀、上千层共烧不能分层翘曲——<b>这就是村田领先全球的核心壁垒</b>。而最上游的 <b>BaTiO₃ 介质粉</b>（粒径越细越均匀，才能做薄层）是关键卡点，国内由 <span class=\"tk\" onclick=\"openDetail('300285','国瓷材料','A股')\">国瓷材料</span> 唯一量产。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 360\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#13233f\">MLCC 叠层剖面：陶瓷介质 BaTiO₃ 与内电极 Ni 交替叠层</text>\n\n  <!-- 端电极 左 -->\n  <rect x=\"70\" y=\"70\" width=\"34\" height=\"210\" rx=\"5\" fill=\"#e8b923\" stroke=\"#a8841a\"/>\n  <text x=\"87\" y=\"300\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8a6d1a\">端电极</text>\n  <text x=\"87\" y=\"313\" text-anchor=\"middle\" font-size=\"9\" fill=\"#8a6d1a\">Ni/Sn</text>\n  <!-- 端电极 右 -->\n  <rect x=\"636\" y=\"70\" width=\"34\" height=\"210\" rx=\"5\" fill=\"#e8b923\" stroke=\"#a8841a\"/>\n  <text x=\"653\" y=\"300\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8a6d1a\">端电极</text>\n  <text x=\"653\" y=\"313\" text-anchor=\"middle\" font-size=\"9\" fill=\"#8a6d1a\">Ni/Sn</text>\n\n  <!-- 陶瓷主体背景 -->\n  <rect x=\"100\" y=\"70\" width=\"540\" height=\"210\" fill=\"#f0ece4\" stroke=\"#c9bfa8\"/>\n\n  <!-- 介质层 + 内电极交替（从上到下） -->\n  <!-- 介质层底色统一画为浅陶瓷色，已由背景给出；这里画内电极条 -->\n  <!-- 左引出电极（连左端电极，右端留缝隙） -->\n  <g fill=\"#5b6577\">\n    <rect x=\"100\" y=\"92\"  width=\"500\" height=\"9\"/>\n    <rect x=\"100\" y=\"128\" width=\"500\" height=\"9\"/>\n    <rect x=\"100\" y=\"164\" width=\"500\" height=\"9\"/>\n    <rect x=\"100\" y=\"200\" width=\"500\" height=\"9\"/>\n    <rect x=\"100\" y=\"236\" width=\"500\" height=\"9\"/>\n  </g>\n  <!-- 右引出电极（连右端电极，左端留缝隙） -->\n  <g fill=\"#3a4252\">\n    <rect x=\"140\" y=\"110\" width=\"500\" height=\"9\"/>\n    <rect x=\"140\" y=\"146\" width=\"500\" height=\"9\"/>\n    <rect x=\"140\" y=\"182\" width=\"500\" height=\"9\"/>\n    <rect x=\"140\" y=\"218\" width=\"500\" height=\"9\"/>\n    <rect x=\"140\" y=\"254\" width=\"500\" height=\"9\"/>\n  </g>\n\n  <!-- 介质标注（在两层电极之间的一处） -->\n  <text x=\"370\" y=\"106\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#8a6d1a\">陶瓷介质 BaTiO₃（ε 高）</text>\n\n  <!-- 单层厚度 d 标注 -->\n  <g stroke=\"#d23f3f\" stroke-width=\"1.2\">\n    <line x1=\"118\" y1=\"101\" x2=\"118\" y2=\"110\" marker-start=\"url(#m07a)\" marker-end=\"url(#m07a)\"/>\n  </g>\n  <text x=\"124\" y=\"109\" font-size=\"9\" fill=\"#b3261e\" text-anchor=\"start\">d &lt;1μm</text>\n\n  <!-- 内电极标注引线 -->\n  <line x1=\"300\" y1=\"96\" x2=\"300\" y2=\"44\" stroke=\"#94a3b8\"/>\n  <text x=\"300\" y=\"40\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#475569\">内电极 Ni（贱金属 BME）· 交替引出至两端</text>\n\n  <!-- 多层化箭头（右侧） -->\n  <line x1=\"618\" y1=\"88\" x2=\"618\" y2=\"262\" stroke=\"#6a4bbf\" stroke-width=\"1.4\" marker-start=\"url(#m07p)\" marker-end=\"url(#m07p)\"/>\n  <text x=\"612\" y=\"175\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#4a2e9e\" transform=\"rotate(-90 612 175)\">多层化 N：几百→上千层</text>\n\n  <!-- 容值公式条 -->\n  <rect x=\"100\" y=\"300\" width=\"540\" height=\"46\" rx=\"8\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n  <text x=\"370\" y=\"320\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#4a2e9e\">C = ε · (A × N) / d</text>\n  <text x=\"370\" y=\"338\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5b6577\">ε 介电常数(BaTiO₃)　A 单层面积　N 层数(多层化↑)　d 介质厚度(薄层化↓) → 要大容值就要 薄层化 + 多层化</text>\n\n  <defs>\n    <marker id=\"m07a\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#d23f3f\"/></marker>\n    <marker id=\"m07p\" markerWidth=\"8\" markerHeight=\"8\" refX=\"4\" refY=\"4\" orient=\"auto\"><path d=\"M1,1 L7,4 L1,7 Z\" fill=\"#6a4bbf\"/></marker>\n  </defs>\n</svg>\n</div>\n\n<p><b>为什么薄层化+多层化这么难：</b>介质单层做到亚微米，要求 BaTiO₃ 粉体粒径细到几十纳米还要均匀，否则击穿；内电极墨水要印得超薄超平整，否则共烧时分层（delamination）；上千层叠起来一次高温共烧，热膨胀稍不匹配就翘曲报废。<b>越薄越多层 → 良率越低 → 壁垒越高</b>，这正是村田、TDK、太阳诱电把持高端车规/小型化 MLCC 的根因，也是国产替代的主攻方向。</p>\n\n<h3>三、电感 / 电阻 / 连接器：各司其职</h3>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">电感：储能 / 滤波</div>靠磁场储能，核心是<b>磁芯材料</b>——<b>铁氧体</b>（高频滤波）、<b>金属软磁粉芯</b>（铁硅铝/一体成型，大电流 DC-DC）。AI 服务器多轨供电，功率电感需求放量。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('002138','顺络电子','A股')\">顺络电子</span> · <span class=\"tk\" onclick=\"openDetail('002056','横店东磁','A股')\">横店东磁</span>（磁材） · <span class=\"tk\" onclick=\"openDetail('300811','铂科新材','A股')\">铂科新材</span>（粉芯）</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">电阻：分压 / 限流</div>原理最朴素：靠材料电阻分压、限流、电流采样。难点在<b>精度与温漂</b>（精密金属膜），高端仍由 Vishay 等主导。<br><span class=\"pc-s\">国产精度追赶中</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">连接器：高速互连</div>把信号在板间、机间搬运。AI 时代要扛 <b>PCIe Gen5/6、112G 高速对</b>，对阻抗连续性与损耗要求极高，单机价值量高。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('002475','立讯精密','A股')\">立讯精密</span> · <span class=\"tk\" onclick=\"openDetail('300679','电连技术','A股')\">电连技术</span></span></div>\n</div>\n\n<h3>四、产业格局：日系垄断高端，国产从材料端突围</h3>\n<p>被动元件是典型的\"小器件、大格局\"：高端 MLCC（车规、超小型、高层数）几乎被日韩台垄断，国产在中低端放量、向高端爬坡，而真正的<b>突破口在上游材料</b>——介质粉、磁粉、端电极浆料——掌握材料才能反推成品工艺。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 150\" width=\"100%\">\n  <g font-size=\"11\" text-anchor=\"middle\">\n  <rect x=\"20\" y=\"40\" width=\"150\" height=\"50\" rx=\"8\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/><text x=\"95\" y=\"60\" font-weight=\"700\" fill=\"#4a2e9e\">①介质粉 BaTiO₃</text><text x=\"95\" y=\"78\" font-size=\"9\" fill=\"#5b6577\">上游关键卡点</text>\n  <rect x=\"230\" y=\"40\" width=\"150\" height=\"50\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"305\" y=\"60\" font-weight=\"700\">②内/端电极浆料</text><text x=\"305\" y=\"78\" font-size=\"9\" fill=\"#5b6577\">Ni / Sn 贱金属</text>\n  <rect x=\"440\" y=\"40\" width=\"150\" height=\"50\" rx=\"8\" fill=\"#dbeafe\" stroke=\"#1f5fd6\"/><text x=\"515\" y=\"60\" font-weight=\"700\">③叠层共烧成品</text><text x=\"515\" y=\"78\" font-size=\"9\" fill=\"#5b6577\">薄层化+多层化</text>\n  <rect x=\"640\" y=\"40\" width=\"80\" height=\"50\" rx=\"8\" fill=\"#fff7e6\" stroke=\"#d99100\"/><text x=\"680\" y=\"60\" font-weight=\"700\" font-size=\"10\">④整机</text><text x=\"680\" y=\"78\" font-size=\"9\" fill=\"#8a6d1a\">AI 服务器</text>\n  </g>\n  <g stroke=\"#94a3b8\" stroke-width=\"1.6\" marker-end=\"url(#m07f)\">\n   <line x1=\"170\" y1=\"65\" x2=\"228\" y2=\"65\"/><line x1=\"380\" y1=\"65\" x2=\"438\" y2=\"65\"/><line x1=\"590\" y1=\"65\" x2=\"638\" y2=\"65\"/>\n  </g>\n  <defs><marker id=\"m07f\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <text x=\"370\" y=\"120\" text-anchor=\"middle\" font-size=\"11\" fill=\"#b3261e\" font-weight=\"700\">高端 MLCC 成品被日系垄断 → 国产从「材料端」反向突围</text>\n  <text x=\"370\" y=\"138\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#64748b\">介质粉国产唯一量产：国瓷材料；成品爬坡：风华高科 / 三环集团</text>\n</svg>\n</div>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">日系垄断（高端 MLCC）</div><b>村田 Murata · TDK · 太阳诱电</b>（+ 三星电机、国巨 Yageo）。把持车规、超小型、千层级高容产品，材料-设备-工艺全栈领先。<br><span class=\"pc-s\">薄层化/多层化工艺是其护城河</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">国产替代</div>成品：<span class=\"tk\" onclick=\"openDetail('000636','风华高科','A股')\">风华高科</span>（国内产量第一，车规导入比亚迪/奇瑞） · <span class=\"tk\" onclick=\"openDetail('300408','三环集团','A股')\">三环集团</span>。<br>介质粉：<span class=\"tk\" onclick=\"openDetail('300285','国瓷材料','A股')\">国瓷材料</span>（国内唯一量产，全球份额约 15–18%） · 端电极浆料：<span class=\"tk\" onclick=\"openDetail('600459','贵研铂业','A股')\">贵研铂业</span>。<br><span class=\"pc-s\">其他被动：铝电解 <span class=\"tk\" onclick=\"openDetail('002484','江海股份','A股')\">江海股份</span> · 薄膜电容 <span class=\"tk\" onclick=\"openDetail('600563','法拉电子','A股')\">法拉电子</span></span></div>\n</div>\n\n</div>\n"},{"t":"一、MLCC（多层陶瓷电容）","k":"group","note":"最大被动元器件市场，AI 服务器单台用量 1-3 万颗，国产化弹性大。","children":[{"t":"1.1 介质材料（钛酸钡 BaTiO₃）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["BaTiO₃ 介质粉","戸田工业 Toda Kogyo (4100.T) / Ferro / Cabot","国瓷材料","300285","国内唯一量产，全球份额约 15-18%"],["高容添加剂（氧化镝/氧化锆）","信越 / 越南稀土","华宏科技（镝）、国瓷材料（锆）","002645、300285","超高容MLCC添加2-3%；管制驱动涨价"]]},{"t":"1.2 MLCC 成品","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["MLCC 成品","Murata (6981.T) / TDK (6762.T) / 太阳诱电 (6976.T) / 三星电机 (009150.KS) / Yageo (2327.TW)","风华高科、三环集团、潮州三环、宇阳科技","000636、300408、未上市、未上市","风华国内产量第一；车规导入比亚迪/奇瑞"]]},{"t":"1.3 端电极材料（Ni / Sn）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["端电极 / 内电极浆料","Heraeus（德）/ Sumitomo Metal Mining (5713.T) / DOWA (5714.T)","贵研铂业","600459","贵金属端电极材料"],["MLCC 纳米镍粉 / 内电极","昭荣化学 Shoei (4953.T) / JFE","博迁新材","605376","纳米镍粉国产龙头，AI服务器MLCC放量，净利+50%"]]}]},{"t":"二、电感","k":"group","note":"功率电感+共模电感+磁性材料，顺络已有竞争力，AI 服务器电感需求放量。","children":[{"t":"2.1 功率电感","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["功率电感","TDK (6762.T) / Murata (6981.T) / Bourns（私有）","顺络电子、可立克","002138、002782","国内功率电感龙头，DC-DC 转换核心"]]},{"t":"2.2 共模电感","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["共模电感","Würth Elektronik（德）/ Schaffner (SAHN.SW)","顺络电子、铁扬电子","002138、未上市","EMC 滤波，高频段插损待追赶"]]},{"t":"2.3 磁性材料","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["铁氧体磁芯","TDK (6762.T) / Ferroxcube（荷兰）","横店东磁、天通股份","002056、600330","横店东磁铁氧体全球前三"],["铁硅铝 / 金属软磁粉芯","—","横店东磁、铂科新材","002056、300811","一体成型电感粉芯，AI 服务器电感上游"]]}]},{"t":"三、电阻","k":"group","note":"厚膜片式+精密金属膜，Yageo 全球第一，国内精度差距收窄。","children":[{"t":"3.1 厚膜片式电阻","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["厚膜片式电阻","Yageo (2327.TW) / Rohm (6963.T) / Vishay (VSH) / KOA (6999.T)","万国半导体、EVER WIN","未上市、未上市","0402/0201 等，国产精度追赶中"]]},{"t":"3.2 精密金属膜电阻","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["精密金属膜电阻","Vishay (VSH) / Susumu（日）/ Caddock（美）","精测电子","300567","弱电用，稳定性与 Vishay 差距明显"]]}]},{"t":"四、连接器","k":"group","note":"高速数据+射频+FPC，立讯快速替代 Amphenol，AI 服务器单值高。","children":[{"t":"4.1 高速数据连接器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["高速数据连接器","TE Connectivity (TEL) / Amphenol (APH) / Molex（私有）/ Foxconn Interconnect (FIT)","立讯精密、电连技术","002475、300679","PCIe Gen5 已进 AI 服务器代工厂供应链"]]},{"t":"4.2 射频连接器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["射频连接器","Amphenol (APH) / Radiall（法，私有）","电连技术","300679","SMA/SMP/SMPM，军民两用 RF 连接器"]]},{"t":"4.3 FPC 柔性板连接器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["FPC 连接器","Hirose (6806.T) / JAE（未上市）","立讯精密、信维通信","002475、300136","手机/可穿戴用，国产已有竞争力"]]}]},{"t":"五、铝电解电容","k":"table","note":"电源模块必需品类，国内龙头江海、艾华并列。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["铝电解电容","—","江海股份、艾华集团","002484、603989","国内铝电解电容龙头，电源模块必需"]]},{"t":"六、薄膜电容","k":"table","note":"新能源+工业用薄膜电容。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["薄膜电容","—","法拉电子","600563","新能源+工业薄膜电容第一"]]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| MLCC 成品 | ~$150 亿 | 38-48% | **约 35%** | Murata（6981.T）、风华高科 000636 |\n| 高速连接器 | ~$300 亿（含全类型）| 30-40% | **约 25%** | TE Connectivity (TEL)、Amphenol (APH) |\n| 功率电感 | ~$80 亿 | 32-40% | **约 9%** | TDK（6762.T）、顺络电子 002138 |\n| 共模电感 / 磁性材料 | ~$50 亿 | 30-38% | **约 5%** | 横店东磁 002056、TDK |\n| 片式电阻 | ~$50 亿 | 28-35% | **约 5%** | Yageo（台 2327.TW）、Rohm（6963.T）|\n| BaTiO₃ 介质粉 | ~$20 亿 | 40-50% | **约 4%** | 国瓷材料 300285 |\n| 射频连接器 | ~$30 亿 | 42-52% | **约 5%** | Amphenol (APH)、电连技术 300679 |\n| FPC 连接器 | ~$25 亿 | 35-45% | **约 4%** | Hirose（6806.T）、立讯精密 002475 |\n| 精密电阻 | ~$15 亿 | 45-55% | **约 3%** | Vishay (VSH) |"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| MLCC（消费级，0402 以上）| ~18% | **~26%** | 40% | 高容量（>10μF）良率差距 |\n| MLCC（车规 AEC-Q200）| ~5% | **~10%** | 20% | 高温可靠性（X7R 特性）认证 |\n| MLCC（5G 高频用，0201）| ~8% | **~14%** | 25% | 极小尺寸（0201 以下）工艺 |\n| 钛酸钡介质粉（BaTiO₃）| ~12% | **~18%** | 30% | 粒径分布均匀性，国瓷快速追赶 |\n| 功率电感（工业级）| ~25% | **~35%** | 48% | 顺络已有竞争力，磁材差距收窄 |\n| 共模电感（EMC）| ~20% | **~30%** | 45% | 高频段插损（>100MHz）指标 |\n| 片式电阻（消费级）| ~30% | **~40%** | 55% | 国内精度差距在收窄 |\n| 精密电阻（±0.1%）| ~8% | **~14%** | 25% | 稳定性指标与 Vishay 差距明显 |\n| 高速连接器（PCIe Gen5）| ~18% | **~28%** | 42% | 立讯精密快速追赶 Amphenol |\n| 射频连接器（SMA 以上）| ~22% | **~32%** | 48% | 电连技术军民两用，民用出海难 |\n| FPC 连接器 | ~30% | **~40%** | 55% | 立讯精密 / 信维有竞争力 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. AI 服务器每台 MLCC 用量爆发（10-100 倍于普通服务器）**\n每台 H100 AI 服务器主板使用 MLCC 约 10,000-30,000 颗（普通服务器 3,000-5,000 颗），叠加 800V 新能源车电气化，2025 年 MLCC 全球出货量重回历史峰值。村田利润率提升，国内风华高科订单跟随受益。\n受益标的：风华高科 000636、国瓷材料 300285\n\n**2. MLCC 价格上涨周期启动（供需周期性）**\n2023 年 MLCC 经历去库存，2024-2025 年随 AI 服务器 / 汽车电动化需求回升，村田 / TDK 产能优先供高端品，中低端出现价格回暖。国内企业受益于结构性价差收窄。\n受益标的：风华高科 000636、三环集团 300408\n\n**3. 连接器国产化率快速提升（立讯 vs Amphenol）**\n立讯精密 PCIe Gen5 连接器已进入 AI 服务器主要代工厂（富士康 / 伟创力）供应链，替代 Amphenol 份额，2024 年连接器收入占比提升至约 30%。AI 服务器高速背板连接器单值约 $5-15（普通服务器 $0.5-2）。\n受益标的：立讯精密 002475\n\n**4. 新能源车车规被动元器件认证周期完成（2025-2026）**\n2020-2022 年开始的车规认证（AEC-Q200 / PPAP），2025 年起将陆续完成。风华高科 / 三环集团车规 MLCC 导入比亚迪 / 奇瑞供应链，进一步替代村田 / TDK 在中国车企的份额。\n受益标的：风华高科 000636、三环集团 300408\n\n**5. 国瓷材料 BaTiO₃ 粉比例提升打开市场**\n国瓷材料 BaTiO₃ 介质粉全球份额从 10% 提升至 18-20%，对应国内 MLCC 企业国产化替代需求（进口 BaTiO₃ 以日本戸田工业为主），降低成本同时保障供应链安全。\n受益标的：国瓷材料 300285"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. 日本三大 MLCC 巨头的技术垄断**\n村田（38% 市占）+ TDK + 太阳诱电合计控制全球 MLCC 约 65% 产量，高端车规和 5G 用 MLCC 更集中。若中日关系出现重大摩擦，高端 MLCC 供给紧张，但目前不在直接管制范围。\n\n**2. 中东 / 红海航运对电子元器件物流的影响**\nMLCC 体量小、价值高，多为航空运输，受红海绕行影响相对小；但工厂设备、大宗铜材等海运绕行成本上升，间接推高成本。\n\n**3. 台湾电阻 / MLCC 企业（Yageo / 华新科）的地缘暴露**\nYageo 是全球最大电阻厂商，总部在台湾，若台海局势紧张，全球电阻供应链将面临重大压力，短期利好国内竞争对手。\n\n**4. 关键磁性材料稀土依赖（铁氧体用钴）**\n高性能铁氧体磁芯需要一定比例钴，钴价受刚果局势影响大。国内华友钴业 603799 布局刚果铜钴矿，可部分对冲。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| MLCC 尺寸 | 0402 主流（AI 服务器），0201 手机 | 01005（0.4×0.2mm）量产（村田领先）| 008004 尺寸研发 |\n| MLCC 容量 | 10μF（0402）主流，22μF 突破中 | 100μF 高容 MLCC（减少铝电容用量）| 全面替代部分铝电解电容 |\n| 连接器速率 | PCIe Gen5（32Gbps / lane）| PCIe Gen6（64Gbps / lane）连接器 | PCIe Gen7 光电混合连接器 |\n| 功率电感频率 | 1-3MHz 开关频率 | 5-10MHz 高频磁粉芯电感 | GaN 驱动 10-30MHz 超高频电感 |\n| BaTiO₃ 国产化 | 国瓷 15% 全球份额 | 国瓷 25% 份额突破 | X7R 高温车规粉国产化 |\n| 国内 MLCC 车规 | 导入比亚迪 / 奇瑞供应链 | 扩大主机厂覆盖（吉利 / 广汽）| 国产车规 MLCC 出海东南亚 |\n\n---\n\n---"}]},{"id":"12","num":8,"title":"算力矿产与战略材料","group":"横切与资源","hook":"镓/锗/铟/钨/钽/钴 + 稀土·特种陶瓷氧化物（钇/锆/镝/铪/金刚石），中国定价权+出口管制叙事","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">别把这条线当成普通\"挖矿\"。镓、锗、钨、铟这些<b>战略小金属</b>，是 AI 算力硬件最底层的\"原料地基\"——光模块、功率器件、芯片互连、面板电极都要它。中国在这几种矿上同时握着<b>全球定价权 + 出口管制权</b>，于是它们正从\"按周期波动的大宗商品\"，被重估为\"卡别人脖子的科技战略资产\"——逻辑上对标 2020 年那波锂矿行情。下面拆三层：<b>为什么是\"算力\"矿产 → 矿怎么一路传导到主线 → 定价权与管制怎么放大弹性</b>。</div>\n\n<h3>一、为什么叫「算力矿产」：算力硬件的底层原料</h3>\n<p>AI 算力不是只有 GPU。一颗 GPU 要跑起来，外面还要光模块搬数据、功率器件供电、芯片内部用钨做互连、被动元件做储能滤波——这些器件的<b>最底层原材料</b>，恰恰落在几种产量小、却不可替代的战略金属上。它们的共同特征是：<b>用量小、单耗低，但没有就造不出</b>，且<b>中国份额极高</b>——镓约 <b>80%</b>、锗约 <b>60%</b>、钨约 <b>80%</b>、铟约 <b>60%</b>。换句话说，这是 AI 硬件链条上\"卡位最深、最难绕开\"的一环。</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">为什么稀缺且难替代</div>多为<b>伴生矿</b>（镓伴生铝土、锗/铟伴生锌矿、钴伴生铜），产量被主矿牵制，无法单独扩产；提纯到电子级工艺极难。<br><span class=\"pc-s\">供给刚性 → 一旦管制，价格弹性远大于普通商品</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">为什么是\"算力\"的料</div>每一种都精准对应一类算力器件：镓→功率/光芯片、锗→光纤/红外、铟→面板/光芯片衬底、钨→芯片互连、钽→电容、SiC→功率衬底。<br><span class=\"pc-s\">用量小但单点卡死，是 AI 硬件的\"维生素\"</span></div>\n</div>\n\n<h3>二、★ 传导流向图：矿产 → 中游材料 → 下游器件 → 主线</h3>\n<p>这是本线最核心的一张图。读法：<b>左列矿种（标中国份额% 与国产龙头）→ 中列中游材料 → 右列下游器件 / 对应主线</b>。顺着箭头看，就能明白\"一种小金属如何最终变成 AI 算力的一块拼图\"。红色代表<b>受管制 / 卡点</b>，蓝色代表<b>国产主导</b>。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 560\" width=\"100%\">\n  <defs>\n    <marker id=\"m12\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker>\n    <marker id=\"m12r\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#d23f3f\"/></marker>\n  </defs>\n  <!-- 列标题 -->\n  <g text-anchor=\"middle\" font-weight=\"700\" font-size=\"12\">\n    <text x=\"80\" y=\"20\" fill=\"#5b6577\">矿种（中国份额）</text>\n    <text x=\"330\" y=\"20\" fill=\"#5b6577\">中游材料</text>\n    <text x=\"590\" y=\"20\" fill=\"#5b6577\">下游器件 / 主线</text>\n  </g>\n  <line x1=\"12\" y1=\"28\" x2=\"728\" y2=\"28\" stroke=\"#e4e7ec\"/>\n\n  <!-- 行1 镓 Ga -->\n  <g font-size=\"10.5\">\n    <rect x=\"20\" y=\"40\" width=\"120\" height=\"48\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n    <text x=\"80\" y=\"60\" text-anchor=\"middle\" font-weight=\"700\" font-size=\"12\" fill=\"#b3261e\">镓 Ga</text>\n    <text x=\"80\" y=\"76\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">中国约 80% · 已管制</text>\n    <rect x=\"245\" y=\"36\" width=\"170\" height=\"24\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"330\" y=\"52\" text-anchor=\"middle\" fill=\"#27406e\">GaN（功率/射频）</text>\n    <rect x=\"245\" y=\"66\" width=\"170\" height=\"24\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n    <text x=\"330\" y=\"82\" text-anchor=\"middle\" fill=\"#27406e\">GaAs（光芯片）</text>\n    <rect x=\"500\" y=\"36\" width=\"220\" height=\"24\" rx=\"5\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n    <text x=\"610\" y=\"52\" text-anchor=\"middle\" fill=\"#4a2e9e\">功率/射频器件 → 主线5 功率</text>\n    <rect x=\"500\" y=\"66\" width=\"220\" height=\"24\" rx=\"5\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n    <text x=\"610\" y=\"82\" text-anchor=\"middle\" fill=\"#4a2e9e\">光芯片 → 主线2 光通信</text>\n  </g>\n\n  <!-- 行2 锗 Ge -->\n  <g font-size=\"10.5\">\n    <rect x=\"20\" y=\"108\" width=\"120\" height=\"48\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n    <text x=\"80\" y=\"128\" text-anchor=\"middle\" font-weight=\"700\" font-size=\"12\" fill=\"#b3261e\">锗 Ge</text>\n    <text x=\"80\" y=\"144\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">中国约 60% · 已管制</text>\n    <rect x=\"24
