  const cur=t.market==='港股'?'亿港元':'亿元';
  const head=`<div class="md-head"><button class="md-close" onclick="closeDetail()">×</button>
    <h3>${esc(t.name)} ${t.role==='龙头'?'<span style="color:#ffd24d;font-size:14px">★龙头</span>':''}</h3>
    <p class="msub"><span class="mkt ${t.market==='港股'?'港股':'A'}">${t.market}</span> ${t.code} · 已上市</p></div>`;
  let body='';
  if(d){
    const mc=d.mcap!=null?`${d.mcap} <span style="font-size:12px;font-weight:400">${cur}</span>`:'—';
    body+=`<div class="val-row">
      <div class="val-card"><div class="vl">总市值</div><div class="vv">${mc}</div></div>
      <div class="val-card"><div class="vl">市盈率 PE(TTM)</div><div class="vv">${d.pe!=null?d.pe:'—'}</div></div>
      <div class="val-card"><div class="vl">市净率 PB</div><div class="vv">${d.pb!=null?d.pb:'—'}</div></div></div>`;
  }
  body+=`<div class="md-sec-t">近一月股价走势</div>${bigSpark(code)}`;
  if(d&&d.fin){
    const f=d.fin;
    body+=`<div class="md-sec-t">最新财报关键指标（报告期 ${f.date}）</div><table class="fin-table">
      <tr><td>营业总收入</td><td><b>${f.rev}</b>　同比 <span class="${yoyCls(f.rev_yoy)}">${f.rev_yoy}</span></td></tr>
      <tr><td>净利润</td><td><b>${f.np}</b>　同比 <span class="${yoyCls(f.np_yoy)}">${f.np_yoy}</span></td></tr>
      <tr><td>销售毛利率</td><td>${f.gm}</td></tr>
      <tr><td>净资产收益率 ROE</td><td>${f.roe}</td></tr>
      <tr><td>基本每股收益 EPS</td><td>${f.eps}</td></tr>
      <tr><td>资产负债率</td><td>${f.dar}</td></tr></table>`;
  }else if(d){
    body+=`<div class="md-na">财务明细：港股财务接口受限，暂未取到（市值/估值见上方）。</div>`;
  }else{
    body+=`<div class="md-na">市值与财务数据抓取中或暂不可用，股价走势如上。</div>`;
  }
  body+=`<div class="md-foot">数据源：市值/PE/PB 来自百度股市通；财务指标来自同花顺（到最新披露报告期）；股价来自新浪日K。<br>实时取数、非模型记忆；估值为最近交易日，财报为最新报告期。</div>`;
  return head+`<div class="md-body">${body}</div>`;
}
function openDetail(code,name,market){
  document.getElementById('modalBox').innerHTML=renderDetail(code,name,market);
  document.getElementById('modal').classList.add('show');
}
function fmtMcap(v,cur){
  if(v==null) return null;
  const c={USD:'美元',KRW:'韩元',JPY:'日元',EUR:'欧元',TWD:'新台币',HKD:'港元',GBP:'英镑',CHF:'瑞郎'}[cur]||cur||'';
  if(v>=1e12) return (v/1e12).toFixed(2)+'万亿'+c;
  if(v>=1e8) return Math.round(v/1e8)+'亿'+c;
  return (v/1e8).toFixed(2)+'亿'+c;
}
function pct(x){return x==null?'—':(x*100).toFixed(1)+'%';}
function openForeign(ticker,name,market){
  const d=DATA.foreign[ticker];
  const head=`<div class="md-head"><button class="md-close" onclick="closeDetail()">×</button>
    <h3>${esc((d&&d.name)||name)}</h3><p class="msub"><span class="mkt" style="background:#6b7280">${market}</span> ${ticker} · 境外上市</p></div>`;
  let body='';
  if(d&&(d.mcap!=null||d.pe!=null)){
    body+=`<div class="val-row">
      <div class="val-card"><div class="vl">总市值</div><div class="vv" style="font-size:15px">${fmtMcap(d.mcap,d.cur)||'—'}</div></div>
      <div class="val-card"><div class="vl">PE(TTM)</div><div class="vv">${d.pe!=null?(+d.pe).toFixed(1):'—'}</div></div>
      <div class="val-card"><div class="vl">PB</div><div class="vv">${d.pb!=null?(+d.pb).toFixed(1):'—'}</div></div></div>`;
    body+=`<div class="md-sec-t">关键财务（本币 ${d.cur||'—'}）</div><table class="fin-table">
      <tr><td>营业收入(TTM)</td><td><b>${d.rev!=null?fmtMcap(d.rev,d.cur):'—'}</b></td></tr>
      <tr><td>毛利率</td><td>${pct(d.gm)}</td></tr>
      <tr><td>净利率</td><td>${pct(d.npm)}</td></tr>
      <tr><td>ROE</td><td>${pct(d.roe)}</td></tr></table>
      <div class="md-foot">数据源：Yahoo Finance 实时；币种为该股本币。境外标的暂不含分季财报明细，仅列关键指标。</div>`;
  }else{
    body+=`<div class="md-na">该境外标的（${market}）暂未取到基本面数据。代码 <b>${ticker}</b> 供识别与外部查询。</div>`;
  }
  document.getElementById('modalBox').innerHTML=head+`<div class="md-body">${body}</div>`;
  document.getElementById('modal').classList.add('show');
}
function closeDetail(){document.getElementById('modal').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
function renderTickers(id){
  const list=DATA.tickers[id]||[];if(!list.length)return'';
  const leads=list.filter(t=>t.role==='龙头').length;
  const cards=list.map(t=>`<div class="chip" title="点击查看 ${t.name} 详情" onclick="openDetail('${t.code}')">
    <div class="cr"><span class="cname">${esc(t.name)}</span>${t.role==='龙头'?'<span class="star">★</span>':''}</div>
    <div class="cmeta"><span class="mkt ${t.market==='港股'?'港股':'A'}">${t.market}</span><span class="ccode">${t.code}</span></div>
    ${sparkSVG(t.code)}</div>`).join('');
  return `<div class="tk-wrap"><h3>📌 核心标的速览 <span style="font-weight:400;color:var(--sub);font-size:12px">（A股/港股 ${list.length} 只，含 ${leads} 龙头）</span></h3>
    <p class="tk-sub">美股 / 未上市公司见下方各层级表格。运行 factcard 核验后此处填充实时股价走势。</p>
    <div class="tk-grid">${cards}</div></div>`;
}
function renderHome(){
  const groups=DATA.groupOrder.map(g=>{
    const items=DATA.mainlines.filter(m=>m.group===g);if(!items.length)return'';
    const cards=items.map(m=>`<div class="hcard" onclick="go('${m.id}')"><div class="hn">主线 ${m.num}</div>
      <div class="ht">${m.title}</div><div class="hh">${m.hook}</div>
      <div class="htk">${(DATA.tickers[m.id]||[]).length} 个 A股/港股标的 →</div></div>`).join('');
    return `<div class="hg"><div class="hgt">${g}</div><div class="hg-grid">${cards}</div></div>`;
  }).join('');
  return `<div class="home-hero"><h2>A股科技主线投研图谱</h2>
    <p>覆盖 AI 算力时代 13 条核心科技主线。每条主线按「大层次 → 小层次」可折叠展开：点击大层级进入，再展开细分赛道查看「全球龙头 vs 国产龙头 + 代码 + 现状」。半导体已细化到设备/材料逐项赛道。</p></div>
    <div class="home-groups">${groups}</div>`;
}
function renderPage(id){
  const c=document.getElementById('content');
  if(id==='home'){c.innerHTML=renderHome();document.getElementById('crumb').innerHTML='首页';}
  else{
    const m=byId[id];if(!m){go('home');return;}
    c.innerHTML=`<div class="pagehead"><span class="gtag">${m.group}</span>
      <h2>主线 ${m.num} · ${m.title}</h2><p class="hook">${m.hook}</p></div>`
      +m.blocks.map(renderBlock).join('');
    document.getElementById('crumb').innerHTML=`首页 / <b>主线 ${m.num} ${m.title}</b>`;
    // 默认展开第一个 L1，方便直接看到内容
    const first=c.querySelector('details.l1');if(first)first.open=true;
  }
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  window.scrollTo(0,0);document.getElementById('side').classList.remove('open');
}
function setAll(open){document.querySelectorAll('#content details').forEach(d=>d.open=open);}
function go(id){location.hash='m'+id;}
function buildNav(){
  let h=`<div class="navgroup"><div class="navitem" data-id="home" onclick="go('home')">
    <span class="nidx">⌂</span><span><span class="ntitle">总览首页</span><span class="nhook">13 条主线框架地图</span></span></div></div>`;
  DATA.groupOrder.forEach(g=>{
    const items=DATA.mainlines.filter(m=>m.group===g);if(!items.length)return;
    h+=`<div class="navgroup"><div class="gtitle">${g}</div>`;
    items.forEach(m=>{h+=`<div class="navitem" data-id="${m.id}" onclick="go('${m.id}')">
      <span class="nidx">${m.num}</span><span><span class="ntitle">${m.title}</span><span class="nhook">${m.hook}</span></span></div>`;});
    h+=`</div>`;
  });
  document.getElementById('nav').innerHTML=h;
}
function doSearch(kw){
  kw=kw.trim().toLowerCase();
  document.querySelectorAll('.navitem').forEach(n=>{
    const id=n.dataset.id;if(id==='home'){n.style.display=kw?'none':'';return;}
    const m=byId[id];const tks=(DATA.tickers[id]||[]).map(t=>t.name+t.code).join('');
    n.style.display=(!kw||(m.title+m.hook+tks).toLowerCase().includes(kw))?'':'none';
  });
}
function route(){const h=location.hash.replace('#m','');renderPage(h&&byId[h]?h:'home');}
window.addEventListener('hashchange',route);
document.getElementById('q').addEventListener('input',e=>doSearch(e.target.value));
document.getElementById('menuBtn').addEventListener('click',()=>document.getElementById('side').classList.toggle('open'));
buildNav();route();
</script></body></html>
