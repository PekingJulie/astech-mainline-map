<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>A股科技主线投研图谱 · 13 条主线</title>
<style>
:root{--bg:#f5f6f8;--panel:#fff;--ink:#1a2233;--sub:#5b6577;--line:#e4e7ec;--accent:#1f5fd6;
 --accent-soft:#e8f0fe;--side:#0f1b2d;--side-ink:#c8d3e4;--gold:#d99100;--a:#d23f3f;--hk:#1f7ae0;}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
 background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7}
a{color:var(--accent);text-decoration:none}
.layout{display:flex;min-height:100vh}
.side{width:280px;flex:0 0 280px;background:var(--side);color:var(--side-ink);position:sticky;top:0;
 height:100vh;overflow-y:auto}
.side .brand{padding:20px 18px 14px;border-bottom:1px solid #1d2c44}
.side .brand h1{font-size:16px;margin:0;color:#fff}
.side .brand p{margin:6px 0 0;font-size:12px;color:#7d8aa0}
.side .search{padding:12px 14px}
.side .search input{width:100%;padding:8px 10px;border-radius:7px;border:1px solid #243450;background:#0a1525;
 color:#dfe7f3;font-size:13px;outline:none}
.side .search input::placeholder{color:#5e6c84}
.navgroup{padding:6px 0}
.navgroup .gtitle{font-size:11px;color:#6b7a93;padding:10px 18px 4px;letter-spacing:1px}
.navitem{display:flex;gap:9px;padding:9px 16px 9px 18px;cursor:pointer;border-left:3px solid transparent}
.navitem:hover{background:#15233a}
.navitem.active{background:#15233a;border-left-color:var(--accent)}
.navitem .nidx{font-size:11px;font-weight:700;color:#7d8aa0;min-width:18px;padding-top:2px}
.navitem.active .nidx{color:#5fa0ff}
.navitem .ntitle{font-size:13.5px;color:#dbe3f0;font-weight:600}
.navitem.active .ntitle{color:#fff}
.navitem .nhook{display:block;font-size:11px;color:#7886a0;margin-top:2px;line-height:1.4}
.main{flex:1;min-width:0}
.topbar{position:sticky;top:0;z-index:5;background:rgba(245,246,248,.92);backdrop-filter:blur(6px);
 border-bottom:1px solid var(--line);padding:12px 32px;display:flex;align-items:center;gap:14px}
.topbar .crumb{font-size:13px;color:var(--sub)}.topbar .crumb b{color:var(--ink)}
.tools{margin-left:auto;display:flex;gap:8px;align-items:center}
.tools button{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;color:var(--ink)}
.tools button:hover{border-color:var(--accent);color:var(--accent)}
.note{font-size:12px;color:var(--sub);background:#fff7e6;border:1px solid #ffe2a8;padding:5px 10px;border-radius:6px}
.content{max-width:1120px;margin:0 auto;padding:28px 32px 80px}
.pagehead{margin-bottom:18px}
.pagehead .gtag{display:inline-block;font-size:12px;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:20px;font-weight:600}
.pagehead h2{font-size:26px;margin:10px 0 4px}.pagehead .hook{color:var(--sub);font-size:14px;margin:0}

/* 标的速览 */
.tk-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:16px 0 22px}
.tk-wrap h3{margin:0 0 4px;font-size:15px}.tk-wrap .tk-sub{font-size:12px;color:var(--sub);margin:0 0 12px}
.tk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:9px}
.chip{border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#fcfcfd;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.chip:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(31,95,214,.12)}

/* 详情弹窗 */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(15,27,45,.5);z-index:50;
 align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-mask.show{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.md-head{padding:18px 22px;background:linear-gradient(135deg,#0f1b2d,#1f3a63);color:#fff;position:relative}
.md-head h3{margin:0;font-size:20px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.md-head .msub{margin:6px 0 0;font-size:12.5px;color:#b7c4da;font-family:ui-monospace,Menlo,monospace}
.md-close{position:absolute;top:14px;right:16px;cursor:pointer;color:#b7c4da;font-size:22px;line-height:1;border:none;background:none}
.md-close:hover{color:#fff}
.md-body{padding:18px 22px 22px}
.val-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.val-card{border:1px solid var(--line);border-radius:9px;padding:10px 12px;text-align:center}
.val-card .vl{font-size:11px;color:var(--sub)}
.val-card .vv{font-size:18px;font-weight:700;margin-top:3px;color:#13233f}
.val-card .vv.neg{color:#2a9d4a}.val-card .vv.pos{color:#d23f3f}
.md-sec-t{font-size:13px;font-weight:700;color:#23344e;margin:14px 0 7px}
.bigspark{border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:6px}
.fin-table{border-collapse:collapse;width:100%;font-size:13px}
.fin-table td{border:1px solid var(--line);padding:7px 10px}
.fin-table td:first-child{color:var(--sub);width:42%;background:#fafbfc}
.fin-table td b{color:#10233f}
.up{color:#d23f3f}.down{color:#2a9d4a}
.md-foot{font-size:11px;color:#9aa3b2;margin-top:14px;line-height:1.6}
.md-na{color:var(--sub);font-size:13px;padding:10px 0}
.chip .cr{display:flex;align-items:center;gap:6px}
.chip .cname{font-weight:600;font-size:13.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip .star{color:var(--gold);font-size:12px}
.chip .cmeta{display:flex;gap:6px;margin-top:5px;align-items:center}
.mkt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;color:#fff}
.mkt.A{background:var(--a)}.mkt.港股{background:var(--hk)}
.chip .ccode{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--sub)}
.spark{margin-top:7px;height:30px}.spark .ph{font-size:10.5px;color:#9aa3b2;border-top:1px dashed #d7dbe2;padding-top:4px}

/* 可折叠层次 */
details.l1{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:10px 0;overflow:hidden}
details.l1>summary{padding:13px 18px;font-size:16px;font-weight:700;cursor:pointer;list-style:none;
 display:flex;align-items:center;gap:10px;color:#13233f;background:#f8fafd}
details.l1[open]>summary{border-bottom:1px solid var(--line)}
summary::-webkit-details-marker{display:none}
.chev{transition:transform .15s;color:var(--accent);font-size:13px}
details[open]>summary .chev{transform:rotate(90deg)}
.l1-body{padding:6px 18px 16px}
.blknote{font-size:13px;color:var(--sub);background:var(--accent-soft);border-left:3px solid var(--accent);
 padding:7px 12px;border-radius:0 6px 6px 0;margin:10px 0}
details.l2{border:1px solid var(--line);border-radius:8px;margin:8px 0;overflow:hidden}
details.l2>summary{padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;list-style:none;
 display:flex;align-items:center;gap:8px;color:#23344e;background:#fbfcfe}
details.l2[open]>summary{border-bottom:1px solid var(--line)}
.l2-body{padding:2px 12px 10px}

/* 表格 */
table.dt{border-collapse:collapse;width:100%;font-size:13px;margin:8px 0}
table.dt th,table.dt td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
table.dt th{background:#eef2f8;font-weight:700;white-space:nowrap}
table.dt tr:nth-child(even) td{background:#fafbfc}
.cn-lead{font-weight:700;color:#10233f}
.tkcode{display:inline-block;background:var(--accent-soft);color:var(--accent);border-radius:4px;padding:1px 6px;
 font-family:ui-monospace,Menlo,monospace;font-size:12.5px;font-weight:600;margin:1px 0}
.tkcode.hk{background:#e3f0ff;color:var(--hk)}
.tkcode.hk i{font-style:normal;font-size:9px;opacity:.7;margin-left:1px}
.csep{color:#c0c8d4;margin:0 1px}
.tkblank{color:#9aa3b2}
/* 表格内可点击标的 token */
.tk{cursor:pointer;color:var(--accent);white-space:nowrap}
.tk:hover{text-decoration:underline}
.tk b{font-family:ui-monospace,Menlo,monospace;font-weight:700}
.tk.hk,.tk.hk b{color:var(--hk)}
.tk .mc{color:#8a93a3;font-weight:400}
.tk.dim{color:#5b6577;cursor:default}
.tk.dim:hover{text-decoration:none}
.tk.dim .tkx{color:#aab2c0;margin-left:4px;font-size:11px}
.tk.fx,.tk.fx b{color:#6a4bbf}
.cn-lead .tk{display:inline-block;margin:1px 0}
.blank-warn{color:#c0392b;font-weight:600}

/* md 渲染 */
.md h1{font-size:18px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.md h2,.md h3{font-size:15px;margin:14px 0 8px;color:#23344e}
.md p{margin:8px 0}.md ul,.md ol{padding-left:22px}.md li{margin:3px 0}
.md strong{color:#10233f}
.md blockquote{margin:10px 0;padding:7px 12px;background:var(--accent-soft);border-left:4px solid var(--accent);border-radius:0 6px 6px 0}
.md code{background:#eef1f5;padding:1px 5px;border-radius:4px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace}
.md pre{background:#0f1b2d;color:#cdd9ec;padding:14px 16px;border-radius:9px;overflow-x:auto;font-size:12.5px;line-height:1.55}
.md pre code{background:none;color:inherit;padding:0}
.md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px;display:block;overflow-x:auto}
.md th,.md td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
.md th{background:#eef2f8;font-weight:700;white-space:nowrap}.md tr:nth-child(even) td{background:#fafbfc}
.md hr{border:none;border-top:1px solid var(--line);margin:18px 0}

/* 底层原理模块 */
.pr{font-size:14px;line-height:1.75}
.pr-lead{background:var(--accent-soft);border-left:4px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:6px}
.pr h3{font-size:15.5px;margin:18px 0 8px;color:#16233a}
.pr p{margin:8px 0;color:#2a3850}.pr b{color:#10233f}
.diagram{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin:12px 0;overflow-x:auto}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.pr-card{border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:13px;line-height:1.6}
.pr-card.red{background:#fff7f7;border-color:#f3c9c9}
.pr-card.blue{background:#f5f9ff;border-color:#cfe0fa}
.pr-card .pc-t{font-weight:700;margin-bottom:4px;color:#13233f}
.pr-card .pc-s{color:var(--sub);font-size:12px}
details.l1.prin>summary{background:linear-gradient(135deg,#eef3fb,#e3ecfb);color:#13233f}
/* 制造流程卡片 */
.flow{margin:14px 0}
.flow-step{display:flex;align-items:stretch;margin-bottom:9px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
.fs-num{flex:0 0 42px;background:linear-gradient(135deg,#1f5fd6,#1f3a63);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.fs-icon{flex:0 0 58px;display:flex;align-items:center;justify-content:center;background:#f4f7fc;border-right:1px solid var(--line)}
.fs-body{flex:1;padding:9px 14px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.fs-t{font-size:15px;font-weight:700;color:#13233f}
.fs-d{font-size:12px;color:var(--sub);margin-top:2px}
.fs-dev{flex:0 0 40%;padding:9px 14px;border-left:1px dashed var(--line);font-size:12px;display:flex;flex-direction:column;justify-content:center}
.fs-dev .dl{color:#8a93a3;font-size:11px}
.fs-dev .dev{color:#2a3850;margin-top:1px}
.fs-dev .lead{color:#1f5fd6;font-weight:600;margin-top:4px;display:block;font-size:12.5px}
.vendor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}
.vendor-card{border-radius:10px;padding:12px 13px;color:#fff}
.vendor-card .vc-t{font-size:13px;font-weight:700;margin-bottom:6px}
.vendor-card .vc-l{font-size:12px;line-height:1.7}
.vendor-card .vc-s{opacity:.8;font-size:11px}
.vendor-card .tk{color:#fff;text-decoration:underline;text-underline-offset:2px}
.vc-1{background:linear-gradient(135deg,#1f5fd6,#1f3a63)}
.vc-2{background:linear-gradient(135deg,#0f8a7e,#0c5d54)}
.vc-3{background:linear-gradient(135deg,#7a5bc2,#4a2e9e)}
.vc-4{background:linear-gradient(135deg,#d98324,#b3600f)}
@media(max-width:680px){.fs-icon{display:none}.fs-dev{flex-basis:46%}.vendor-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.pr-grid{grid-template-columns:1fr}}
/* 首页 */
.home-hero{background:linear-gradient(135deg,#0f1b2d,#1f3a63);color:#fff;border-radius:14px;padding:30px 32px;margin-bottom:24px}
.home-hero h2{margin:0 0 8px;font-size:26px}.home-hero p{margin:0;color:#b7c4da;font-size:14px;max-width:780px}
.home-groups{display:grid;gap:18px}
.hg{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.hg .hgt{font-size:13px;color:var(--accent);font-weight:700;letter-spacing:1px;margin:0 0 10px}
.hg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.hcard{border:1px solid var(--line);border-radius:9px;padding:12px 13px;cursor:pointer;transition:.12s}
.hcard:hover{border-color:var(--accent);box-shadow:0 3px 10px rgba(31,95,214,.1);transform:translateY(-1px)}
.hcard .hn{font-size:11px;color:#97a1b3;font-weight:700}.hcard .ht{font-size:15px;font-weight:700;margin:2px 0 4px}
.hcard .hh{font-size:12px;color:var(--sub);line-height:1.5}.hcard .htk{font-size:11px;color:var(--accent);margin-top:7px}
.menu-btn{display:none;border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;cursor:pointer}
@media(max-width:820px){.side{position:fixed;left:-280px;transition:left .2s;z-index:20}.side.open{left:0}.menu-btn{display:inline-flex!important}}
</style></head><body>
<div class="layout">
  <aside class="side" id="side">
    <div class="brand"><h1>A股科技主线投研图谱</h1><p>13 条主线 · 可折叠层级 · 303 个标的</p></div>
    <div class="search"><input id="q" placeholder="搜索主线 / 标的代码…"></div>
    <nav id="nav"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="crumb" id="crumb">首页</div>
      <div class="tools">
        <button onclick="setAll(true)">展开全部</button>
        <button onclick="setAll(false)">折叠全部</button>
        <span class="note">点击标的看市值/财务 · 数据2026-06</span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal" class="modal-mask" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box" id="modalBox"></div>
</div>

光刻胶","~5%（ArF 级）","树脂合成"],["特种气体","~20%","纯化工艺"],["CMP 研磨液","~15%","先进节点配方"],["靶材","~30%","纯度 / 晶粒控制"],["CCL/PCB 材料","~60%","高端树脂仍进口"],["芯片设计（模拟）","~20%","—"],["成熟节点代工","~30%","—"],["先进节点代工","0%","光刻机制约"],["OSAT 封装","~25%","高端封装差距"]]},{"t":"附 · 价值量与毛利分布","k":"md","md":"按照**各环节的毛利润绝对值**来算「谁最赚钱」，这是真实的价值捕获，比看收入更准确。\n\n**全球半导体价值链 毛利润分布（2024A）**\n\n| 环节 | 代表公司 | 2024 估算毛利 | 占链条总毛利 | 毛利率 |\n|------|---------|------------|-----------|------|\n| **AI/高性能芯片设计** | Nvidia, Broadcom, AMD | ~$750亿 | **约 36%** | 70-74% |\n| **其他 Fabless 设计** | Qualcomm, MediaTek, ARM | ~$400亿 | **约 19%** | 50-60% |\n| **先进晶圆代工** | TSMC | ~$480亿 | **约 23%** | 53-55% |\n| **半导体设备** | ASML, AMAT, LRCX, KLA, TEL | ~$500亿 | **约 24%** | 47-55% |\n| **IDM（设计+制造一体）** | Intel, TI, Infineon, STM | ~$480亿 | **约 23%** | 35-55% |\n| **半导体材料** | 信越化学, SUMCO, 空气化工 | ~$230亿 | **约 11%** | 35-45% |\n| **EDA + IP 授权** | Synopsys, Cadence, ARM | ~$95亿 | **约 5%** | 78-82% |\n| **封装测试（OSAT）** | ASE, Amkor, 长电 | ~$110亿 | **约 5%** | 18-28% |\n| **成熟代工（28nm+）** | SMIC, GlobalFoundries, 华虹 | ~$80亿 | **约 4%** | 20-35% |\n\n> 注：各环节毛利存在一定交叉（Nvidia 的毛利包含了支付给 TSMC 的代工费用），但从**投资视角**看，这张表直接反映每个上市标的所在层的「利润密度」。\n\n**核心结论**：\n- AI 芯片设计 + 先进代工 + 设备 三者合计占链条毛利约 **70%+**，但国内几乎拿不到这部分（Nvidia 一家的 AI 算力毛利 > 整个 A 股半导体板块总毛利）\n- EDA/IP 体量小但毛利率最高，是「小而美」的卡脖子点\n- OSAT 和成熟代工是「走量不走利」的低毛利环节，国内市场份额较高但经济价值低\n\n---"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 大基金三期部署（最直接）**\n规模约 3440 亿，2024-2025 年密集投资。重点方向：先进制造（中芯）、设备（北方华创、中微）、材料（沪硅、安集）。每一次投资确认公告即构成阶段性催化。\n\n**2. 美国出口管制升级（倒逼催化）**\n每一轮新管制清单落地（2022→2023→2024 持续收紧），短期砸盘但中期加速国产替代需求释放。管制越严，国内买家越急于建立国产供应链。\n\n**3. 华为 / 海思回归（需求侧验证）**\n海思 Kirin 芯片回归市场（借助中芯 N+2 工艺），拉动整条国产设备/材料供应链需求。每一款新手机/AI 服务器芯片量产，即验证国产工艺可行性。\n\n**4. 中芯国际 / 华虹产能扩张（制造侧放量）**\n中芯 N3/N5 晶圆厂量产，直接采购国产设备优先（政策要求）。设备国产化率从 15% 提升到 30%+，带动设备/材料公司业绩兑现。\n\n**5. AI 大模型本土化部署（需求侧）**\n政务云、金融云、运营商指定使用国产算力（如华为昇腾）。带动国产 AI 芯片出货量，间接拉动国产制造工艺、封测需求。\n\n**6. 先进封装窗口期（Chiplet 机会）**\n先进封装是国内和台系差距相对最小的环节（台积电 CoWoS 产能紧张）。长电科技 FOWLP/Chiplet 国际客户开拓是 2025-2026 的重要看点。\n\n---"},{"t":"附 · 技术路线图","k":"md","md":"| 方向 | 当前状态 | 2025-2026 节点 | 2027-2028 节点 |\n|------|---------|-------------|-------------|\n| AI 芯片算力 | H100（80GB HBM3） | B200（192GB HBM3E）量产 | Rubin 架构（预计 2026） |\n| 存储带宽 | HBM3E（1.2TB/s） | HBM4（2TB/s+） | 3D DRAM 与计算融合 |\n| 封装 | CoWoS-S（600mm² interposer） | CoWoS-L（超大版图）、SoIC | 3.5D → 3D IC 堆叠 |\n| 制程节点（TSMC）| 3nm 量产 | 2nm（N2）量产 | 1.6nm（A16） |\n| 制程节点（中芯）| N+2（~7nm 水平） | N+3 研发中 | 受设备限制，突破难度大 |\n| 封装基板 | ABF 载板（主流） | 玻璃基板小批试产（Intel） | 玻璃基板量产（2026-2027？）|\n| 光刻胶 | ArF 浸没（主流，7nm 以上） | EUV（3nm 以下必用） | High-NA EUV（2nm 以下） |\n| 刻蚀设备 | 等离子刻蚀为主 | 原子层刻蚀（ALE）渗透率提升 | 2nm 以下 ALE 为主 |\n\n---"},{"t":"附 · 地缘政治风险","k":"md","md":"### 3.1 美国出口管制（影响最直接）\n\n| 管制时间线 | 内容 | 对 A 股的影响 |\n|-----------|------|------------|\n| 2022 年 10 月 | 禁止 A100/H100 出口中国 | 国内算力芯片（寒武纪、海光）需求暴增 |\n| 2023 年 10 月 | 堵A800/H800 漏洞，扩大实体清单 | 华为昇腾成为唯一可用替代，中芯被限设备采购 |\n| 2024 年持续 | 扩大FDPR覆盖范围，限制先进存储（HBM）| 长鑫存储 HBM 研发受阻 |\n| 2025 年（最新）| 进一步收紧 AI 芯片算力上限（<1700 TOPS 规则）| 倒逼国内 AI 芯片需求完全转向国产 |\n\n**荷兰/日本联动**：2023 年荷兰对 ASML DUV 出口加许可证要求；日本同年限制 23 类半导体设备出口。这意味着管制已从「美国单边」变成「三方联合封锁」，缺口更难绕开。\n\n---\n\n### 3.2 中东局势对半导体供应链的传导路径\n\n```\n胡塞武装袭击红海航运（2024 年至今）\n        ↓\n绕道好望角：运输周期 +10-14 天，运费 +200-300%\n        ↓\n受影响标的：\n  ① 半导体设备交货延期（ASML/AMAT 设备从欧美发货）\n  ② 电子特气/化学品供给节奏紊乱\n  ③ PCB 铜箔/玻纤布海运成本上升\n\n伊朗-以色列冲突升级风险\n        ↓\n霍尔木兹海峡封锁（极端情景）\n        ↓\n全球油价飙升 → 晶圆厂电力成本+15-20%（晶圆厂是高耗电行业）\n```\n\n**对 A 股具体影响**：\n- **短期利空**：铜箔、玻纤布、特种化学品的运输成本上升，压缩 PCB 和半导体材料企业毛利\n- **中长期利好**：海运成本提升加速供应链本土化替代意愿，加速设备/材料国产化采购决策\n\n---\n\n### 3.3 台海风险（最大尾部风险）\n\n| 场景 | 概率（市场定价）| 半导体链条冲击 |\n|------|-------------|------------|\n| 维持现状（军事压力存在但无实质冲突）| 高 | 持续推动 TSMC 海外分散（AZ/日本/德国建厂），带动设备需求 |\n| 半封锁（禁运/金融制裁）| 中 | 全球先进芯片供应收缩 80%+，短期恐慌但倒逼国内加速 |\n| 武力冲突 | 低 | 全球电子产业重组，TSMC 产能受损，国内成熟制程短期受益 |\n\n**A 股投资含义**：台海风险是「不可对冲但要在框架里定价」的因素。市场对台海风险的隐含定价会体现在国内半导体公司相对于 TSMC 的估值溢价/折价上。\n\n---\n\n### 3.4 各方管制对国内影响汇总\n\n| 受影响赛道 | 管制方 | 影响性质 | A股受益方向 |\n|----------|-------|---------|---------|\n| AI 芯片（H100/B200 断供）| 美国 | 直接断供 | 寒武纪、海光、华为昇腾供应链 |\n| EUV 光刻机断供 | 荷兰 | 先进制程封锁 | 中芯国际成熟节点扩产，设备国产化 |\n| DUV 设备限制 | 荷兰+日本 | 28nm 以下扩张受限 | 国产设备替代（中微、北方华创） |\n| 半导体设备（23类）| 日本 | CVD/清洗/检测受限 | 拓荆科技、盛美上海、精测电子 |\n| HBM 出口限制 | 美国（2024）| 高端存储封锁 | 长鑫存储、澜起科技（HBM 接口）|\n| 镓/锗/钽出口 | **中国（反制）** | 战略矿产反制牌 | 中金岭南、驰宏锌锗（主动受益）|\n\n> 最后一行是关键：出口管制是双向的。中国掌握的镓（~80%全球份额）、锗（~60%）是对等反制的手牌，已于 2023 年开始实施出口许可证制度，这是「算力矿产」主线的政策底座。\n\n---\n\n---"}]},{"id":"02","num":2,"title":"光通信 / 光模块","group":"算力核心链","hook":"800G→1.6T 放量，封装环节全球第一，DSP 仍是卡点","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">先分清两件事：<b>光通信</b>是用光<b>搬数据</b>（传输），<b>光计算</b>是用光<b>算数据</b>（运算）——两者底层物理不同。下面从\"为什么换光\"，到\"光怎么传 / 怎么调制\"，再到最底层的\"<b>光为什么能直接做矩阵乘法</b>\"，一层层拆。</div>\n\n<h3>一、为什么\"光进铜退\"</h3>\n<p>电信号在铜线里跑，速率越高、距离越长越吃亏：<b>趋肤效应</b>让高频电流只走导体表面、电阻骤增；<b>插入损耗</b>随频率指数上升；还有<b>串扰</b>和<b>电磁干扰</b>。到 112G/224G PAM4，铜缆超过 1–2 米信号就糊了。光纤几乎没有这些问题——损耗低（≤0.2 dB/km）、带宽近乎无限、抗干扰、不串扰。边界很清楚：<b>机柜内超短距铜还能打，跨机柜/机房必须上光</b>，且窗口随速率升级持续收窄。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 720 150\" width=\"100%\">\n  <rect x=\"20\" y=\"40\" width=\"180\" height=\"46\" rx=\"6\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <rect x=\"210\" y=\"40\" width=\"220\" height=\"46\" rx=\"6\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <rect x=\"440\" y=\"40\" width=\"260\" height=\"46\" rx=\"6\" fill=\"#e3f0ff\" stroke=\"#1f7ae0\"/>\n  <text x=\"110\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#b3261e\">机柜内 &lt;2m</text>\n  <text x=\"110\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" fill=\"#7a2020\">铜缆 DAC（成本低）</text>\n  <text x=\"320\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#1f5fd6\">机柜间 3–100m</text>\n  <text x=\"320\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" fill=\"#27406e\">光模块 AOC / 可插拔</text>\n  <text x=\"570\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#1f7ae0\">机房间 &gt;100m</text>\n  <text x=\"570\" y=\"78\" text-anchor=\"middle\" font-size=\"11\" fill=\"#27406e\">光纤（光完全主导）</text>\n  <line x1=\"20\" y1=\"110\" x2=\"700\" y2=\"110\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar)\"/>\n  <defs><marker id=\"ar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <text x=\"20\" y=\"128\" font-size=\"11\" fill=\"#64748b\">距离越远 →</text>\n  <text x=\"700\" y=\"128\" text-anchor=\"end\" font-size=\"11\" fill=\"#64748b\">速率越高 → 铜缆窗口越窄</text>\n</svg>\n</div>\n\n<h3>二、光通信底层：怎么把比特\"写\"到光上</h3>\n<p><b>① 为什么光纤能低损耗传：</b>光在纤芯里靠<b>全内反射</b>不漏出去；石英玻璃在 1550nm 波段的本征吸收极低（~0.2 dB/km），掺锗还能压低色散。所以一束光跑几十公里几乎不衰减。</p>\n<p><b>② 怎么把电信号变成光：</b>低速可以直接开关激光器（直接调制）；高速必须用<b>外调制器（MZM 马赫–曾德干涉仪）</b>——给波导加电压，靠<b>电光效应</b>改变折射率→改变光的<b>相位</b>→两路再合并<b>干涉</b>，相位差就转成了光<b>强度</b>的变化。这就是\"用电压去雕刻光\"。</p>\n<p><b>③ 为什么 DSP 是大脑也是卡点：</b>早期只用光的强弱表示 0/1（强度调制 IM-DD）。要塞更多信息，就同时用光的<b>相位 + 偏振</b>编码（QPSK / 16QAM），一个符号携带好几个比特。代价是接收端要靠<b>相干 DSP</b> 做均衡、色散补偿、相位恢复、前向纠错——高速光模块的\"大脑\"就是这颗 DSP，也是 Marvell 垄断、国产空白的最大卡点。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 720 170\" width=\"100%\">\n  <text x=\"360\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">马赫–曾德干涉仪（MZI）：光通信的调制器，也是光计算的基本单元</text>\n  <!-- 输入 -->\n  <line x1=\"30\" y1=\"90\" x2=\"130\" y2=\"90\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <text x=\"30\" y=\"80\" font-size=\"11\" fill=\"#8a6d1a\">输入光</text>\n  <!-- 分束 -->\n  <circle cx=\"140\" cy=\"90\" r=\"6\" fill=\"#1f5fd6\"/>\n  <line x1=\"140\" y1=\"90\" x2=\"260\" y2=\"55\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <line x1=\"140\" y1=\"90\" x2=\"260\" y2=\"125\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <!-- 上臂加相位 -->\n  <rect x=\"300\" y=\"40\" width=\"120\" height=\"30\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <text x=\"360\" y=\"60\" text-anchor=\"middle\" font-size=\"11\">加电压 → 相位 φ</text>\n  <line x1=\"260\" y1=\"55\" x2=\"300\" y2=\"55\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <line x1=\"420\" y1=\"55\" x2=\"560\" y2=\"55\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <line x1=\"260\" y1=\"125\" x2=\"560\" y2=\"125\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <text x=\"360\" y=\"140\" text-anchor=\"middle\" font-size=\"11\" fill=\"#64748b\">下臂（参考）</text>\n  <!-- 合束干涉 -->\n  <circle cx=\"570\" cy=\"90\" r=\"6\" fill=\"#1f5fd6\"/>\n  <line x1=\"560\" y1=\"55\" x2=\"570\" y2=\"90\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <line x1=\"560\" y1=\"125\" x2=\"570\" y2=\"90\" stroke=\"#d99100\" stroke-width=\"3\"/>\n  <line x1=\"570\" y1=\"90\" x2=\"690\" y2=\"90\" stroke=\"#d23f3f\" stroke-width=\"3\"/>\n  <text x=\"600\" y=\"80\" font-size=\"11\" fill=\"#b3261e\">输出强度</text>\n  <text x=\"600\" y=\"108\" font-size=\"10\" fill=\"#64748b\">= 干涉结果(φ)</text>\n  <text x=\"120\" y=\"160\" font-size=\"10.5\" fill=\"#5b6577\">同一个结构：调相位→改强度（通信用来调制）；按权重设相位→实现可调的\"乘法/变换\"（计算用来运算）</text>\n</svg>\n</div>\n\n<h3>三、光模块构成（800G 爆炸图）</h3>\n<p>光模块就是\"电↔光\"转换的精密集成体：电信号从金手指进 → <b>DSP</b> 整形 → 驱动调制 → <b>光引擎</b>转成光 → 光纤输出。价值量极不均，DSP 和光芯片是利润高地与国产卡点。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 270\" width=\"100%\">\n  <!-- 外壳上盖 -->\n  <rect x=\"70\" y=\"22\" width=\"430\" height=\"24\" rx=\"8\" fill=\"#d7dee8\" stroke=\"#94a3b8\"/>\n  <text x=\"285\" y=\"38\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#475569\">外壳上盖（屏蔽 / 散热）</text>\n  <line x1=\"500\" y1=\"34\" x2=\"690\" y2=\"34\" stroke=\"#cbd5e1\"/><text x=\"694\" y=\"38\" font-size=\"10\" fill=\"#475569\">①外壳 ⑧散热</text>\n  <!-- PCB 主体 -->\n  <rect x=\"70\" y=\"78\" width=\"430\" height=\"86\" rx=\"6\" fill=\"#27613f\" stroke=\"#1b4a2f\"/>\n  <g fill=\"#e8b923\"><rect x=\"74\" y=\"90\" width=\"5\" height=\"62\"/><rect x=\"82\" y=\"90\" width=\"5\" height=\"62\"/><rect x=\"90\" y=\"90\" width=\"5\" height=\"62\"/></g>\n  <text x=\"86\" y=\"160\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#cfe6d4\">金手指</text>\n  <rect x=\"150\" y=\"98\" width=\"58\" height=\"46\" rx=\"3\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"179\" y=\"125\" text-anchor=\"middle\" font-size=\"12\" fill=\"#fff\" font-weight=\"700\">DSP</text>\n  <rect x=\"228\" y=\"100\" width=\"34\" height=\"18\" rx=\"2\" fill=\"#5b8def\"/><text x=\"245\" y=\"113\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#fff\">Driver</text>\n  <rect x=\"228\" y=\"124\" width=\"34\" height=\"18\" rx=\"2\" fill=\"#5b8def\"/><text x=\"245\" y=\"137\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#fff\">TIA</text>\n  <g fill=\"#bcd\"><rect x=\"278\" y=\"100\" width=\"6\" height=\"11\"/><rect x=\"288\" y=\"100\" width=\"6\" height=\"11\"/><rect x=\"278\" y=\"118\" width=\"6\" height=\"11\"/><rect x=\"288\" y=\"118\" width=\"6\" height=\"11\"/></g>\n  <text x=\"305\" y=\"156\" font-size=\"8.5\" fill=\"#cfe6d4\">被动元件</text>\n  <rect x=\"395\" y=\"92\" width=\"92\" height=\"58\" rx=\"4\" fill=\"#7a5bc2\" stroke=\"#4a2e9e\"/><text x=\"441\" y=\"116\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">光引擎</text><text x=\"441\" y=\"133\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#e0d6f5\">TOSA/ROSA·硅光PIC</text>\n  <!-- 标注 -->\n  <line x1=\"500\" y1=\"100\" x2=\"690\" y2=\"100\" stroke=\"#f3c9c9\"/><text x=\"694\" y=\"104\" font-size=\"10\" fill=\"#b3261e\">⑥ DSP（卡点）</text>\n  <line x1=\"500\" y1=\"124\" x2=\"690\" y2=\"124\" stroke=\"#d9cdf3\"/><text x=\"694\" y=\"128\" font-size=\"10\" fill=\"#4a2e9e\">④光芯片 ③硅光PIC</text>\n  <line x1=\"500\" y1=\"148\" x2=\"690\" y2=\"148\" stroke=\"#cfe0fa\"/><text x=\"694\" y=\"152\" font-size=\"10\" fill=\"#1f5fd6\">⑤驱动+TIA ⑦PCB被动</text>\n  <!-- 光纤 + MPO -->\n  <path d=\"M487 121 C 545 121, 565 150, 612 150\" stroke=\"#e8b923\" stroke-width=\"4\" fill=\"none\"/>\n  <rect x=\"612\" y=\"138\" width=\"46\" height=\"26\" rx=\"3\" fill=\"#1a2233\"/><text x=\"635\" y=\"155\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\">MPO</text>\n  <text x=\"560\" y=\"180\" font-size=\"9.5\" fill=\"#475569\">② 光接口 OSA / 光纤</text>\n  <!-- 外壳下盖 -->\n  <rect x=\"70\" y=\"196\" width=\"430\" height=\"22\" rx=\"8\" fill=\"#d7dee8\" stroke=\"#94a3b8\"/><text x=\"285\" y=\"211\" text-anchor=\"middle\" font-size=\"10\" fill=\"#475569\">外壳下盖 + ⑨金手指电接口</text>\n  <g stroke=\"#cbd5e1\" stroke-dasharray=\"3 3\"><line x1=\"285\" y1=\"46\" x2=\"285\" y2=\"78\"/><line x1=\"285\" y1=\"164\" x2=\"285\" y2=\"196\"/></g>\n  <text x=\"370\" y=\"245\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#5b6577\">电信号 → 金手指进 → DSP 整形 → 驱动调制 → 光引擎转光 → 光纤输出</text>\n</svg>\n</div>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 175\" width=\"100%\">\n  <text x=\"12\" y=\"18\" font-size=\"11.5\" font-weight=\"700\" fill=\"#13233f\">价值量分布（占链条）· 越厚利润越高</text>\n  <g font-size=\"11\">\n   <text x=\"12\" y=\"44\">封装集成</text><rect x=\"120\" y=\"33\" width=\"420\" height=\"15\" rx=\"3\" fill=\"#1f5fd6\"/><text x=\"548\" y=\"45\" fill=\"#1f5fd6\" font-weight=\"700\">34%（中国 60%+ 份额）</text>\n   <text x=\"12\" y=\"70\">DSP 芯片</text><rect x=\"120\" y=\"59\" width=\"247\" height=\"15\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"375\" y=\"71\" fill=\"#d23f3f\" font-weight=\"700\">20%（国内空白·卡点）</text>\n   <text x=\"12\" y=\"96\">光芯片 InP/硅光</text><rect x=\"120\" y=\"85\" width=\"198\" height=\"15\" rx=\"3\" fill=\"#6a4bbf\"/><text x=\"326\" y=\"97\" fill=\"#6a4bbf\" font-weight=\"700\">16%</text>\n   <text x=\"12\" y=\"122\">光纤/光缆/预制棒</text><rect x=\"120\" y=\"111\" width=\"198\" height=\"15\" rx=\"3\" fill=\"#0f8a7e\"/><text x=\"326\" y=\"123\" fill=\"#0f8a7e\" font-weight=\"700\">16%</text>\n   <text x=\"12\" y=\"148\">光无源器件</text><rect x=\"120\" y=\"137\" width=\"173\" height=\"15\" rx=\"3\" fill=\"#94a3b8\"/><text x=\"301\" y=\"149\" fill=\"#5b6577\" font-weight=\"700\">14%</text>\n  </g>\n</svg>\n</div>\n\n<h3>四、★ 光计算：光为什么能\"直接算\"矩阵乘法</h3>\n<p>这是最底层、也是最反直觉的一点。电子芯片算乘法，要靠成千上万个晶体管开关、走数字逻辑；而<b>光，天生就会做乘法和加法</b>——AI 神经网络 90% 的运算就是\"乘累加（MAC）/矩阵乘法\"，正好踩在光的天赋上。</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">乘法 = 光强 × 透过率</div>一束强度 <b>I</b> 的光，穿过一个透过率为 <b>w</b> 的调制器（可调衰减/MZI），出来就是 <b>I × w</b>。<br><span class=\"pc-s\">一次乘法 = 光穿过一个器件，光速完成、无源几乎不耗电</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">加法 = 多路光汇合</div>多束光打到<b>同一个光电探测器</b>，探测器输出电流 = 各路光强之和 <b>Σ Iᵢwᵢ</b>。<br><span class=\"pc-s\">乘法 + 加法 = 一个神经元的全部运算（MAC）</span></div>\n</div>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 250\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">矩阵 × 向量 = 一次光传播（y = W·x）</text>\n  <!-- 输入向量 x -->\n  <g font-size=\"11\" text-anchor=\"middle\">\n   <text x=\"55\" y=\"55\" fill=\"#8a6d1a\" font-weight=\"700\">输入 x</text>\n   <circle cx=\"55\" cy=\"80\" r=\"12\" fill=\"#fde9c7\" stroke=\"#d99100\"/><text x=\"55\" y=\"84\">x₁</text>\n   <circle cx=\"55\" cy=\"130\" r=\"12\" fill=\"#fde9c7\" stroke=\"#d99100\"/><text x=\"55\" y=\"134\">x₂</text>\n   <circle cx=\"55\" cy=\"180\" r=\"12\" fill=\"#fde9c7\" stroke=\"#d99100\"/><text x=\"55\" y=\"184\">x₃</text>\n   <text x=\"55\" y=\"212\" font-size=\"9\" fill=\"#8a6d1a\">光强编码</text>\n  </g>\n  <!-- 权重网格 3x3 -->\n  <g>\n   <rect x=\"180\" y=\"50\" width=\"320\" height=\"160\" rx=\"8\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n   <text x=\"340\" y=\"44\" text-anchor=\"middle\" font-size=\"11\" fill=\"#4a2e9e\" font-weight=\"700\">可编程权重网格 W（MZI 干涉阵列 / 微环）</text>\n   <!-- 横线（输入沿行进入） -->\n   <g stroke=\"#d99100\" stroke-width=\"2\">\n    <line x1=\"100\" y1=\"80\" x2=\"180\" y2=\"80\"/><line x1=\"100\" y1=\"130\" x2=\"180\" y2=\"130\"/><line x1=\"100\" y1=\"180\" x2=\"180\" y2=\"180\"/>\n   </g>\n   <!-- 节点 wij -->\n   <g font-size=\"9.5\" text-anchor=\"middle\">\n   <g fill=\"#6a4bbf\">\n    <rect x=\"220\" y=\"68\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"234\" y=\"84\">w₁₁</text>\n    <rect x=\"320\" y=\"68\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"334\" y=\"84\">w₁₂</text>\n    <rect x=\"420\" y=\"68\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"434\" y=\"84\">w₁₃</text>\n    <rect x=\"220\" y=\"118\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"234\" y=\"134\">w₂₁</text>\n    <rect x=\"320\" y=\"118\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"334\" y=\"134\">w₂₂</text>\n    <rect x=\"420\" y=\"118\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"434\" y=\"134\">w₂₃</text>\n    <rect x=\"220\" y=\"168\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"234\" y=\"184\">w₃₁</text>\n    <rect x=\"320\" y=\"168\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"334\" y=\"184\">w₃₂</text>\n    <rect x=\"420\" y=\"168\" width=\"28\" height=\"24\" rx=\"4\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/><text x=\"434\" y=\"184\">w₃₃</text>\n   </g>\n   </g>\n  </g>\n  <!-- 输出 y -->\n  <g stroke=\"#d23f3f\" stroke-width=\"2\"><line x1=\"500\" y1=\"80\" x2=\"560\" y2=\"80\"/><line x1=\"500\" y1=\"130\" x2=\"560\" y2=\"130\"/><line x1=\"500\" y1=\"180\" x2=\"560\" y2=\"180\"/></g>\n  <g font-size=\"11\" text-anchor=\"middle\">\n   <text x=\"610\" y=\"55\" fill=\"#b3261e\" font-weight=\"700\">输出 y</text>\n   <rect x=\"566\" y=\"68\" width=\"80\" height=\"24\" rx=\"4\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/><text x=\"606\" y=\"84\" font-size=\"9.5\">Σ x·w₁ⱼ</text>\n   <rect x=\"566\" y=\"118\" width=\"80\" height=\"24\" rx=\"4\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/><text x=\"606\" y=\"134\" font-size=\"9.5\">Σ x·w₂ⱼ</text>\n   <rect x=\"566\" y=\"168\" width=\"80\" height=\"24\" rx=\"4\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/><text x=\"606\" y=\"184\" font-size=\"9.5\">Σ x·w₃ⱼ</text>\n   <text x=\"606\" y=\"212\" font-size=\"9\" fill=\"#b3261e\">探测器累加</text>\n  </g>\n  <text x=\"370\" y=\"238\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#5b6577\">光从左穿到右的那一瞬间（皮秒级），整个矩阵乘法就算完了——延迟≈光程/光速，无源部分几乎不耗电</text>\n</svg>\n</div>\n\n<p><b>为什么这对 AI 是降维打击：</b>① <b>速度</b>——运算\"沿途完成\"，延迟只取决于光飞过芯片的时间；② <b>并行</b>——用 <b>WDM 波分复用</b>，一根波导里几十上百个波长同时算，天然大规模并行；③ <b>能效</b>——线性光学无源部分几乎零功耗。</p>\n<p><b>那为什么还没取代 GPU？</b>瓶颈不在\"算\"，而在<b>电↔光转换</b>（输入要 DAC+调制、输出要探测+ADC，这部分很耗电）、<b>模拟精度</b>（光是模拟量，有噪声，难做高精度）、<b>非线性与存储</b>（激活函数、权重更新难用纯光做）。所以现实路线是<b>光电混合</b>：用光加速推理里的<b>线性层（矩阵乘）</b>，非线性和控制仍交给电。代表玩家：Lightmatter、曦智科技（Lightelligence）、微环/衍射光神经网络等，A 股暂无纯标，硅光产业链（光芯片/PIC）是最接近的卡位。</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">电计算（GPU）</div>晶体管开关 · 数字精确 · 串行受时钟限制 · 数据搬运耗能（冯·诺依曼）</div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">光计算</div>模拟线性运算 · 光速沿途完成 · WDM 大规模并行 · 线性部分近零功耗<br><span class=\"pc-s\">短板：E-O-E 转换耗能、精度有限、难做非线性/存储</span></div>\n</div>\n\n<h3>五、速率演进与下一代</h3>\n<p><b>400G → 800G（放量）→ 1.6T（2025-26）→ 3.2T</b>：靠 PAM4 多电平 + 更高波特率 + 多通道并行。下一代看两条线——<b>CPO</b>（光引擎与交换芯片共封装、省电链路损耗）与<b>硅光/光计算</b>（更多光器件上芯片）。谁先突破 <b>DSP 国产化</b>，谁就拿走光模块这条链最厚的利润。</p>\n\n</div>\n"},{"t":"一、光模块整机（封装集成）","k":"group","note":"光模块封装环节价值量最大（约 34%），中国企业占全球 60%+ 份额，是最成功的国产化赛道。","children":[{"t":"1.1 数通光模块（400G / 800G / 1.6T）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["数通光模块","Coherent (COHR) / Lumentum (LITE)","中际旭创、新易盛、天孚通信、华工科技、光迅科技、剑桥科技、长芯博创","300308、300502、300394、000988、002281、603083、300548","中际旭创全球出货量第一；800G 放量、1.6T 认证先发"]]},{"t":"1.2 相干光模块（骨干网 / 长距 400G ZR+）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["相干光模块","Coherent (COHR) / Lumentum (LITE) / Ciena (CIEN)","光迅科技、中际旭创","002281、300308","InP 激光器良率、DSP 断供是主要风险"]]},{"t":"1.3 CPO 光电共封装（下一代）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["CPO","Broadcom (AVGO) / Intel (INTC) / Ranovus","中际旭创（布局）、华为（未上市）","300308","早期验证，2026 年前不构成实质威胁"]]}]},{"t":"二、光芯片（价值量薄弱的国产卡点）","k":"group","note":"光芯片是国产化率最低的核心环节，InP 激光器、硅光、DSP 三处是卡脖子点。","children":[{"t":"2.1 InP 磷化铟激光器芯片（800G 核心）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["InP 激光器 / 探测器","Coherent (COHR) / Lumentum (LITE) / Broadcom (AVGO)","源杰科技、光迅科技、仕佳光子","688498、002281、688313","高速 EML 良率差距，国产化率 ~18%"]]},{"t":"2.2 硅光芯片（Silicon Photonics，CPO 基础）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["硅光芯片","Intel (INTC) / Cisco-Acacia (CSCO) / STMicro (STM)","中国电科光芯（未上市）、苏州旭创","—","需借助晶圆厂，光电集成工艺差距"]]},{"t":"2.3 GaAs 砷化镓芯片（中短距 / 低速段）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["GaAs 光芯片","WIN Semiconductors（台）","三安光电","600703","GaAs 外延布局"]]}]},{"t":"三、DSP 芯片（最高壁垒 · 国内空白）","k":"table","note":"DSP 占链条总价值约 20%，Marvell 一家拿走绝大部分，是国内光模块龙头最大的供应链风险。一旦国产突破，光模块毛利率有望从 40% 升至 55%+。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["相干 / PAM4 DSP","Marvell (MRVL, 70%+) / Broadcom (AVGO) / Credo (CRDO)","无","—","CUDA 式软件生态锁定，国产化率 ~0%"],["1.6T DSP","Marvell (MRVL)","无","—","2025-2026 量产节点，PAM4 DSP 独家"]]},{"t":"四、光无源器件","k":"group","children":[{"t":"4.1 光隔离器 / 环形器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["光隔离器 / 环形器","TDK (6762.T) / Kyocera","天宇股份（未上市）","—","高档隔离度指标不达标"]]},{"t":"4.2 AWG 阵列波导光栅 / PLC 分路器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["AWG / PLC","Neophotonics（已被 Lumentum 收购）","光迅科技、武汉敏芯（未上市）","002281","高频段插损控制难度，国产化率 ~55%"]]},{"t":"4.3 EDFA 光纤放大器","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["EDFA 放大器","Coherent (COHR)","光迅科技、烽火通信","002281、600498","高功率多泵浦控制电路差距"]]}]},{"t":"五、光纤 / 光缆 / 预制棒","k":"group","children":[{"t":"5.1 光纤预制棒（最高壁垒，决定光纤成本）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["光纤预制棒","Corning (GLW) / Prysmian (PRY.MI) / Sumitomo (5802.T)","长飞光纤、中天科技、亨通光电","HK6869、600522、600487","OVD/VAD 核心工艺，氟化物掺杂纯度"]]},{"t":"5.2 光缆成品","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["光缆成品","Corning (GLW) / Furukawa (5801.T)","亨通光电、中天科技、烽火通信、通鼎互联、永鼎股份","600487、600522、600498、002491、600105","国内份额已高，海外认证仍有门槛"]]}]},{"t":"六、上游材料","k":"group","children":[{"t":"6.1 InP 衬底（磷化铟单晶）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["InP 衬底","Sumitomo (5802.T) / AXT (AXTI) / Wafer Technology（英）","云南锗业（铟资源上游）、中晶科技（未上市）","002428","🔴 子公司鑫耀6英寸量产、国内市占~80%；AI光互连暗线、衬底全球缺口>70%，但2026Q1净利-11%盈利待兑现"],["7N 高纯铟（InP 衬底原料）","—","锡业股份（7N铟全球第一）","000960","🟢 原生铟市占~30%；2026Q1营收+60%/净利+74%（金属涨价）"]]},{"t":"6.2 GaAs 衬底","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["GaAs 衬底","AXT (AXTI) / Freiberger（德）","三安光电","600703","—"]]},{"t":"6.3 铒掺杂材料（EDFA 用）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["铒掺杂材料","AMG（德）/ Stanford Advanced Materials","—","—","国际为主，国内空白"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| DSP 芯片（相干/PAM4）| ~$70 亿 | 63-68% | **约 20%** | Marvell (MRVL)、Broadcom (AVGO) |\n| InP/硅光光芯片 | ~$60 亿 | 55-62% | **约 16%** | Coherent (COHR)、源杰科技 688498 |\n| 光模块封装集成 | ~$280 亿 | 35-45% | **约 34%** | 中际旭创 300308、Coherent (COHR) |\n| 光无源器件 | ~$80 亿 | 38-45% | **约 14%** | 天孚通信 300394、光迅科技 002281 |\n| 光纤预制棒 | ~$30 亿 | 45-52% | **约 7%** | 长飞光纤（港股 6869）、Corning (GLW) |\n| 光缆成品 | ~$120 亿 | 28-35% | **约 9%** | 亨通光电 600487、中天科技 600522 |\n| InP/GaAs 衬底 | ~$15 亿 | 48-55% | **约 4%** | Sumitomo Electric（日本）、AXT (AXTI) |\n| EDFA 放大器 | ~$25 亿 | 40-48% | **约 5%** | 光迅科技 002281、Coherent (COHR) |\n\n> **核心结论**：DSP 芯片占链条总价值约 20% 但 Marvell 一家拿走绝大部分，中国企业完全缺席；光模块封装环节价值量最大（34%），中国企业占全球 60%+ 份额，是最成功的国产化赛道。"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| 光模块封装整机 | ~58% | **~65%** | 70% | 已领先，DSP 芯片采购依赖 Marvell |\n| 相干光模块 | ~25% | **~32%** | 45% | InP 激光器芯片良率，DSP 断供风险 |\n| InP 激光器芯片 | ~12% | **~18%** | 30% | 高速 EML（电吸收调制激光器）良率差距 |\n| 硅光芯片 | ~8% | **~14%** | 25% | 光电集成制造工艺，需借助晶圆厂 |\n| DSP 芯片 | ~0% | **~0%** | <5% | Marvell 技术代差大，CUDA 式软件生态锁定 |\n| 光隔离器 / 环形器 | ~35% | **~42%** | 55% | 高档隔离度指标不达标 |\n| AWG / PLC 器件 | ~45% | **~55%** | 65% | 高频段插损控制难度 |\n| EDFA 光放大器 | ~40% | **~50%** | 62% | 高功率多泵浦控制电路 |\n| 光纤预制棒 | ~28% | **~36%** | 48% | OVD/VAD 核心工艺，氟化物掺杂纯度 |\n| 光缆成品 | ~48% | **~55%** | 65% | 国内份额已高，海外认证仍有门槛 |\n| InP 衬底 | ~10% | **~15%** | 25% | 2英寸→3英寸晶体生长良率 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 800G 光模块大规模放量（2024-2025 高峰）**\n全球超大规模数据中心（Meta/Google/微软）AI 集群扩建，800G 模块单价约 $600-800，每座大型 AI 集群需要数万个端口。中际旭创 2024 年 800G 收入占比超 40%。\n受益标的：中际旭创 300308、新易盛 300502、天孚通信 300394\n\n**2. 1.6T 光模块量产节点（2025-2026）**\nNvidia B200/GB200 NVL72 机柜需要 1.6T 光模块互联，Marvell 已开始供货 PAM4 DSP，中际旭创等率先完成样品认证的企业将拿到下一轮先发订单。\n受益标的：中际旭创 300308、光迅科技 002281\n\n**3. 国内 AI 算力基础设施独立建设（与美国算力需求解耦）**\n国内三大运营商、百度、华为云智算中心建设，国产光互联需求形成独立增长极，不依附于 Nvidia GPU 出货节奏。2025 年国内数据中心光模块需求预计超 $40 亿。\n受益标的：华工科技 000988、烽火通信 600498\n\n**4. CPO 商业化验证（长期变量，2026-2027）**\nCPO 将光芯片和交换机芯片集成在同一封装，消灭可插拔模块插座。若 CPO 规模商业化，将重构现有光模块价值链。目前仍在早期验证阶段，2026 年前不构成实质威胁。\n受益标的（潜在受益）：中际旭创（可能参与 CPO 集成）、光迅科技 002281\n\n**5. DSP 芯片国产化突破（最重要的长期看点）**\n目前 Marvell 垄断 800G+ 相干 DSP，是国内光模块龙头的最大供应链风险。一旦国内 DSP 芯片实现突破，整条链价值量将重新分配，光模块企业毛利率有望从 40% 升至 55%+。\n潜在受益标的：上海曦智（未上市）、光迅科技 002281（自研尝试）"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. DSP 芯片出口管制风险（高概率）**\nMarvell 是美国上市公司，若 DSP 芯片被纳入 BIS 实体清单管制，国内光模块企业面临供应链断供。中际旭创、新易盛等收入体量 70%+ 来自欧美 CSP，双重暴露。影响：短期利空，中长期加速国产 DSP 研发投入。\n\n**2. InP 衬底日本供应依赖**\n住友电工（Sumitomo Electric）是全球 InP 衬底最大供应商，日本参与多边出口管制后，InP 衬底供应具有潜在中断风险。中国铟矿资源全球第一（~60%），但高纯 InP 单晶加工能力严重不足。影响：中短期压力，加速国内 InP 衬底（中晶科技、AXT 国内工厂）扩产。\n\n**3. 红海 / 中东航运中断**\n光缆海底工程（跨大西洋、跨太平洋）施工船队需绕行好望角，海缆施工周期延长 4-6 周。亨通光电、中天科技海缆业务的施工和交付节奏受影响。影响：轻度利空，体现在季度收入节奏，不影响长期需求。\n\n**4. 台海风险：光芯片制造依赖台湾**\n硅光芯片部分依赖台积电先进制程代工（TSMC CoWoS），GaAs 芯片依赖台湾 WIN Semiconductors。台海局势紧张将影响光芯片供应。影响：双刃剑——短期冲击供应，但加速国内光芯片和硅光晶圆厂自建进程。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| 光模块速率 | 800G 放量，1.6T 样品 | 1.6T 量产（中际旭创/Coherent）| 3.2T 技术验证开始 |\n| DSP 工艺 | 4nm PAM4 DSP（Marvell 领先）| 3nm DSP 投产（Marvell N3B）| 2nm DSP 预研 |\n| InP 激光器 | EML 25G baud，国产良率 ~65% | 56G baud EML 国产化尝试 | 国产 EML 进入海外供应链 |\n| 硅光 CPO | 早期验证（Broadcom/Intel）| Google/Meta 小批量采购测试 | 规模商业化（取决于成本） |\n| 光纤预制棒 | 国内 OVD 法占主流，低损耗≤0.18 dB/km | 超低损耗光纤（≤0.15）国产化 | 弯曲不敏感 / 多芯光纤产业化 |\n| 国产 InP 衬底 | 2英寸为主，3英寸少量 | 3英寸 InP 良率突破（>80%）| 4英寸 InP 衬底工程化 |\n\n---\n\n---"}]},{"id":"03","num":3,"title":"存储","group":"算力核心链","hook":"HBM/DDR5/NAND 超级周期，澜起 CXL/HBF 最纯正","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">存储这条线最近最火，核心就一句话：<b>AI 的瓶颈正从\"算力\"转向\"带宽\"</b>。GPU 越来越强，但喂数据的内存跟不上——这就是要打破的<b>冯·诺依曼瓶颈</b>。HBM、存算一体、CXL 全是冲着这个去的。</div>\n\n<h3>一、冯·诺依曼瓶颈（内存墙）</h3>\n<p>经典冯·诺依曼架构里，<b>计算和存储是物理分开的</b>，数据必须通过总线在两者之间来回搬。问题是：算力（GPU FLOPS）几十年翻了几万倍，而内存<b>带宽</b>只翻了几十倍——这道\"剪刀差\"就是<b>内存墙</b>。结果是 GPU 大量时间在<b>等数据</b>，而且芯片<b>能耗的大头花在搬运数据上，而非计算本身</b>。大模型推理的 KV Cache 随上下文线性暴涨，把这堵墙顶得更高。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 720 130\" width=\"100%\">\n  <g font-size=\"11\" text-anchor=\"middle\">\n  <rect x=\"20\" y=\"45\" width=\"120\" height=\"44\" rx=\"6\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"80\" y=\"64\" font-weight=\"700\">GPU / CPU</text><text x=\"80\" y=\"80\" font-size=\"9\" fill=\"#5b6577\">算力（涨得飞快）</text>\n  <rect x=\"300\" y=\"45\" width=\"120\" height=\"44\" rx=\"6\" fill=\"#fff7e6\" stroke=\"#d99100\"/><text x=\"360\" y=\"64\" font-weight=\"700\">内存 DRAM</text><text x=\"360\" y=\"80\" font-size=\"9\" fill=\"#8a6d1a\">带宽（涨得慢）</text>\n  <rect x=\"560\" y=\"45\" width=\"120\" height=\"44\" rx=\"6\" fill=\"#eef2f8\" stroke=\"#cbd5e1\"/><text x=\"620\" y=\"64\" font-weight=\"700\">存储 NAND</text><text x=\"620\" y=\"80\" font-size=\"9\" fill=\"#5b6577\">容量大但很慢</text>\n  </g>\n  <g stroke=\"#d23f3f\" stroke-width=\"2\" marker-end=\"url(#a3)\" marker-start=\"url(#a3s)\">\n  <line x1=\"142\" y1=\"67\" x2=\"298\" y2=\"67\"/><line x1=\"422\" y1=\"67\" x2=\"558\" y2=\"67\"/>\n  </g>\n  <defs>\n   <marker id=\"a3\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#d23f3f\"/></marker>\n   <marker id=\"a3s\" markerWidth=\"9\" markerHeight=\"9\" refX=\"0\" refY=\"3\" orient=\"auto\"><path d=\"M6,0 L0,3 L6,6 Z\" fill=\"#d23f3f\"/></marker>\n  </defs>\n  <text x=\"220\" y=\"40\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#b3261e\">瓶颈①数据搬运</text>\n  <text x=\"490\" y=\"40\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#b3261e\">瓶颈②访存延迟</text>\n  <text x=\"360\" y=\"115\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#64748b\">能耗大头在\"搬数据\"，不在\"算\" → 让存储靠近计算，是降耗、降延迟的根本路径</text>\n</svg>\n</div>\n\n<h3>二、HBM 原理：把内存\"摞起来、贴到 GPU 边上\"</h3>\n<p>HBM（高带宽内存）的解法是<b>3D 堆叠 + 先进封装</b>：多颗 DRAM Die 用 <b>TSV（硅通孔）</b>垂直打通、<b>Micro-bump</b> 互连，底下加 <b>Base/Logic Die</b> 管控，再通过 <b>硅中介层（Silicon Interposer）</b>与 GPU 并排坐在同一块封装基板上（即台积电 <b>CoWoS</b>）。这样数据走的是\"<b>又宽又短</b>\"的路径——带宽暴涨、延迟和单位能耗大降。代价是工艺极难（TSV 深宽比、对准键合、良率、散热），<b>这才是 HBM 真正的壁垒</b>，国内目前空白。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 760 300\" width=\"100%\">\n  <!-- 封装基板 -->\n  <rect x=\"40\" y=\"248\" width=\"520\" height=\"22\" rx=\"2\" fill=\"#8a9a6b\" stroke=\"#5b6b3a\"/>\n  <text x=\"300\" y=\"263\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\">⑥ Package Substrate 封装基板 → PCB</text>\n  <!-- BGA 焊球 -->\n  <g fill=\"#aab4c2\"><circle cx=\"80\" cy=\"278\" r=\"5\"/><circle cx=\"140\" cy=\"278\" r=\"5\"/><circle cx=\"200\" cy=\"278\" r=\"5\"/><circle cx=\"260\" cy=\"278\" r=\"5\"/><circle cx=\"320\" cy=\"278\" r=\"5\"/><circle cx=\"380\" cy=\"278\" r=\"5\"/><circle cx=\"440\" cy=\"278\" r=\"5\"/><circle cx=\"500\" cy=\"278\" r=\"5\"/></g>\n  <!-- 硅中介层 -->\n  <rect x=\"60\" y=\"224\" width=\"480\" height=\"22\" rx=\"2\" fill=\"#9fb3c8\" stroke=\"#64748b\"/>\n  <text x=\"300\" y=\"239\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#1a2233\">⑤ Silicon Interposer 硅中介层（重布线 / 扩 I/O）</text>\n  <!-- GPU Die -->\n  <rect x=\"86\" y=\"150\" width=\"150\" height=\"64\" rx=\"5\" fill=\"#1f5fd6\"/>\n  <text x=\"161\" y=\"180\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#fff\">GPU Die</text>\n  <text x=\"161\" y=\"198\" text-anchor=\"middle\" font-size=\"9\" fill=\"#cfe0fa\">算力核心</text>\n  <g fill=\"#e8b923\"><circle cx=\"100\" cy=\"218\" r=\"2.5\"/><circle cx=\"120\" cy=\"218\" r=\"2.5\"/><circle cx=\"140\" cy=\"218\" r=\"2.5\"/><circle cx=\"160\" cy=\"218\" r=\"2.5\"/><circle cx=\"180\" cy=\"218\" r=\"2.5\"/><circle cx=\"200\" cy=\"218\" r=\"2.5\"/><circle cx=\"220\" cy=\"218\" r=\"2.5\"/></g>\n  <!-- HBM 堆叠 -->\n  <g>\n  <rect x=\"330\" y=\"70\" width=\"190\" height=\"24\" fill=\"#3a4252\" stroke=\"#1a2233\"/><text x=\"425\" y=\"87\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\">DRAM Die</text>\n  <rect x=\"330\" y=\"98\" width=\"190\" height=\"24\" fill=\"#3a4252\" stroke=\"#1a2233\"/><text x=\"425\" y=\"115\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\">DRAM Die</text>\n  <rect x=\"330\" y=\"126\" width=\"190\" height=\"24\" fill=\"#3a4252\" stroke=\"#1a2233\"/><text x=\"425\" y=\"143\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\">DRAM Die</text>\n  <rect x=\"330\" y=\"154\" width=\"190\" height=\"24\" fill=\"#3a4252\" stroke=\"#1a2233\"/><text x=\"425\" y=\"171\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\">DRAM Die</text>\n  <rect x=\"330\" y=\"184\" width=\"190\" height=\"30\" fill=\"#5b6577\" stroke=\"#1a2233\"/><text x=\"425\" y=\"203\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\">④ Base / Logic Die</text>\n  <!-- TSV -->\n  <g stroke=\"#e8b923\" stroke-width=\"2.5\"><line x1=\"360\" y1=\"70\" x2=\"360\" y2=\"214\"/><line x1=\"400\" y1=\"70\" x2=\"400\" y2=\"214\"/><line x1=\"440\" y1=\"70\" x2=\"440\" y2=\"214\"/><line x1=\"480\" y1=\"70\" x2=\"480\" y2=\"214\"/></g>\n  <!-- Micro-bump 微凸点（层间 + base下） -->\n  <g fill=\"#d99100\"><circle cx=\"350\" cy=\"96\" r=\"2\"/><circle cx=\"380\" cy=\"96\" r=\"2\"/><circle cx=\"410\" cy=\"96\" r=\"2\"/><circle cx=\"440\" cy=\"96\" r=\"2\"/><circle cx=\"470\" cy=\"96\" r=\"2\"/><circle cx=\"500\" cy=\"96\" r=\"2\"/>\n   <circle cx=\"350\" cy=\"124\" r=\"2\"/><circle cx=\"410\" cy=\"124\" r=\"2\"/><circle cx=\"470\" cy=\"124\" r=\"2\"/>\n   <circle cx=\"350\" cy=\"216\" r=\"2.5\"/><circle cx=\"385\" cy=\"216\" r=\"2.5\"/><circle cx=\"420\" cy=\"216\" r=\"2.5\"/><circle cx=\"455\" cy=\"216\" r=\"2.5\"/><circle cx=\"490\" cy=\"216\" r=\"2.5\"/></g>\n  </g>\n  <!-- 超短互连 -->\n  <line x1=\"236\" y1=\"190\" x2=\"330\" y2=\"190\" stroke=\"#d23f3f\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/>\n  <text x=\"283\" y=\"185\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#b3261e\">超短互连</text>\n  <!-- 右侧标注 -->\n  <g font-size=\"10\">\n  <line x1=\"520\" y1=\"82\" x2=\"600\" y2=\"82\" stroke=\"#cbd5e1\"/><text x=\"604\" y=\"86\" fill=\"#1a2233\">① 多层 DRAM 堆叠</text>\n  <line x1=\"480\" y1=\"60\" x2=\"600\" y2=\"60\" stroke=\"#e8c463\"/><text x=\"604\" y=\"64\" fill=\"#8a6d1a\">② TSV 硅通孔</text>\n  <line x1=\"500\" y1=\"124\" x2=\"600\" y2=\"124\" stroke=\"#e8c463\"/><text x=\"604\" y=\"128\" fill=\"#8a6d1a\">③ Micro-bump 微凸点</text>\n  </g>\n  <rect x=\"600\" y=\"150\" width=\"150\" height=\"74\" rx=\"8\" fill=\"#f8fafd\" stroke=\"#e4e7ec\"/>\n  <text x=\"612\" y=\"170\" font-size=\"11\" font-weight=\"700\" fill=\"#13233f\">= CoWoS（2.5D 封装）</text>\n  <text x=\"612\" y=\"190\" font-size=\"9.5\" fill=\"#5b6577\">GPU 与 HBM 同坐中介层</text>\n  <text x=\"612\" y=\"206\" font-size=\"9.5\" fill=\"#5b6577\">\"又宽又短\"互连</text>\n  <text x=\"612\" y=\"220\" font-size=\"9.5\" fill=\"#b3261e\">中国 HBM 全链空白(0%)</text>\n</svg>\n</div>\n\n<h3>三、HBM vs GDDR：为什么 AI 偏要 HBM</h3>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">GPU + HBM（近距堆叠）</div>紧贴 GPU、超短走线 → <b>带宽极高、延迟低、单位 bit 能耗低</b><br><span class=\"pc-s\">适合大模型训练/推理、长上下文、高并发</span></div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">GPU + GDDR（外置分立）</div>独立封装、走线长 → 带宽受限、延迟更高<br><span class=\"pc-s\">够用于游戏渲染/通用显存，喂不饱 AI 大模型</span></div>\n</div>\n<p style=\"margin-top:6px\">一句话：<b>对 AI 而言，算力不是唯一瓶颈，喂得饱 GPU 的内存系统才是关键。</b>这也是 HBM 毛利率逼近 GPU、SK 海力士业绩爆发的根本原因。</p>\n\n<h3>四、存储层级与\"存算一体\"趋势</h3>\n<p>存储天然是金字塔：越靠近计算越快越贵越小。HBM 和传统 NAND 之间有一道<b>巨大的速度/容量空白</b>，于是出现三条\"让存储靠近计算\"的路线：</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 720 180\" width=\"100%\">\n  <polygon points=\"360,15 300,55 420,55\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <rect x=\"290\" y=\"55\" width=\"140\" height=\"34\" fill=\"#fff1d6\" stroke=\"#d99100\"/>\n  <rect x=\"250\" y=\"89\" width=\"220\" height=\"34\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <rect x=\"200\" y=\"123\" width=\"320\" height=\"34\" fill=\"#eef2f8\" stroke=\"#cbd5e1\"/>\n  <g font-size=\"11\" text-anchor=\"middle\">\n   <text x=\"360\" y=\"48\" font-size=\"10\" font-weight=\"700\">HBM</text>\n   <text x=\"360\" y=\"77\">DRAM / DDR5</text>\n   <text x=\"360\" y=\"111\">SSD / NAND</text>\n   <text x=\"360\" y=\"145\" fill=\"#5b6577\">HDD / 冷存储</text>\n  </g>\n  <text x=\"20\" y=\"40\" font-size=\"10\" fill=\"#b3261e\">快 · 贵 · 小</text>\n  <text x=\"20\" y=\"150\" font-size=\"10\" fill=\"#64748b\">慢 · 便宜 · 大</text>\n  <g font-size=\"10\" fill=\"#4a2e9e\">\n   <text x=\"560\" y=\"60\">① HBF：NAND 也用 TSV 堆叠，填 HBM↔NAND 空白</text>\n   <text x=\"560\" y=\"82\">② CXL：内存池化，按需扩展、共享</text>\n   <text x=\"560\" y=\"104\">③ PIM 存内计算：把算力塞进存储内部</text>\n  </g>\n</svg>\n</div>\n<p>三条路线本质都在干同一件事——<b>缩短数据到计算的距离，逼近\"存算一体\"</b>，从而降能耗、缩延迟。A 股最纯正的接口卡位是<b>澜起科技</b>（DDR5 RCD / CXL / 未来 HBF 接口），设备侧则是长存扩产链（北方华创、中微、拓荆、华海清科）。详见下方各层级与「HBF 前沿机会」。</p>\n\n</div>\n"},{"t":"一、DRAM（动态随机存储）","k":"group","note":"DRAM（含 HBM）约占存储链条总价值的 55%，是最赚钱环节。中国在 HBM 整个链条上市占率为 0%。","children":[{"t":"1.1 通用 DRAM（DDR5 / LPDDR5）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["通用 DRAM","Samsung (005930.KS) / SK Hynix (000660.KS) / Micron (MU)","长鑫存储（未上市）","—","19nm LPDDR5 量产，导入华为/荣耀，国产化率 ~6%"]]},{"t":"1.2 HBM 高带宽内存（AI 训练核心存储）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["HBM3E（当前主流）","SK Hynix (000660.KS, 50%+) / Samsung / Micron (MU)","无","—","国产化率 0%，TSV 设备管控 + SK 专利封锁"],["HBM4（2025-2026 节点）","SK Hynix（先发）/ Samsung（跟进）","无","—","8-Hi 堆叠，带宽 2TB/s+，国内空白"]]},{"t":"1.3 SRAM（芯片内缓存）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["SRAM","ISSI（被君正收购）/ Renesas (6723.T)","北京君正","300223","收购 ISSI 后进入车规 SRAM"]]}]},{"t":"二、NAND Flash（闪存）","k":"group","children":[{"t":"2.1 3D NAND 晶圆（主力产品）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["3D NAND
