en":[{"t":"6.1 ONO 介电层材料（3D NAND 核心）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["ONO 介电层","Air Products (APD) / Merck KGaA（德）","—","—","国际为主，国内空白"]]},{"t":"6.2 高纯湿电子化学品（蚀刻 / 清洗）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["高纯湿化学品","Stella Chemifa（日）/ Kanto Chemical（日）","晶瑞电材、格林达","300655、603931","超高纯级（12N）仍欠缺"]]},{"t":"6.3 ALD 前驱体材料","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["ALD 前驱体","Air Products (APD) / Merck（德）/ Hansol（韩）","雅克科技","002409","国内唯一进入 HBM 前驱体供应链"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| HBM（DRAM 中的高价值子集）| ~$130 亿 | 62-68% | **约 19%** | SK Hynix（000660.KS）独占 |\n| 通用 DRAM（DDR4/5）| ~$750 亿 | 40-52% | **约 36%** | Samsung / SK Hynix / Micron |\n| 3D NAND 晶圆 | ~$650 亿 | 35-45% | **约 26%** | Samsung / Kioxia / WD / Micron |\n| 存储接口芯片（RCD/SPD）| ~$15 亿 | 58-65% | **约 2%** | 澜起科技 688008（35% 市占）|\n| SSD 主控芯片 | ~$50 亿 | 55-62% | **约 6%** | Marvell / Phison / 慧荣 |\n| 先进封装（HBM TSV）| ~$40 亿 | 30-38% | **约 3%** | SK Hynix、TSMC |\n| 传统存储封装 | ~$80 亿 | 20-28% | **约 3%** | ASE / 长电科技 600584 |\n| 存储关键材料 | ~$120 亿 | 35-42% | **约 5%** | Merck KGaA、Air Products |\n\n> **核心结论**：DRAM（含 HBM）约占链条总价值的 55%，是存储链最赚钱的环节。HBM 毛利率比通用 DRAM 高 15-20pp，是 SK Hynix 2024 年净利润爆发的直接原因。中国在 HBM 整个链条上市占率为 0%。"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| HBM（任何层级）| 0% | **0%** | <2% | TSV 设备管控、SK Hynix 专利封锁 |\n| 通用 DRAM（DDR5）| ~3% | **~6%** | 12% | 长鑫存储 19nm 良率爬坡，EUV 缺失限制代际升级 |\n| LPDDR5（手机内存）| ~5% | **~9%** | 18% | 长鑫存储导入华为 / 荣耀手机 |\n| 3D NAND（232 层以下）| ~12% | **~18%** | 28% | 长江存储 232 层良率达标，294 层研发受设备限制 |\n| 3D NAND（294 层+）| 0% | **~3%** | 10% | ALD/刻蚀设备国产化进度是瓶颈 |\n| 企业级 SSD（整机）| ~8% | **~14%** | 25% | 需晶圆+主控+封装三合一，主控仍依赖台湾 |\n| SSD 主控芯片 | ~3% | **~5%** | 12% | 英韧科技起步，与 Phison / 慧荣差距 3-4 代 |\n| DDR5 RCD 接口芯片 | ~28% | **~35%** | 50% | 澜起科技进入 Dell/HPE 供应链，全球第三 |\n| 存储封装（传统）| ~22% | **~28%** | 38% | 长电 / 通富技术已可用，良率差距收窄 |\n| ALD 前驱体材料 | ~15% | **~22%** | 35% | 雅克科技国产化推进，高端前驱体仍差距 |\n| 高纯电子化学品 | ~20% | **~28%** | 40% | 晶瑞 / 格林达覆盖率提升，超高纯级（12N）仍欠缺 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. HBM4 量产节点（2025-2026，最大增量）**\nSK Hynix HBM4（8-Hi 堆叠，带宽 2TB/s+）预计 2025 年下半年供货 Nvidia Rubin 平台。每颗 B200 GPU 配备 8 颗 HBM3E，成本占 GPU 总 BOM 的 30%+，单次升级周期带动 SK Hynix 年收入增长 $80-100 亿。\n受益标的：无直接 A 股受益（国内 HBM 空白），间接：澜起科技 688008（未来 HBM 接口芯片机会）\n\n**2. 长江存储 294 层 NAND 突破验证**\n若 294 层 NAND 实现量产良率 >70%，将与 Samsung/Kioxia 最新节点（238 层）形成竞争。设备是关键：Lam Research 部分设备在管制边界，国产刻蚀/ALD 能否补位是节点能否实现的决定性因素。\n受益标的：拓荆科技 688072、中微公司 688012、长江存储产业链\n\n**3. 长鑫存储 LPDDR5 导入国内旗舰手机**\n华为 Mate70/P80 系列若规模导入长鑫存储 LPDDR5，将验证国产 DRAM 商业可行性，并拉动规模效应。2024 年已有小批量导入，2025 年是规模化放量的关键节点。\n受益标的：长鑫存储产业链（上游设备材料：拓荆科技 688072、北方华创 002371）\n\n**4. 存储超级周期启动（需求侧）**\nAI 训练服务器每台需 8×96GB HBM3E + 32 条 DDR5 RDIMM（>8TB 容量），需求密度是上一代的 5-10 倍。2024-2025 年 AI 服务器出货量增速 >80%，直接拉动 DRAM/NAND 价格上涨。\n受益标的：澜起科技 688008（RCD 出货量随 AI 服务器正比增长）\n\n**5. 澜起科技 CXL 内存扩展芯片布局**\nCXL（Compute Express Link）是 AI 服务器内存扩展的下一代标准，澜起科技已布局 CXL 内存控制器芯片。若 CXL 规模落地，澜起将从存储接口扩展到内存池化控制层，市场空间扩大 3-5 倍。\n受益标的：澜起科技 688008"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. 美国对 HBM 出口的全面封锁（2024 年已落地）**\n美国 2024 年将 HBM 明确纳入出口管制，SK Hynix / Samsung / Micron 均禁止向中国出售 HBM2E 以上产品。这直接导致国内 AI 训练集群无法扩充 HBM 供给，只能依赖华为昇腾（内置 HBM 自研但产能有限）。对 A 股影响：利好国内 AI 算力国产化，但国内存储企业短期无法受益。\n\n**2. ALD 设备管制限制长江存储代际升级**\nASM International（荷兰）和 Lam Research（美国）的 ALD 设备是 3D NAND 层数提升的核心设备，均在出口管制范围内。国内拓荆科技可替代部分低端 ALD，但高端 Spatial ALD（空间原子层沉积）仍为空白。对 A 股影响：拓荆科技长期受益，但也制约长江存储的技术追赶速度。\n\n**3. 三星 / SK Hynix 韩国供应链中断风险**\n韩国半导体产业集中在釜山/京畿道，地震或自然灾害风险低，但朝鲜半岛局势构成尾部风险。全球 DRAM/NAND 供应高度集中（三星 + SK Hynix = DRAM 70%+ 市占，NAND 40%+ 市占），任何中断将导致内存价格暴涨。对 A 股影响：存储价格暴涨短期利好澜起科技（RCD 单价联动），但国内 DRAM 生产商（长鑫）受益有限（产能不足以填补缺口）。\n\n**4. 中国反制：限制稀土 / 锗出口对存储材料的传导**\n锗是光纤和部分半导体材料（锗硅 SiGe 晶体管）的关键原料，已实施出口许可。铟是 InP DRAM 某些特种工艺的原材料。中国管制对 Samsung / Micron 的直接材料影响有限，但心理威慑效应影响供应链决策。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| HBM 代际 | HBM3E 量产（96GB / 1.2TB/s）| HBM4（Hi-8，2TB/s）SK Hynix 先发 | HBM4E / HBM5 预研 |\n| NAND 层数 | 232-238 层主流（Samsung / Kioxia）| 长江存储 294 层验证节点 | 300+ 层（垂直刻蚀极限挑战）|\n| DRAM 工艺 | 1α nm（约 13nm）主流 | 1β / 1γ nm（<12nm）三星 / SK Hynix | EUV DRAM 量产 |\n| 国内 DRAM | 长鑫 19nm LPDDR5 量产 | 17nm DDR5 流片验证 | 14nm 节点尝试 |\n| 国内 NAND | 长江 232 层量产 | 294 层 / 设备国产化关键验证 | 长江 300+ 层研发 |\n| CXL 内存扩展 | 规格定义成熟（CXL 3.0）| 数据中心小批量部署 | CXL 成为 AI 服务器标配 |\n| 澜起 RCD | DDR5 RCD 全球第三 | CXL Type 3 内存控制器发布 | HBM 接口芯片布局 |\n\n---\n\n---"},{"t":"附 · HBF 前沿机会（含 A股标的）","k":"md","md":"## 二、HBF高带宽闪存——从冯诺依曼瓶颈到投资机会\n\n### 先讲底层：冯诺依曼瓶颈的本质\n\n冯诺依曼架构有一个根本性矛盾：**计算和存储物理分离，数据必须搬运才能被处理**。\n\n```\nCPU/GPU ←→ [总线/互联] ←→ 内存(DRAM) ←→ [控制器] ←→ 存储(NAND)\n   算力        瓶颈1              容量瓶颈         瓶颈2         容量大但慢\n```\n\n两个瓶颈叠加在AI时代被急剧放大：\n\n| 层级 | 延迟 | 带宽 | 成本/GB | 容量上限 |\n|------|------|------|---------|---------|\n| HBM3E（显存） | ~100ns | ~3.5TB/s | ~$10-15 | 单GPU 141GB（H200） |\n| DDR5 DRAM | ~70ns | ~100GB/s | ~$5-8 | 单服务器~6TB |\n| NVMe SSD（3D NAND） | ~100μs | ~10-20GB/s | ~$0.1-0.3 | PB级 |\n\n**问题核心**：Llama3-70B模型权重约140GB，KV Cache（推理时的注意力缓存）随上下文长度线性增长——128K token上下文可能需要数十到数百GB KV Cache。HBM太贵太小，传统NAND太慢，**中间有一个巨大的空白**。\n\n---\n\n### HBF是什么：技术原理\n\n**HBF（High Bandwidth Flash）= 高带宽闪存**，本质是用3D NAND Flash模仿HBM的堆叠封装思路，目标填补上面那个空白。\n\n**核心技术路线：**\n\n```\n传统NVMe路径：\n主机CPU → PCIe总线 → NVMe控制器 → NAND Flash\n延迟：~100μs，带宽：~10GB/s\n\nHBF路径：\n主机CPU/GPU → CXL 3.0总线 → HBF控制器（内嵌近存计算）→ 3D堆叠NAND\n延迟：~5-10μs（降低10-20倍），带宽：~100-300GB/s（提升10-30倍）\n```\n\n三个关键使能技术：\n\n**① TSV（硅通孔）立体堆叠**\n与HBM的DRAM堆叠同理，把多层NAND Die通过硅通孔垂直互连，用宽总线并行读写，而非传统串行接口。带宽从串行接口的MB/s级提升到百GB/s级。\n\n**② CXL（Compute Express Link）协议**\nCXL是打破冯诺依曼瓶颈的关键协议。CXL 3.0 Type 3设备允许：\n- 把Flash存储映射到CPU的内存地址空间（像操作DRAM一样操作Flash）\n- 消除软件层的I/O协议栈开销（这是传统NVMe延迟高的主要原因之一）\n- 支持内存池化：多服务器共享一个巨型存储池\n\n**③ CSD/PNM（近存算/存内计算）**\n把轻量计算单元（向量检索、Embedding匹配、稀疏激活过滤）直接放在Flash控制器里，让数据不用搬出来就完成初步处理——这才是真正攻击冯诺依曼瓶颈的\"外科手术\"。\n\n---\n\n### 为什么是未来6-12个月？\n\n催化剂叠加：\n\n**① LLM推理KV Cache需求爆炸**\nGPT-4o、Claude 3、DeepSeek-V3级别模型推理需要大量KV Cache。当上下文从4K扩到128K/1M时，KV Cache需求增长32-256倍，现有HBM完全装不下，HBF是唯一经济可行的解。\n\n**② Samsung、SK Hynix已公开发布HBF路线图**\nSamsung CXL-Flash（CMM-F）、SK Hynix CXL SSD均在2024-2025量产测试期，预计2025-2026年进入云厂商采购。消息层面的催化剂会提前反映在产业链股价里。\n\n**③ 大基金三期定向投资存储**\n长江存储扩产配套带动上游设备、材料、封装订单，A股可参与的都在这条链上。\n\n---\n\n### 不同技术路线的竞争格局\n\n| 路线 | 原理 | 代表厂商 | 成熟度 |\n|------|------|---------|-------|\n| HBM（DRAM堆叠） | DRAM+TSV，已量产 | SK Hynix/Samsung/Micron | 主流，H100/H200在用 |\n| **HBF（NAND堆叠）** | NAND+TSV+CXL | Samsung/SK Hynix/Kioxia | 2025-2026商用化 |\n| PIM（存内计算） | 计算移入DRAM内部 | Samsung Aquabolt-XL、SK Hynix AiMX | 小批量验证 |\n| CXL DRAM池化 | DRAM通过CXL共享 | 美光/三星CXL模组、澜起科技 | 2025年云厂商试点 |\n| 存储级内存SCM | Optane继任者（相变/铁电） | Intel已放弃，Samsung仍研究 | 远期 |\n\n---\n\n### A股投资机会梳理\n\n**直接标的稀缺**——核心NAND厂商长江存储未上市，这是A股HBF行情最大的结构性缺陷。但间接链条清晰：\n\n**第一层：设备（最直接，受益长存扩产+先进封装）**\n\n| 标的 | 代码 | 逻辑 |\n|------|------|------|\n| 北方华创 | 002371 | 3D NAND刻蚀/CVD设备，长存主供 |\n| 中微公司 | 688012 | 3D NAND刻蚀机，Lam Research替代 |\n| 拓荆科技 | 688072 | CVD设备，NAND层间介质沉积 |\n| 华海清科 | 688120 | CMP设备，NAND多层平坦化 |\n| 晶盛机电 | 300316 | SiC长晶炉+存储硅片设备 |\n\n**第二层：先进封装（HBF需要TSV堆叠封装）**\n\n| 标的 | 代码 | 逻辑 |\n|------|------|------|\n| 长电科技 | 600584 | 国内最强OSAT，布局CoW/TSV封装 |\n| 通富微电 | 002156 | AMD代工封装，TSV技术路线 |\n| 华天科技 | 002185 | 先进封装跟随布局 |\n\n**第三层：存储控制器/接口芯片（CXL关键）**\n\n| 标的 | 代码 | 逻辑 |\n|------|------|------|\n| **澜起科技** | 688008 | CXL内存接口芯片，DDR5 RCD全球前二，CXL是其最大成长曲线 |\n| 得一微电子 | 688588 | 国产NAND主控芯片，HBF控制器方向 |\n\n**第四层：材料（3D NAND层数提升拉动）**\n\n| 标的 | 代码 | 逻辑 |\n|------|------|------|\n| 沪硅产业 | 688126 | 12英寸硅片，存储晶圆基础 |\n| 南大光电 | 300346 | 光刻胶，3D NAND多图案曝光 |\n| 安集科技 | 688019 | CMP抛光液，层数越多用量越大 |\n\n---\n\n### 风险提示\n\n1. **长江存储未上市**：A股无法直接押注国内HBF主体，行情是设备材料封装的\"间接映射\"，弹性弱于韩国股（三星/SK Hynix）\n2. **美国出口管制压制国内NAND先进制程**：232层以上NAND设备受限，长存进度若受阻，产业链订单推迟\n3. **技术路线竞争**：PIM（存内计算）若先于HBF规模化，HBF窗口期压缩\n4. **CXL生态成熟度**：国内服务器厂商CXL 3.0适配进度（主要靠Intel/AMD平台），生态慢则需求放量晚\n\n---\n\n老大，**澜起科技（688008）是A股最纯正的CXL/HBF接口芯片标的**，建议重点跟踪；设备侧北方华创+中微是确定性最高的受益方，跟长存扩产节奏高度相关。\n\n---"}]},{"id":"04","num":4,"title":"AI 算力基础设施","group":"算力核心链","hook":"服务器/液冷/供配电/IDC，Nvidia 独占 42% 毛利","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">一句话先抓住本质：<b>AI 算力基础设施 = 把成千上万张 GPU \"焊\"成一台超级计算机</b>。难点不在单卡多快，而在<b>怎么让它们高速互联、喂饱数据、还散得掉热、供得上电</b>。下面从\"AI 服务器为什么和普通服务器不是一个物种\"，到决定算力上限的<b>Scale-up / Scale-out 两张网</b>，再到数据中心五层结构、价值量分布与三大物理瓶颈，一层层拆。</div>\n\n<h3>一、AI 服务器 ≠ 普通服务器：核心是 GPU，但远不止 GPU</h3>\n<p>普通服务器以 <b>CPU</b> 为中心，干通用事务；AI 服务器以 <b>GPU</b> 为中心，干的是<b>大规模并行矩阵乘法</b>。一旦换成 GPU，整机就被\"重构\"了：GPU 算得太快，普通 DDR 内存喂不动，必须配 <b>HBM 高带宽显存</b>贴边堆叠；单机 8 卡之间要全速交换梯度，必须上 <b>NVLink</b> 而非 PCIe；跨机要组大集群，必须配<b>高速网卡 + 光模块</b>；GPU 满载几百瓦到 1000W+，必须配<b>强供电 + 液冷</b>。于是单机柜功耗从普通的 <b>3–8kW</b> 飙到 <b>30–120kW</b>（GB200 NVL72 整柜 = 120kW，是普通机柜的几十倍）——<b>风冷物理上散不掉、市电也供不上</b>，液冷与电力从\"配套\"变成\"硬瓶颈\"。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 360\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"700\" fill=\"#13233f\">AI 服务器 / 机柜 爆炸图（GB200 NVL72 范式）</text>\n  <!-- 机柜外框 -->\n  <rect x=\"40\" y=\"38\" width=\"430\" height=\"300\" rx=\"8\" fill=\"#f5f7fa\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/>\n  <text x=\"255\" y=\"55\" text-anchor=\"middle\" font-size=\"10\" fill=\"#475569\">机柜（NVL72）整柜功耗 ≈ 120kW</text>\n\n  <!-- 计算托盘 ×N -->\n  <g>\n   <rect x=\"58\" y=\"66\" width=\"394\" height=\"40\" rx=\"4\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n   <text x=\"72\" y=\"82\" font-size=\"9\" fill=\"#27406e\">计算托盘 ×18</text>\n   <!-- GPU 模组 -->\n   <g>\n    <rect x=\"150\" y=\"72\" width=\"40\" height=\"28\" rx=\"3\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"170\" y=\"90\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">GPU</text>\n    <rect x=\"196\" y=\"72\" width=\"40\" height=\"28\" rx=\"3\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"216\" y=\"90\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">GPU</text>\n    <!-- HBM 贴边 -->\n    <g fill=\"#3a4252\"><rect x=\"142\" y=\"74\" width=\"6\" height=\"24\"/><rect x=\"238\" y=\"74\" width=\"6\" height=\"24\"/></g>\n    <!-- CPU -->\n    <rect x=\"252\" y=\"72\" width=\"40\" height=\"28\" rx=\"3\" fill=\"#5b8def\" stroke=\"#1f5fd6\"/><text x=\"272\" y=\"90\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-weight=\"700\">CPU</text>\n    <!-- 网卡 -->\n    <rect x=\"300\" y=\"72\" width=\"44\" height=\"28\" rx=\"3\" fill=\"#0f8a7e\" stroke=\"#0a5f57\"/><text x=\"322\" y=\"86\" text-anchor=\"middle\" font-size=\"8\" fill=\"#fff\">网卡</text><text x=\"322\" y=\"96\" text-anchor=\"middle\" font-size=\"7.5\" fill=\"#cfeee9\">NIC/DPU</text>\n    <!-- 光模块 -->\n    <rect x=\"352\" y=\"72\" width=\"42\" height=\"28\" rx=\"3\" fill=\"#e8b923\" stroke=\"#a8810a\"/><text x=\"373\" y=\"86\" text-anchor=\"middle\" font-size=\"8\" fill=\"#3a2d00\">光模块</text><text x=\"373\" y=\"96\" text-anchor=\"middle\" font-size=\"7.5\" fill=\"#5a4500\">800G</text>\n   </g>\n  </g>\n\n  <!-- NVLink Switch 托盘 -->\n  <g>\n   <rect x=\"58\" y=\"116\" width=\"394\" height=\"34\" rx=\"4\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n   <text x=\"72\" y=\"132\" font-size=\"9\" fill=\"#4a2e9e\">交换托盘 ×9</text>\n   <rect x=\"200\" y=\"120\" width=\"180\" height=\"26\" rx=\"3\" fill=\"#7a5bc2\" stroke=\"#4a2e9e\"/>\n   <text x=\"290\" y=\"137\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-weight=\"700\">NVLink Switch（Scale-up 全互联）</text>\n  </g>\n\n  <!-- 供电 -->\n  <g>\n   <rect x=\"58\" y=\"160\" width=\"394\" height=\"34\" rx=\"4\" fill=\"#fff7e6\" stroke=\"#d99100\"/>\n   <text x=\"72\" y=\"180\" font-size=\"9\" fill=\"#8a6d1a\">供电托盘</text>\n   <rect x=\"200\" y=\"164\" width=\"180\" height=\"26\" rx=\"3\" fill=\"#f0c651\" stroke=\"#a8810a\"/>\n   <text x=\"290\" y=\"181\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3a2d00\" font-weight=\"700\">电源 PSU / 母线（强供电）</text>\n  </g>\n\n  <!-- 液冷冷板 -->\n  <g>\n   <rect x=\"58\" y=\"204\" width=\"394\" height=\"120\" rx=\"4\" fill=\"#e6f4f1\" stroke=\"#0f8a7e\"/>\n   <text x=\"72\" y=\"220\" font-size=\"9\" fill=\"#0a5f57\">液冷回路</text>\n   <!-- 冷板贴在GPU下 -->\n   <rect x=\"120\" y=\"226\" width=\"260\" height=\"20\" rx=\"3\" fill=\"#0f8a7e\"/><text x=\"250\" y=\"240\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-weight=\"700\">冷板 Cold Plate（贴 GPU 取热）</text>\n   <!-- 进出水管 -->\n   <path d=\"M120 236 C 80 236, 80 300, 120 300\" stroke=\"#1f5fd6\" stroke-width=\"4\" fill=\"none\"/>\n   <path d=\"M380 236 C 420 236, 420 300, 380 300\" stroke=\"#d23f3f\" stroke-width=\"4\" fill=\"none\"/>\n   <text x=\"92\" y=\"318\" font-size=\"8.5\" fill=\"#1f5fd6\">冷液进</text>\n   <text x=\"392\" y=\"318\" text-anchor=\"end\" font-size=\"8.5\" fill=\"#d23f3f\">热液出</text>\n   <!-- CDU -->\n   <rect x=\"150\" y=\"288\" width=\"200\" height=\"26\" rx=\"3\" fill=\"#0f8a7e\" stroke=\"#0a5f57\"/><text x=\"250\" y=\"305\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\">CDU 冷量分配单元 → 换热</text>\n  </g>\n\n  <!-- 右侧引线标注 -->\n  <g font-size=\"10\">\n   <line x1=\"470\" y1=\"86\" x2=\"540\" y2=\"70\" stroke=\"#f3c9c9\"/><text x=\"544\" y=\"74\" fill=\"#b3261e\">GPU 模组 ×N（价值≈42%毛利）</text>\n   <line x1=\"470\" y1=\"86\" x2=\"540\" y2=\"92\" stroke=\"#cfe0fa\"/><text x=\"544\" y=\"96\" fill=\"#1f5fd6\">+HBM / CPU / 网卡 / 光模块</text>\n   <line x1=\"470\" y1=\"133\" x2=\"540\" y2=\"133\" stroke=\"#d9cdf3\"/><text x=\"544\" y=\"137\" fill=\"#4a2e9e\">NVLink Switch（决定单点算力）</text>\n   <line x1=\"470\" y1=\"177\" x2=\"540\" y2=\"170\" stroke=\"#f0dca0\"/><text x=\"544\" y=\"174\" fill=\"#8a6d1a\">供配电（国产高地）</text>\n   <line x1=\"470\" y1=\"240\" x2=\"540\" y2=\"240\" stroke=\"#bfe3dc\"/><text x=\"544\" y=\"244\" fill=\"#0a5f57\">液冷冷板 / CDU（国产高地）</text>\n   <line x1=\"470\" y1=\"300\" x2=\"540\" y2=\"300\" stroke=\"#bfe3dc\"/><text x=\"544\" y=\"304\" fill=\"#0a5f57\">连接器单值是普通柜 5–10×</text>\n  </g>\n  <text x=\"370\" y=\"352\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#5b6577\">普通服务器：CPU 为主，3–8kW，风冷即可 ｜ AI 服务器：GPU 为主 + HBM + NVLink + 光网 + 液冷 + 强供电，30–120kW</text>\n</svg>\n</div>\n\n<h3>二、★ 算力网络两张网：Scale-up 决定\"单点多强\"，Scale-out 决定\"集群多大\"</h3>\n<p>这是理解 AI 算力基础设施<b>最关键、也最容易被忽略</b>的底层概念。一个万卡集群的真实算力，不是 GPU 数量简单相加——卡和卡之间要不停交换参数与梯度，<b>互联带宽一旦不够，GPU 就在空等，算力利用率（MFU）暴跌</b>。所以行业把网络拆成两个正交维度：</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">Scale-up（纵向扩展 · 机柜内）</div>机柜内 GPU 之间用 <b>NVLink</b> 做<b>全互联（all-to-all）</b>，带宽极高（单卡 NVLink 带宽是 PCIe 的 10×+），延迟极低。它把几十张卡\"粘\"成一个<b>超级 GPU</b>。<br><span class=\"pc-s\">决定<b>单点算力上限</b>：NVL72 = 72 张 GPU 当一张用</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">Scale-out（横向扩展 · 跨机柜）</div>跨机柜、跨机房用 <b>InfiniBand</b> 或 <b>RoCE 以太网</b>组网，靠<b>交换机 + 网卡 + 光模块</b>把成千上万张卡连成一片。<br><span class=\"pc-s\">决定<b>集群规模</b>：万卡 / 十万卡集群靠它撑起</span></div>\n</div>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 320\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"700\" fill=\"#13233f\">Scale-up（柜内 NVLink 全互联） × Scale-out（跨柜 IB / 以太网）</text>\n\n  <!-- Scale-up 区：一个机柜内 4 GPU 全互联 -->\n  <rect x=\"40\" y=\"42\" width=\"300\" height=\"180\" rx=\"10\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\" stroke-dasharray=\"5 4\"/>\n  <text x=\"190\" y=\"62\" text-anchor=\"middle\" font-size=\"11\" fill=\"#4a2e9e\" font-weight=\"700\">机柜内 Scale-up（NVLink 全互联）</text>\n  <!-- 4 GPU 节点 -->\n  <g font-size=\"10\" text-anchor=\"middle\">\n   <circle cx=\"110\" cy=\"100\" r=\"22\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"110\" y=\"104\" fill=\"#fff\" font-weight=\"700\">GPU</text>\n   <circle cx=\"270\" cy=\"100\" r=\"22\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"270\" y=\"104\" fill=\"#fff\" font-weight=\"700\">GPU</text>\n   <circle cx=\"110\" cy=\"180\" r=\"22\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"110\" y=\"184\" fill=\"#fff\" font-weight=\"700\">GPU</text>\n   <circle cx=\"270\" cy=\"180\" r=\"22\" fill=\"#e85d5d\" stroke=\"#b3261e\"/><text x=\"270\" y=\"184\" fill=\"#fff\" font-weight=\"700\">GPU</text>\n  </g>\n  <!-- 中央 NVLink Switch -->\n  <rect x=\"158\" y=\"120\" width=\"64\" height=\"40\" rx=\"5\" fill=\"#7a5bc2\" stroke=\"#4a2e9e\"/><text x=\"190\" y=\"138\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\" font-weight=\"700\">NVLink</text><text x=\"190\" y=\"151\" text-anchor=\"middle\" font-size=\"9\" fill=\"#fff\">Switch</text>\n  <!-- 全互联连线（经Switch） -->\n  <g stroke=\"#6a4bbf\" stroke-width=\"2\">\n   <line x1=\"128\" y1=\"115\" x2=\"160\" y2=\"130\"/><line x1=\"252\" y1=\"115\" x2=\"220\" y2=\"130\"/>\n   <line x1=\"128\" y1=\"165\" x2=\"160\" y2=\"150\"/><line x1=\"252\" y1=\"165\" x2=\"220\" y2=\"150\"/>\n  </g>\n  <!-- 对角互联，强调all-to-all -->\n  <g stroke=\"#6a4bbf\" stroke-width=\"1.4\" stroke-dasharray=\"3 2\" opacity=\"0.6\">\n   <line x1=\"132\" y1=\"100\" x2=\"248\" y2=\"100\"/><line x1=\"110\" y1=\"122\" x2=\"110\" y2=\"158\"/>\n   <line x1=\"270\" y1=\"122\" x2=\"270\" y2=\"158\"/><line x1=\"132\" y1=\"180\" x2=\"248\" y2=\"180\"/>\n  </g>\n  <text x=\"190\" y=\"210\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#4a2e9e\">带宽极高 · 延迟极低 → 多卡当一卡</text>\n\n  <!-- Scale-out 区：多个机柜经 IB/以太网 Spine 连接 -->\n  <text x=\"560\" y=\"62\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0a5f57\" font-weight=\"700\">跨机柜 Scale-out（IB / RoCE）</text>\n  <!-- Spine 交换机 -->\n  <rect x=\"500\" y=\"78\" width=\"120\" height=\"28\" rx=\"4\" fill=\"#0f8a7e\" stroke=\"#0a5f57\"/><text x=\"560\" y=\"96\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-weight=\"700\">Spine 交换机</text>\n  <!-- 三个机柜 -->\n  <g font-size=\"9\" text-anchor=\"middle\">\n   <rect x=\"470\" y=\"150\" width=\"56\" height=\"120\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"498\" y=\"168\" fill=\"#27406e\">机柜</text>\n   <rect x=\"532\" y=\"150\" width=\"56\" height=\"120\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"560\" y=\"168\" fill=\"#27406e\">机柜</text>\n   <rect x=\"594\" y=\"150\" width=\"56\" height=\"120\" rx=\"5\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"622\" y=\"168\" fill=\"#27406e\">机柜</text>\n   <!-- 柜内小GPU堆 -->\n   <g fill=\"#e85d5d\"><rect x=\"480\" y=\"180\" width=\"36\" height=\"10\" rx=\"2\"/><rect x=\"480\" y=\"194\" width=\"36\" height=\"10\" rx=\"2\"/><rect x=\"480\" y=\"208\" width=\"36\" height=\"10\" rx=\"2\"/>\n    <rect x=\"542\" y=\"180\" width=\"36\" height=\"10\" rx=\"2\"/><rect x=\"542\" y=\"194\" width=\"36\" height=\"10\" rx=\"2\"/><rect x=\"542\" y=\"208\" width=\"36\" height=\"10\" rx=\"2\"/>\n    <rect x=\"604\" y=\"180\" width=\"36\" height=\"10\" rx=\"2\"/><rect x=\"604\" y=\"194\" width=\"36\" height=\"10\" rx=\"2\"/><rect x=\"604\" y=\"208\" width=\"36\" height=\"10\" rx=\"2\"/></g>\n   <!-- 光模块标 -->\n   <g fill=\"#e8b923\"><rect x=\"488\" y=\"238\" width=\"20\" height=\"8\" rx=\"1\"/><rect x=\"550\" y=\"238\" width=\"20\" height=\"8\" rx=\"1\"/><rect x=\"612\" y=\"238\" width=\"20\" height=\"8\" rx=\"1\"/></g>\n   <text x=\"560\" y=\"262\" font-size=\"8\" fill=\"#8a6d1a\">↑ 光模块 / 网卡接入</text>\n  </g>\n  <!-- Spine 到机柜连线（经光模块） -->\n  <g stroke=\"#0f8a7e\" stroke-width=\"1.8\">\n   <line x1=\"525\" y1=\"106\" x2=\"498\" y2=\"150\"/><line x1=\"560\" y1=\"106\" x2=\"560\" y2=\"150\"/><line x1=\"595\" y1=\"106\" x2=\"622\" y2=\"150\"/>\n  </g>\n  <text x=\"560\" y=\"290\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#0a5f57\">规模可扩到万卡 / 十万卡</text>\n\n  <!-- 两区之间桥接说明 -->\n  <line x1=\"340\" y1=\"132\" x2=\"468\" y2=\"132\" stroke=\"#94a3b8\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\" marker-end=\"url(#a4)\"/>\n  <defs><marker id=\"a4\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <text x=\"404\" y=\"124\" text-anchor=\"middle\" font-size=\"9\" fill=\"#64748b\">柜内粘成超级GPU</text>\n  <text x=\"404\" y=\"146\" text-anchor=\"middle\" font-size=\"9\" fill=\"#64748b\">再横向拼成集群</text>\n  <text x=\"370\" y=\"312\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#5b6577\">互联带宽不够 → GPU 空等 → 算力利用率(MFU)暴跌：所以\"连得好\"和\"算得快\"同等重要</text>\n</svg>\n</div>\n<p><b>国产卡位差异极大：</b>Scale-up 的 NVLink 是 Nvidia 私有协议、国产几乎空白；Scale-out 里 <b>InfiniBand 被 Nvidia/Mellanox 垄断（A 股完全空白）</b>，但 <b>RoCE 以太网</b>给了国产机会——交换机有锐捷/新华三（未上市），网卡、光模块、<b>高速连接器（<span class=\"tk\" onclick=\"openDetail('002475','立讯精密','A股')\">立讯精密</span> / <span class=\"tk\" onclick=\"openDetail('601138','工业富联','A股')\">工业富联</span>）</b>是能切入的环节，高速背板连接器单值是普通服务器的 5–10 倍。</p>\n\n<h3>三、数据中心五层结构：从一颗芯片到一座电厂级 IDC</h3>\n<p>AI 算力基础设施是层层封装的金字塔——<b>芯片 → 服务器 → 机柜 → 集群 → IDC</b>。每往上一层，互联方式、功耗量级、散热与供电方案都跃迁一次。理解这张图，就能定位每个标的\"卡在哪一层、赚哪一层的钱\"。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 290\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"700\" fill=\"#13233f\">数据中心层级金字塔（自下而上封装）</text>\n  <!-- 金字塔五层（倒置：底宽顶窄表示数量，从下往上聚合） -->\n  <!-- 第5层 IDC 最宽底座 -->\n  <rect x=\"60\" y=\"226\" width=\"620\" height=\"40\" rx=\"4\" fill=\"#eef2f8\" stroke=\"#94a3b8\"/>\n  <text x=\"370\" y=\"243\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#334155\">⑤ IDC 数据中心</text>\n  <text x=\"370\" y=\"258\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5b6577\">整栋楼宇 · 数十~数百MW · 配变电站/水冷塔/市电 → 用电堪比一座小城</text>\n\n  <rect x=\"120\" y=\"180\" width=\"500\" height=\"40\" rx=\"4\" fill=\"#e6f4f1\" stroke=\"#0f8a7e\"/>\n  <text x=\"370\" y=\"197\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#0a5f57\">④ 集群（万卡 Cluster）</text>\n  <text x=\"370\" y=\"212\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0a5f57\">数百~数千机柜 · Scale-out（IB/RoCE）组网 · 数MW~数十MW</text>\n\n  <rect x=\"190\" y=\"134\" width=\"360\" height=\"40\" rx=\"4\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/>\n  <text x=\"370\" y=\"151\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#4a2e9e\">③ 机柜（NVL72）</text>\n  <text x=\"370\" y=\"166\" text-anchor=\"middle\" font-size=\"9\" fill=\"#4a2e9e\">72 GPU · Scale-up（NVLink）全互联 · 120kW · 必须液冷</text>\n\n  <rect x=\"250\" y=\"88\" width=\"240\" height=\"40\" rx=\"4\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/>\n  <text x=\"370\" y=\"105\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#27406e\">② 服务器（8 卡）</text>\n  <text x=\"370\" y=\"120\" text-anchor=\"middle\" font-size=\"9\" fill=\"#27406e\">8×GPU + CPU + HBM + 网卡 · 数kW</text>\n\n  <rect x=\"300\" y=\"42\" width=\"140\" height=\"40\" rx=\"4\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/>\n  <text x=\"370\" y=\"59\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#b3261e\">① GPU 芯片</text>\n  <text x=\"370\" y=\"74\" text-anchor=\"middle\" font-size=\"9\" fill=\"#b3261e\">算力原子 · 300~1000W</text>\n\n  <!-- 右侧\"赚哪层钱\"标注 -->\n  <g font-size=\"9.5\" text-anchor=\"start\">\n   <text x=\"556\" y=\"200\" fill=\"#0a5f57\">网络/光模块/连接器</text>\n   <text x=\"556\" y=\"246\" fill=\"#334155\">IDC 运营 / 算力租赁</text>\n  </g>\n  <g font-size=\"9.5\" text-anchor=\"end\">\n   <text x=\"184\" y=\"155\" fill=\"#4a2e9e\">液冷 / 供配电</text>\n   <text x=\"244\" y=\"109\" fill=\"#27406e\">整机 ODM</text>\n   <text x=\"294\" y=\"63\" fill=\"#b3261e\">Nvidia 独占</text>\n  </g>\n  <!-- 聚合箭头 -->\n  <line x1=\"370\" y1=\"84\" x2=\"370\" y2=\"88\" stroke=\"#94a3b8\"/>\n  <text x=\"370\" y=\"284\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#5b6577\">越往上：互联越复杂、功耗量级越大、电力与散热越成为决定性约束</text>\n</svg>\n</div>\n\n<h3>四、价值量分布：谁吃肉、国产卡在哪</h3>\n<p>整条链的价值量<b>极度向上游集中</b>：Nvidia GPU 以约 7% 的环节收入占比，攫取了<b>全链约 42% 的毛利润</b>——这是史上最强的单点价值集中，中国在此环节市占率约 <b>0%</b>。剩下的利润分散在 IDC/云、供配电、液冷、网络。<b>国产真正能拿到价值的，是 GPU 之外的\"卖铲子\"环节</b>：供配电（变压器 24 个月交货、紧缺涨价）、液冷（渗透率快速抬升）、网络与连接器。</p>\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 210\" width=\"100%\">\n  <text x=\"12\" y=\"18\" font-size=\"11.5\" font-weight=\"700\" fill=\"#13233f\">价值量 / 毛利分布（占链条）· 越厚利润越高</text>\n  <g font-size=\"11\">\n   <text x=\"12\" y=\"46\">GPU 芯片</text><rect x=\"150\" y=\"35\" width=\"378\" height=\"16\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"536\" y=\"48\" fill=\"#d23f3f\" font-weight=\"700\">≈42% 毛利（Nvidia 独占 · 国产 0%）</text>\n   <text x=\"12\" y=\"74\">IDC / 云服务</text><rect x=\"150\" y=\"63\" width=\"180\" height=\"16\" rx=\"3\" fill=\"#94a3b8\"/><text x=\"338\" y=\"76\" fill=\"#5b6577\" font-weight=\"700\">≈20%</text>\n   <text x=\"12\" y=\"102\">供配电系统</text><rect x=\"150\" y=\"91\" width=\"135\" height=\"16\" rx=\"3\" fill=\"#e8b923\"/><text x=\"293\" y=\"104\" fill=\"#a8810a\" font-weight=\"700\">≈15%（国产高地·变压器紧缺）</text>\n   <text x=\"12\" y=\"130\">液冷散热</text><rect x=\"150\" y=\"119\" width=\"100\" height=\"16\" rx=\"3\" fill=\"#0f8a7e\"/><text x=\"258\" y=\"132\" fill=\"#0a5f57\" font-weight=\"700\">≈11%（渗透率快升）</text>\n   <text x=\"12\" y=\"158\">网络 / 互联</text><rect x=\"150\" y=\"147\" width=\"90\" height=\"16\" rx=\"3\" fill=\"#1f5fd6\"/><text x=\"248\" y=\"160\" fill=\"#1f5fd6\" font-weight=\"700\">≈9%（连接器/光模块可切）</text>\n   <text x=\"12\" y=\"186\">机柜 / 配套</text><rect x=\"150\" y=\"175\" width=\"33\" height=\"16\" rx=\"3\" fill=\"#cbd5e1\"/><text x=\"191\" y=\"188\" fill=\"#5b6577\" font-weight=\"700\">≈3%</text>\n  </g>\n</svg>\n</div>\n<p><b>国产受益主线（标的均按 mainline04.json 核对）：</b>供配电——<span class=\"tk\" onclick=\"openDetail('600089','特变电工','A股')\">特变电工</span>（变压器）、<span class=\"tk\" onclick=\"openDetail('002335','科华数据','A股')\">科华数据</span>（UPS）、<span class=\"tk\" onclick=\"openDetail('002364','中恒电气','A股')\">中恒电气</span>（HVDC）；液冷——<span class=\"tk\" onclick=\"openDetail('002837','英维克','A股')\">英维克</span>（国内主导）、<span class=\"tk\" onclick=\"openDetail('300499','高澜股份','A股')\">高澜股份</span>、<span class=\"tk\" onclick=\"openDetail('301018','申菱环境','A股')\">申菱环境</span>；连接器——<span class=\"tk\" onclick=\"openDetail('002475','立讯精密','A股')\">立讯精密</span>；整机 ODM——<span class=\"tk\" onclick=\"openDetail('601138','工业富联','A股')\">工业富联</span>、<span class=\"tk\" onclick=\"openDetail('000977','浪潮信息','A股')\">浪潮信息</span>（全球 AI 服务器出货第一，但 GPU 仍需进口）；GPU 国产替代——<span class=\"tk\" onclick=\"openDetail('688256','寒武纪','A股')\">寒武纪</span>、<span class=\"tk\" onclick=\"openDetail('688041','海光信息','A股')\">海光信息</span>。</p>\n\n<h3>五、三大物理瓶颈：电力、散热、GPU 出口管制</h3>\n<p>AI 算力扩张表面是\"买卡\"，真正的天花板是三道<b>物理/地缘约束</b>——它们也正是国产产业链的机会窗口。</p>\n\n<div class=\"flow\">\n<div class=\"flow-step\">\n  <div class=\"fs-num\">1</div>\n  <div class=\"fs-icon\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\"><path d=\"M22 6L12 22h7l-2 12 11-17h-7z\" fill=\"#fff7e6\" stroke=\"#d99100\" stroke-width=\"1.4\"/></svg></div>\n  <div class=\"fs-body\"><div class=\"fs-t\">瓶颈① 电力（最硬约束）</div><div class=\"fs-d\">单座 IDC 用电达数十~数百 MW，堪比一座小城。超高压<b>变压器交货期延至 24 个月</b>，用电指标审批难，电力成为新瓶颈。HVDC 高压直流是降损新趋势。</div></div>\n  <div class=\"fs-dev\"><span class=\"dl\">国产受益</span><div class=\"dev\">变压器 · UPS · HVDC · 母线槽</div><span class=\"lead\"><span class=\"tk\" onclick=\"openDetail('600089','特变电工','A股')\">特变电工</span> · <span class=\"tk\" onclick=\"openDetail('002335','科华数据','A股')\">科华数据</span> · <span class=\"tk\" onclick=\"openDetail('002364','中恒电气','A股')\">中恒电气</span></span></div>\n</div>\n<div class=\"flow-step\">\n  <div class=\"fs-num\">2</div>\n  <div class=\"fs-icon\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\"><path d=\"M14 6v16a6 6 0 1 0 12 0V6\" fill=\"#e6f4f1\" stroke=\"#0f8a7e\" stroke-width=\"1.4\"/><circle cx=\"20\" cy=\"28\" r=\"5\" fill=\"#0f8a7e\"/><line x1=\"20\" y1=\"10\" x2=\"20\" y2=\"24\" stroke=\"#0f8a7e\" stroke-width=\"2\"/></svg></div>\n  <div class=\"fs-body\"><div class=\"fs-t\">瓶颈② 散热（液冷必然化）</div><div class=\"fs-d\">机柜功耗 30–120kW <b>已超风冷物理上限</b>，液冷从可选变必选。冷板式当前主流，浸没式密度最高。液冷渗透率预计 2025 升至 ~35%、2027 破 60%。</div></div>\n  <div class=\"fs-dev\"><span class=\"dl\">国产受益</span><div class=\"dev\">冷板 · CDU · 浸没 · 氟化液</div><span class=\"lead\"><span class=\"tk\" onclick=\"openDetail('002837','英维克','A股')\">英维克</span> · <span class=\"tk\" onclick=\"openDetail('300499','高澜股份','A股')\">高澜股份</span> · <span class=\"tk\" onclick=\"openDetail('600160','巨化股份','A股')\">巨化股份</span>（氟化液）</span></div>\n</div>\n<div class=\"flow-step\">\n  <div class=\"fs-num\">3</div>\n  <div class=\"fs-icon\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\"><rect x=\"9\" y=\"9\" width=\"22\" height=\"22\" rx=\"3\" fill=\"#fde8e8\" stroke=\"#d23f3f\" stroke-width=\"1.4\"/><line x1=\"9\" y1=\"9\" x2=\"31\" y2=\"31\" stroke=\"#d23f3f\" stroke-width=\"2.4\"/></svg></div>\n  <div class=\"fs-body\"><div class=\"fs-t\">瓶颈③ GPU 出口管制（地缘卡点）</div><div class=\"fs-d\">Nvidia 高端 GPU 受出口管制、CUDA 生态壁垒高，<b>倒逼国产算力芯片替代</b>。国产化率 ~22%，政务/智算中心强制采购昇腾，给国产 GPU 打开需求。</div></div>\n  <div class=\"fs-dev\"><span class=\"dl\">国产替代</span><div class=\"dev\">训练/推理芯片 · 昇腾生态</div><span class=\"lead\"><span class=\"tk\" onclick=\"openDetail('688256','寒武纪','A股')\">寒武纪</span> · <span class=\"tk\" onclick=\"openDetail('688041','海光信息','A股')\">海光信息</span> · 华为昇腾（未上市）</span></div>\n</div>\n</div>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">价值高地 / 国产卡点</div>GPU 芯片（≈42% 毛利，Nvidia 独占）· NVLink（私有协议）· InfiniBand（Mellanox 垄断，A 股空白）· 氟化液核心料</div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">国产可切入的\"卖铲子\"环节</div>供配电（变压器/UPS/HVDC）· 液冷（冷板/CDU/浸没）· RoCE 以太网 + 光模块 + 高速连接器 · 整机 ODM · IDC 运营<br><span class=\"pc-s\">逻辑：算力越扩张，电力与散热的刚性需求越确定</span></div>\n</div>\n\n</div>\n"},{"t":"一、AI 服务器 / 计算节点","k":"group","note":"Nvidia GPU 以约 7% 的环节收入占比，贡献整条链约 42% 毛利润，是史上最强单点价值集中。中国在 GPU 环节市占率约 0%。","children":[{"t":"1.1 GPU 服务器整机","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["GPU 服务器整机","Super Micro (SMCI) / Dell (DELL) / HPE / Lenovo (HK0992)","浪潮信息、中科曙光、华为（未上市）","000977、603019","浪潮全球 AI 服务器出货第一，但 GPU 仍需进口"]]},{"t":"1.2 GPU / NPU 芯片（算力核心）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["AI 训练 / 推理芯片","Nvidia (NVDA) / AMD (AMD) / Intel (INTC)","寒武纪、海光信息、华为昇腾（未上市）","688256、688041","国产化率 ~22%，CUDA 生态差距大"]]},{"t":"1.3 AI 服务器主板 / 背板","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["主板 / 背板","Super Micro (SMCI) / ASUS / Gigabyte","工业富联","601138","Foxconn 旗下，AI 服务器 ODM 主力"]]},{"t":"1.4 NVLink / PCIe 高速连接器（机内互联）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["高速连接器","Amphenol (APH) / TE Connectivity (TEL) / Molex","立讯精密、工业富联","002475、601138","高速背板连接器单值是普通服务器 5-10 倍"]]}]},{"t":"二、液冷散热（最快速增长子赛道）","k":"group","note":"AI 机柜功耗密度（>30kW）已超风冷上限，液冷渗透率预计 2025 年升至 35%、2027 年破 60%。","children":[{"t":"2.1 冷板式液冷（Cold Plate，当前主流）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["冷板式液冷","Vertiv (VRT) / Schneider / Stulz / Asetek","英维克、高澜股份、申菱环境、佳力图","002837、300499、301018、603912","英维克国内主导，国产化率 ~48%"]]},{"t":"2.2 浸没式液冷（密度最高方案）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["浸没式液冷","GRC / Submer / Vertiv (VRT)","英维克、中科曙光、烽火通信","002837、603019、600498","核心氟化液仍依赖 Solvay/Chemours"]]},{"t":"2.3 氟化液 / 冷却液（浸没核心耗材）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["氟化液 / 冷却液","Solvay（比）/ Chemours (CC)（3M 退出后接盘）","巨化股份、中化蓝天（未上市）","600160","国产替代逻辑，3M 退出留下缺口"]]}]},{"t":"三、供配电系统（数据中心最大单项成本）","k":"group","children":[{"t":"3.1 UPS / 不间断电源","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["UPS / PDU","Vertiv (VRT) / Eaton (ETN) / Schneider","科华数据、易事特、科士达、华为数字能源（未上市）","002335、300376、002518","高端模块化 UPS 技术差距，国产化率 ~50%"]]},{"t":"3.2 变压器（数据中心扩容紧缺）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["变压器","ABB / Hitachi Energy / Siemens Energy","特变电工、保变电气、中国西电","600089、600550、601179","超高压交货期延至 24 个月，出口创新高"]]},{"t":"3.3 母线槽 / 配电柜","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["母线槽 / 配电柜","Eaton (ETN) / Legrand / Siemens","共进股份、科华数据","603118、002335","—"]]},{"t":"3.4 HVDC 高压直流供电（下一代趋势）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["HVDC","Vertiv (VRT) / Delta 台达 (2308.TW)","中恒电气、华为数字能源（未上市）","002364","华为 240V HVDC 全球领先"]]}]},{"t":"四、网络互联（AI 集群内高速网络）","k":"group","children":[{"t":"4.1 以太网交换机（RDMA 组网）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["以太网交换机","Arista (ANET) / Cisco (CSCO) / Broadcom (AVGO)","锐捷网络（未上市）、新华三（紫光，私有）","—","国内方案以太网为主"]]},{"t":"4.2 InfiniBand 网络（Nvidia 生态）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["InfiniBand","Nvidia / Mellanox (NVDA) ConnectX","无","—","完全空白"]]}]},{"t":"五、IDC / 算力租赁 / 智算中心","k":"group","children":[{"t":"5.1 大型 IDC 建设运营","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["大型 IDC","Equinix (EQIX) / Digital Realty (DLR)","光环新网、数据港、万国数据、世纪互联 (VNET)","300383、603881、HK2118","国内 IDC 无全球布局，数据主权限制扩张"]]},{"t":"5.2 算力云服务 / 租赁","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["算力云 / 租赁","AWS (AMZN) / Azure (MSFT) / GCP (GOOGL)","阿里巴巴-W、腾讯控股","HK9988、HK0700","另：百度集团 (BIDU/HK9888)、中国电信云；国产 GPU（昇腾）政务云强制采购"]]}]},{"t":"六、机房基础配套","k":"group","children":[{"t":"6.1 机柜 / 模块化机房","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["机柜 / 模块化机房","Schneider（法）/ Rittal（德）","中恒电气、华为数字能源（未上市）","002364","—"]]},{"t":"6.2 精密空调 / 温控（风冷补充）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["精密空调 / 温控","Vertiv (VRT) / Stulz / Emerson","英维克、依米康、佳力图","002837、300249、603912","国产化率 ~55%，海外差距大"]]}]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| GPU / AI 芯片 | ~$1,000 亿（Nvidia 数据中心）| 70-74% | **约 42%** | Nvidia (NVDA)——垄断性定价 |\n| AI 服务器整机 | ~$1,500 亿 | 8-12% | **约 8%** | 浪潮信息 000977、SMCI (SMCI) |\n| IDC / 算力租赁 | ~$3,000 亿（全球） | 40-55% | **约 20%** | Equinix (EQIX)、三大云 |\n| 供配电系统 | ~$300 亿 | 28-35% | **约 6%** | Vertiv (VRT)、特变电工 600089 |\n| 液冷散热 | ~$50 亿（快速增长）| 30-40% | **约 1%** | Vertiv (VRT)、英维克 002837 |\n| 变压器 | ~$200 亿 | 22-30% | **约 3%** | 特变电工 600089、ABB (ABB.US) |\n| 网络交换机 | ~$200 亿 | 55-65% | **约 7%** | Arista (ANET)、Cisco (CSCO) |\n| 连接器（高速）| ~$80 亿 | 35-45% | **约 2%** | Amphenol (APH)、立讯精密 002475 |\n| 精密空调 / 温控 | ~$80 亿 | 25-32% | **约 1%** | Vertiv (VRT)、英维克 002837 |\n\n> **核心结论**：Nvidia GPU 芯片以约 7% 的环节收入占比，贡献了整条链 42% 的毛利润，是史上最强的单点价值集中。IDC / 云服务以体量大（3000 亿）捕获约 20%，是第二大价值层。中国企业在 GPU（0%）和 IDC（主要服务国内客户，国际市占极低）两大核心环节均不具备全球竞争力。"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| AI 训练芯片（国内采购）| ~12% | **~22%** | 40% | 华为昇腾供给瓶颈（光刻机限制），CUDA 生态差距 |\n| AI 推理芯片 | ~18% | **~30%** | 50% | 推理对精度要求低，国产芯片更快渗透 |\n| AI 服务器整机 | ~65% | **~70%** | 75% | 浪潮/华为已占主导，但 Nvidia GPU 仍需进口 |\n| 液冷散热（冷板式）| ~35% | **~48%** | 65% | 英维克国内主导，出口竞争力弱于 Vertiv |\n| 浸没式液冷 | ~20% | **~32%** | 50% | 核心氟化液仍依赖 Solvay/Chemours |\n| UPS / 不间断电源 | ~40% | **~50%** | 62% | 高端模块化 UPS 技术差距 |\n| 变压器（超高压）| ~55% | **~62%** | 72% | 特变电工已可对标，部分超高压指标差距 |\n| 网络交换机 | ~25% | **~32%** | 45% | 国内方案以太网为主，InfiniBand 完全空白 |\n| 高速连接器 | ~30% | **~40%** | 55% | 立讯精密强势，高端 PCIe Gen5 连接器差距 |\n| 精密空调 | ~45% | **~55%** | 68% | 英维克国内龙头，海外市场差距大 |\n| IDC 运营（全球）| ~8% | **~10%** | 15% | 国内 IDC 企业无全球布局，数据主权限制扩张 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. Nvidia B200 / GB200 NVL72 机柜大规模交付（2025 全年）**\nGB200 NVL72 机柜含 72 颗 B200 GPU，每柜功耗 120kW，是 H100 机柜的 3 倍，必须配套浸没 / 冷板液冷。浪潮信息是 Nvidia 最大 ODM 合作伙伴，配套液冷（英维克）、供电（科华）同步受益。\n受益标的：浪潮信息 000977、英维克 002837、科华数据 002335\n\n**2. 国内智算中心政策建设潮（2025-2026）**\n发改委 / 工信部明确 2025 年国内算力基础设施投资目标，三大运营商（中国移动、电信、联通）合计资本支出超 4000 亿，国内算力需求独立于美国市场。国产 GPU（华为昇腾）在政务云强制采购。\n受益标的：寒武纪 688256、海光信息 688041、光环新网 300383\n\n**3. 液冷渗透率快速提升（2025-2027）**\nAI 服务器功耗密度（每机柜 >30kW）已超过风冷散热上限，液冷成为必然选择。预计 2025 年新建 AI 数据中心液冷渗透率从 15% 升至 35%，2027 年突破 60%。\n受益标的：英维克 002837、申菱环境 301018、高澜股份 300499\n\n**4. 电网 / 变压器扩容（数据中心用电缺口）**\n美国 / 中国 AI 数据中心用电需求导致电网投资提速，变压器交货期从 6 个月延长至 24 个月（供不应求）。中国特变电工已接到海外订单，出口创历史新高。\n受益标的：特变电工 600089、保变电气 600550\n\n**5. 华为昇腾国产 AI 集群验证放量**\n华为昇腾 910B/C + 配套网络（含光迅通信模块）已在百度 / 腾讯 / 中国电信进行万卡集群验证。2025 年规模推广，验证国产算力替代路径，同时拉动国产整个算力基础设施链。\n受益标的：华为供应链（未直接上市）、寒武纪 688256（推理端）"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. Nvidia GPU 出口管制升级（核心风险）**\n美国 2023 年将 H800/A800 列入管制，2024 年出台算力上限规则（<1700 TOPS 规则），进一步压缩可出口给中国的 AI 芯片性能上限。若 B200 / H200 全面禁运，中国 AI 算力扩张依赖华为昇腾，产能受光刻机限制，AI 基础设施建设节奏将大幅放缓。对 A 股影响：短期利空整体 AI 算力投资节奏，中长期利好华为昇腾产业链和国内设备（北方华创 / 中微公司）。\n\n**2. 电力基础设施成为新瓶颈**\n美国 / 中国 AI 数据中心用电增速超出电网扩容速度，部分地区已出现用电审批瓶颈（美国弗吉尼亚州、中国内蒙 / 贵州）。电力不足将直接制约数据中心扩张节奏，变压器、UPS、配电设备需求激增但交货期延长。对 A 股影响：利好特变电工 600089、科华数据 002335，制约数据港 603881、光环新网 300383 的扩张速度。\n\n**3. 氟化液供应链集中（浸没液冷）**\n3M 2024 年退出氟化电子液体业务，全球供应转移至 Solvay（比利时）和 Chemours（美国），中国巨化股份等氟化工企业正在攻克。若浸没式液冷快速放量，氟化液供给可能成为隐性瓶颈，国内替代进度落后将制约液冷交付。对 A 股影响：利好巨化股份 600160、中化蓝天（国产替代逻辑）。\n\n**4. 中东局势 / 红海航运对电气设备交付的影响**\n变压器、UPS、精密空调等大型设备多为海运，绕行好望角增加 4-6 周交付周期和 25-30% 运费。对短期交付节奏有影响，但不改变长期需求。对 A 股影响：轻度影响设备企业的季度收入节奏，不影响年度趋势。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| GPU 世代 | B200（GB200 NVL72 机柜量产）| Rubin 架构（预计 2026 H1 发布）| Rubin Ultra（2027+）|\n| 液冷渗透率 | ~20%（新建数据中心）| ~40%（液冷成为标配）| >65%（风冷退出高密度场景）|\n| 服务器功耗密度 | 30-60kW / 机柜（NVL72=120kW）| 150kW / 机柜（Rubin 时代）| 200kW+（需全浸没）|\n| 国产 AI 芯片 | 昇腾 910C（等效 H100 60-70%）| 昇腾 920 研发（目标追平 B200）| 国产 GPU 万卡集群验证 |\n| HVDC 供电 | 240V HVDC 小规模试点 | 数据中心标准化 HVDC 方案落地 | HVDC 成为新建数据中心标配 |\n| 浸没液冷材料 | 氟化液国产化率 <15% | 巨化 / 中化蓝天规模量产替代 | 国产氟化液渗透率 >40% |\n| 变压器交货期 | 超高压 24 个月交货期（紧缺）| 产能扩充后缓解至 16-18 个月 | 新一代固态变压器（SiC 功率器件驱动）|\n\n---\n\n---"}]},{"id":"05","num":5,"title":"功率半导体","group":"算力核心链","hook":"SiC/GaN/IGBT，新能源车+数据中心供电双驱动","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">功率半导体是<b>电能的\"开关与变压阀门\"</b>——所有充电、变频、逆变、驱动，本质都是让电流\"通—断\"得更快、更省、更耐压。这条线最底层的物理只有一句话：<b>禁带宽度决定了一切</b>。硅（Si）用了几十年已逼近材料极限，碳化硅（SiC）和氮化镓（GaN）这两种<b>宽禁带（WBG）</b>材料，正从根上重写耐压、频率、效率的天花板。下面从能带物理，到三种器件分工，再到 SiC 产业链最硬的卡点，一层层拆。</div>\n\n<h3>一、底层原理：禁带宽度为什么决定一切</h3>\n<p>半导体里，电子要从<b>价带</b>跳到<b>导带</b>才能导电，这道\"门槛\"就是<b>禁带宽度 Eg</b>。Si=1.1eV、SiC=3.3eV、GaN=3.4eV——SiC/GaN 的门槛约是硅的 3 倍。门槛更高，连锁带来四个根本优势：</p>\n<p><b>① 耐高压（击穿电场高约 10 倍）：</b>禁带越宽，材料被电场\"击穿\"导致雪崩电离所需的电场越强（Si≈0.3 MV/cm，SiC/GaN≈3 MV/cm）。要扛住同样的电压，SiC 只需约 1/10 厚的漂移区。<b>漂移区越薄、掺杂越高 → 导通电阻急剧下降</b>（理论上 R<sub>on</sub> 正比于 Eg 的负指数），这是 SiC 最致命的杀招。</p>\n<p><b>② 耐高温（本征载流子少）：</b>禁带宽，高温下被热激发\"误跳\"到导带的载流子少，器件到 200℃ 以上仍能正常工作（硅约 150℃ 就失控），散热设计大幅放宽。</p>\n<p><b>③ 开关频率高：</b>漂移区薄、寄生电容小、无少子拖尾电流（SiC MOSFET / GaN HEMT 是多子器件），<b>开关损耗</b>大降，频率可比 Si IGBT 高一个量级，电源里又重又大的<b>电感、变压器、电容等无源器件就能做小做轻</b>。</p>\n<p><b>④ 高导热（仅 SiC）：</b>SiC 热导率约是 Si 的 3 倍，热量更易导出，进一步支撑高功率密度。</p>\n<p>四点叠加 = <b>更高耐压、更高频、更低损耗、更小更轻更高效</b>。这就是 SiC/GaN 从根上取代硅基的原因。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 250\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">能带对比：禁带越宽 → 击穿电场越高 → 耐压/频率/效率全面跃升</text>\n  <!-- 三组能带柱 -->\n  <g text-anchor=\"middle\">\n   <!-- Si -->\n   <rect x=\"70\" y=\"160\" width=\"120\" height=\"40\" fill=\"#9fb3c8\"/><text x=\"130\" y=\"184\" font-size=\"10\" fill=\"#1a2233\">价带</text>\n   <rect x=\"70\" y=\"70\" width=\"120\" height=\"34\" fill=\"#dbeafe\" stroke=\"#94a3b8\"/><text x=\"130\" y=\"91\" font-size=\"10\" fill=\"#1a2233\">导带</text>\n   <line x1=\"130\" y1=\"160\" x2=\"130\" y2=\"104\" stroke=\"#d23f3f\" stroke-width=\"2\" marker-start=\"url(#dnA)\" marker-end=\"url(#dnB)\"/>\n   <text x=\"130\" y=\"135\" font-size=\"11\" font-weight=\"700\" fill=\"#d23f3f\">1.1eV</text>\n   <text x=\"130\" y=\"222\" font-size=\"12\" font-weight=\"700\" fill=\"#5b6577\">Si 硅</text>\n   <text x=\"130\" y=\"238\" font-size=\"9\" fill=\"#5b6577\">已逼近材料极限</text>\n   <!-- SiC -->\n   <rect x=\"310\" y=\"160\" width=\"120\" height=\"40\" fill=\"#9fb3c8\"/><text x=\"370\" y=\"184\" font-size=\"10\" fill=\"#1a2233\">价带</text>\n   <rect x=\"310\" y=\"70\" width=\"120\" height=\"34\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"370\" y=\"91\" font-size=\"10\" fill=\"#1f5fd6\">导带</text>\n   <line x1=\"370\" y1=\"160\" x2=\"370\" y2=\"104\" stroke=\"#1f5fd6\" stroke-width=\"2.4\" marker-start=\"url(#dnC)\" marker-end=\"url(#dnD)\"/>\n   <text x=\"370\" y=\"135\" font-size=\"11\" font-weight=\"700\" fill=\"#1f5fd6\">3.3eV</text>\n   <text x=\"370\" y=\"222\" font-size=\"12\" font-weight=\"700\" fill=\"#1f5fd6\">SiC 碳化硅</text>\n   <text x=\"370\" y=\"238\" font-size=\"9\" fill=\"#1f5fd6\">高压高频·车规主驱</text>\n   <!-- GaN -->\n   <rect x=\"550\" y=\"160\" width=\"120\" height=\"40\" fill=\"#9fb3c8\"/><text x=\"610\" y=\"184\" font-size=\"10\" fill=\"#1a2233\">价带</text>\n   <rect x=\"550\" y=\"68\" width=\"120\" height=\"34\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/><text x=\"610\" y=\"89\" font-size=\"10\" fill=\"#6a4bbf\">导带</text>\n   <line x1=\"610\" y1=\"160\" x2=\"610\" y2=\"102\" stroke=\"#6a4bbf\" stroke-width=\"2.4\" marker-start=\"url(#dnE)\" marker-end=\"url(#dnF)\"/>\n   <text x=\"610\" y=\"135\" font-size=\"11\" font-weight=\"700\" fill=\"#6a4bbf\">3.4eV</text>\n   <text x=\"610\" y=\"222\" font-size=\"12\" font-weight=\"700\" fill=\"#6a4bbf\">GaN 氮化镓</text>\n   <text x=\"610\" y=\"238\" font-size=\"9\" fill=\"#6a4bbf\">中低压超高频·快充</text>\n  </g>\n  <defs>\n   <marker id=\"dnA\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"0\" orient=\"auto\"><path d=\"M0,7 L3,0 L6,7Z\" fill=\"#d23f3f\"/></marker>\n   <marker id=\"dnB\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"7\" orient=\"auto\"><path d=\"M0,0 L3,7 L6,0Z\" fill=\"#d23f3f\"/></marker>\n   <marker id=\"dnC\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"0\" orient=\"auto\"><path d=\"M0,7 L3,0 L6,7Z\" fill=\"#1f5fd6\"/></marker>\n   <marker id=\"dnD\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"7\" orient=\"auto\"><path d=\"M0,0 L3,7 L6,0Z\" fill=\"#1f5fd6\"/></marker>\n   <marker id=\"dnE\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"0\" orient=\"auto\"><path d=\"M0,7 L3,0 L6,7Z\" fill=\"#6a4bbf\"/></marker>\n   <marker id=\"dnF\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3\" refY=\"7\" orient=\"auto\"><path d=\"M0,0 L3,7 L6,0Z\" fill=\"#6a4bbf\"/></marker>\n  </defs>\n  <text x=\"370\" y=\"52\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5b6577\">禁带宽度 Eg（价带↔导带的能量门槛）</text>\n</svg>\n</div>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">Si 硅基（IGBT / MOSFET）</div>Eg=1.1eV · 击穿场弱 → 漂移区厚、导通电阻高 · 频率受限 · ≤150℃<br><span class=\"pc-s\">成熟、便宜、产能大，但物理天花板已近</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">SiC / GaN 宽禁带（WBG）</div>Eg≈3.3–3.4eV · 击穿场约 10× → 漂移区薄、R<sub>on</sub> 极低 · 高频 · 耐高温<br><span class=\"pc-s\">高效、小型化、轻量化，但材料长晶难、衬底贵</span></div>\n</div>\n\n<h3>二、三种器件分工：各占一块「频率 × 功率」战场</h3>\n<p>没有\"谁取代谁\"，而是按电压、频率、功率分区共存：<b>Si IGBT</b> 守大功率中低频，<b>SiC MOSFET</b> 吃高压高频，<b>GaN HEMT</b> 攻中低压超高频。</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">Si IGBT（绝缘栅双极）</div>双极器件、电导调制 → 大电流低导通压降，但有<b>少子拖尾</b>限制频率。成熟可靠、性价比高。<br><span class=\"pc-s\">光伏逆变 · 工控变频 · 轨道交通 · 充电桩（中低频大功率）</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">SiC MOSFET（多子器件）</div>高击穿场 + 无拖尾 → 高压高频低损耗，是 800V 平台的灵魂。<br><span class=\"pc-s\">新能源车 800V 主驱逆变 · 光伏储能 · 充电桩快充</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">GaN HEMT（二维电子气）</div>异质结形成高迁移率 2DEG，超高开关频率、极小体积。<br><span class=\"pc-s\">手机/笔电快充 · AI 数据中心高效电源 · 5G 射频（GaN-on-SiC）</span></div>\n</div>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 320\" width=\"100%\">\n  <text x=\"370\" y=\"18\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">「频率 × 功率」分区：三种器件的主战场</text>\n  <!-- 坐标轴 -->\n  <line x1=\"80\" y1=\"280\" x2=\"700\" y2=\"280\" stroke=\"#94a3b8\" stroke-width=\"1.6\" marker-end=\"url(#axx)\"/>\n  <line x1=\"80\" y1=\"280\" x2=\"80\" y2=\"40\" stroke=\"#94a3b8\" stroke-width=\"1.6\" marker-end=\"url(#axy)\"/>\n  <defs>\n   <marker id=\"axx\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker>\n   <marker id=\"axy\" markerWidth=\"8\" markerHeight=\"8\" refX=\"3\" refY=\"6\" orient=\"auto\"><path d=\"M0,0 L6,0 L3,6 Z\" fill=\"#94a3b8\"/></marker>\n  </defs>\n  <text x=\"700\" y=\"300\" text-anchor=\"end\" font-size=\"10\" fill=\"#64748b\">开关频率 →（kHz · MHz）</text>\n  <text x=\"74\" y=\"38\" text-anchor=\"end\" font-size=\"10\" fill=\"#64748b\">功率 ↑</text>\n  <!-- IGBT 区（左上：大功率低频） -->\n  <ellipse cx=\"220\" cy=\"120\" rx=\"120\" ry=\"78\" fill=\"#fde8e8\" stroke=\"#d23f3f\" stroke-dasharray=\"4 3\"/>\n  <text x=\"220\" y=\"108\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#b3261e\">Si IGBT</text>\n  <text x=\"220\" y=\"128\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#7a2020\">大功率 · 中低频</text>\n  <text x=\"220\" y=\"144\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a2020\">光伏 / 工控 / 轨交</text>\n  <!-- SiC 区（中上：高压高频） -->\n  <ellipse cx=\"430\" cy=\"150\" rx=\"120\" ry=\"92\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\" stroke-dasharray=\"4 3\"/>\n  <text x=\"448\" y=\"120\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#1f5fd6\">SiC MOSFET</text>\n  <text x=\"448\" y=\"140\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#27406e\">高压 · 高频</text>\n  <text x=\"448\" y=\"156\" text-anchor=\"middle\" font-size=\"9\" fill=\"#27406e\">800V 主驱 / 光储</text>\n  <!-- GaN 区（右下：中低压超高频） -->\n  <ellipse cx=\"600\" cy=\"220\" rx=\"110\" ry=\"70\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\" stroke-dasharray=\"4 3\"/>\n  <text x=\"600\" y=\"208\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#6a4bbf\">GaN HEMT</text>\n  <text x=\"600\" y=\"228\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#4a2e9e\">中低压 · 超高频</text>\n  <text x=\"600\" y=\"244\" text-anchor=\"middle\" font-size=\"9\" fill=\"#4a2e9e\">快充 / 数据中心电源</text>\n  <!-- 重叠提示 -->\n  <text x=\"370\" y=\"306\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5b6577\">三者交界处相互竞争，但整体分区共存——硅基不会消失，宽禁带在高端持续渗透</text>\n</svg>\n</div>\n\n<h3>三、★ SiC 产业链与最硬的卡点：衬底</h3>\n<p>SiC 器件这条链最反直觉的一点：<b>难的不是设计芯片，而是把材料\"长出来\"</b>。从高纯粉到单晶衬底这一步，是整条链良率最低、价值最高、国产差距最大的<b>命门</b>。</p>\n<p><b>① 长晶慢到反人类：</b>硅可以从熔体里高速拉晶；SiC 没有稳定液相，只能用<b>物理气相传输（PVT）</b>在 2000℃+ 高温下让气态硅碳在籽晶上一点点凝结，<b>一周只长几毫米</b>，硅锭一天能拉几米。</p>\n<p><b>② 缺陷难控、良率低：</b>高温下极易产生<b>微管、位错、多型夹杂</b>等致命缺陷，扩径越大缺陷越难压。这是衬底良率上不去、价格降不下来的根因。</p>\n<p><b>③ 衬底 = 最大价值高地：</b>衬底约占 SiC 器件成本的 <b>50%</b>，外延约 25%，是整条链毛利率最高的环节。国产已实现 <b>6 英寸量产</b>（国产化率仍偏低），<b>8 英寸仍在攻关</b>——8 英寸单片可切更多芯片、摊薄成本，是下一代决胜点，国内尚无量产、长晶炉体仍空白。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 240\" width=\"100%\">\n  <text x=\"370\" y=\"18\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"#13233f\">SiC 产业链：粉 → 长晶 → 衬底 → 外延 → 器件 → 模块（越靠上游越是卡点）</text>\n  <g font-size=\"10.5\" text-anchor=\"middle\">\n   <rect x=\"20\" y=\"70\" width=\"100\" height=\"52\" rx=\"8\" fill=\"#eef2f8\" stroke=\"#cbd5e1\"/><text x=\"70\" y=\"92\" font-weight=\"700\">高纯 SiC 粉</text><text x=\"70\" y=\"108\" font-size=\"8.5\" fill=\"#5b6577\">硅碳合成提纯</text>\n   <rect x=\"142\" y=\"70\" width=\"108\" height=\"52\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/><text x=\"196\" y=\"88\" font-weight=\"700\" fill=\"#b3261e\">长晶（卡点）</text><text x=\"196\" y=\"103\" font-size=\"8.5\" fill=\"#7a2020\">PVT单晶炉·一周几mm</text><text x=\"196\" y=\"116\" font-size=\"8.5\" fill=\"#7a2020\">微管/位错难控</text>\n   <rect x=\"272\" y=\"70\" width=\"120\" height=\"52\" rx=\"8\" fill=\"#fde8e8\" stroke=\"#d23f3f\"/><text x=\"332\" y=\"88\" font-weight=\"700\" fill=\"#b3261e\">衬底（最大卡点）</text><text x=\"332\" y=\"103\" font-size=\"8.5\" fill=\"#7a2020\">切磨抛·占成本~50%</text><text x=\"332\" y=\"116\" font-size=\"8.5\" fill=\"#7a2020\">6寸量产·8寸攻关</text>\n   <rect x=\"414\" y=\"70\" width=\"100\" height=\"52\" rx=\"8\" fill=\"#fff7e6\" stroke=\"#d99100\"/><text x=\"464\" y=\"88\" font-weight=\"700\" fill=\"#8a6d1a\">外延片</text><text x=\"464\" y=\"103\" font-size=\"8.5\" fill=\"#8a6d1a\">CVD生长外延层</text><text x=\"464\" y=\"116\" font-size=\"8.5\" fill=\"#8a6d1a\">占成本~25%·均匀性</text>\n   <rect x=\"536\" y=\"70\" width=\"92\" height=\"52\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"582\" y=\"88\" font-weight=\"700\" fill=\"#1f5fd6\">器件制造</text><text x=\"582\" y=\"103\" font-size=\"8.5\" fill=\"#27406e\">MOSFET/SBD</text><text x=\"582\" y=\"116\" font-size=\"8.5\" fill=\"#27406e\">车规IDM</text>\n   <rect x=\"648\" y=\"70\" width=\"80\" height=\"52\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"688\" y=\"88\" font-weight=\"700\" fill=\"#1f5fd6\">模块封装</text><text x=\"688\" y=\"103\" font-size=\"8.5\" fill=\"#27406e\">芯片+散热</text><text x=\"688\" y=\"116\" font-size=\"8.5\" fill=\"#27406e\">→ 整车/电源</text>\n  </g>\n  <g stroke=\"#94a3b8\" stroke-width=\"1.6\" marker-end=\"url(#fmar)\">\n   <line x1=\"120\" y1=\"96\" x2=\"140\" y2=\"96\"/><line x1=\"250\" y1=\"96\" x2=\"270\" y2=\"96\"/><line x1=\"392\" y1=\"96\" x2=\"412\" y2=\"96\"/><line x1=\"514\" y1=\"96\" x2=\"534\" y2=\"96\"/><line x1=\"628\" y1=\"96\" x2=\"646\" y2=\"96\"/>\n  </g>\n  <defs><marker id=\"fmar\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <!-- 国产标注 -->\n  <g font-size=\"9.5\" text-anchor=\"middle\">\n   <line x1=\"332\" y1=\"122\" x2=\"332\" y2=\"158\" stroke=\"#cbd5e1\"/>\n   <text x=\"200\" y=\"178\" fill=\"#1f5fd6\" font-weight=\"700\">衬底/粉国产龙头</text>\n   <line x1=\"464\" y1=\"122\" x2=\"464\" y2=\"158\" stroke=\"#cbd5e1\"/>\n   <text x=\"582\" y=\"178\" fill=\"#1f5fd6\" font-weight=\"700\">器件/模块国产龙头</text>\n  </g>\n  <text x=\"200\" y=\"198\" text-anchor=\"middle\" font-size=\"11\"><tspan class=\"\" fill=\"#1f5fd6\">天岳先进 · 露笑科技</tspan></text>\n  <text x=\"582\" y=\"198\" text-anchor=\"middle\" font-size=\"11\" fill=\"#1f5fd6\">斯达半导 · 华润微 · 士兰微 · 宏微科技</text>\n  <text x=\"370\" y=\"226\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5b6577\">全球衬底高度集中（Wolfspeed / Coherent 等），国产在 6 英寸已量产、8 英寸与海外仍有代差</text>\n</svg>\n</div>\n\n<p style=\"margin-top:6px\">国产代表标的（点击查看详情）：</p>\n<p>\n<b>SiC 粉 / 衬底：</b><span class=\"tk\" onclick=\"openDetail('688234','天岳先进','A股')\">天岳先进</span>（上游粉+衬底一体，国内第一）· <span class=\"tk\" onclick=\"openDetail('002617','露笑科技','A股')\">露笑科技</span><br>\n<b>SiC 器件 / 模块：</b><span class=\"tk\" onclick=\"openDetail('603290','斯达半导','A股')\">斯达半导</span>（车规 IDM 龙头）· <span class=\"tk\" onclick=\"openDetail('688396','华润微','A股')\">华润微</span> · <span class=\"tk\" onclick=\"openDetail('600460','士兰微','A股')\">士兰微</span> · <span class=\"tk\" onclick=\"openDetail('688711','宏微科技','A股')\">宏微科技</span>\n</p>\n\n<h3>四、GaN 与 IGBT 的国产卡位</h3>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">GaN 氮化镓</div>外延以 GaN-on-Si / GaN-on-SiC 为主，难在外延均匀性与可靠性。功率端国产化率仍低（快充约18%），射频端 GaN-on-SiC 爬坡中。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('600703','三安光电','A股')\">三安光电</span>（外延+射频）· 英诺赛科（国内 GaN 功率第一，未上市）· 纳微半导（港股 HK2845）</span></div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">Si IGBT</div>规模最大的功率器件，Infineon 全球约 30% 份额，国产已实现进口替代。卡点在 DBC 陶瓷基板（仍依赖德日）与高端驱动 IC。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('603290','斯达半导','A股')\">斯达半导</span> · <span class=\"tk\" onclick=\"openDetail('688187','时代电气','A股')\">时代电气</span> · <span class=\"tk\" onclick=\"openDetail('688396','华润微','A股')\">华润微</span> · <span class=\"tk\" onclick=\"openDetail('605111','新洁能','A股')\">新洁能</span> · 驱动IC <span class=\"tk\" onclick=\"openDetail('688536','思瑞浦','A股')\">思瑞浦</span></span></div>\n</div>\n\n<h3>五、需求驱动：谁在拉动宽禁带渗透</h3>\n<p>三股力量同时把 SiC/GaN 需求往上顶：</p>\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">新能源车 800V 平台（最大需求）</div>电压从 400V 升到 800V，可降损耗、缩充电时间，但<b>强制采用 SiC 主驱逆变</b>。三电约占功率器件 40% 需求，SiC 渗透率快速爬升。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('603290','斯达半导','A股')\">斯达半导</span> · <span class=\"tk\" onclick=\"openDetail('688234','天岳先进','A股')\">天岳先进</span></span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">光伏 / 储能</div>逆变器追求更高效率与功率密度，IGBT 为主、SiC 在高端渗透，约占 20% 需求。<br><span class=\"pc-s\">国产：<span class=\"tk\" onclick=\"openDetail('300274','阳光电源','A股')\">阳光电源</span> · <span class=\"tk\" onclick=\"openDetail('688390','固德威','A股')\">固德威</span></span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">AI 数据中心高效供电（新增量）</div>AI 服务器电源效率要做到 97%+，<b>强制采用 GaN/SiC 电源模块</b>，是增速最快的全新场景。<br><span class=\"pc-s\">国产：英诺赛科 · 纳微半导（港股）· <span class=\"tk\" onclick=\"openDetail('603290','斯达半导','A股')\">斯达半导</span></span></div>\n</div>\n<p style=\"margin-top:6px\">一句话总结：<b>底层是禁带宽度带来的物理跃升，中层是 Si IGBT / SiC MOSFET / GaN HEMT 的分区共存，最硬的卡点在 SiC 衬底（长晶慢、缺陷难控、占成本一半），而 800V 车、光储、AI 电源三大需求正把这条线持续往上推。</b></p>\n\n</div>\n"},{"t":"一、SiC 碳化硅全链条","k":"group","note":"SiC 衬底是整条链毛利率最高、最核心的卡点环节，Wolfspeed 控制全球约 30% 衬底供给，国产仍在追赶。","chi BT 芯片（设计 + 晶圆制造）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["IGBT 芯片","Infineon (IFX.DE) / ABB (ABB.US) / Mitsubishi Electric (6503.T) / Fuji Electric (6504.T)","斯达半导、时代电气、华润微、宏微科技、士兰微、新洁能","603290、688187、688396、688711、600460、605111","斯达半导国内第一；华润微8英寸IGBT与斯达并列第一阵营"]]},{"t":"3.2 IGBT 功率模块（芯片 + 封装 + 散热）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["IGBT 功率模块","Infineon (IFX.DE) / Semikron (Danfoss) / Hitachi (日本)","斯达半导、时代电气、宏微科技、士兰微","603290、688187、688711、600460","封装模块国产化率约28%，DBC 陶瓷基板仍依赖德日进口"]]},{"t":"3.3 IGBT 驱动 IC（配套）","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["驱动 IC","Infineon (IFX.DE) / TI (TXN) / Onsemi (ON)","思瑞浦","688536","驱动 IC 国产化率约18%，高共模抑制比设计难度大"]]}]},{"t":"四、其他功率器件（补充）","k":"table","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["超结 MOSFET","Infineon (IFX.DE) / Onsemi (ON)","新洁能","605111","超结 MOSFET 国内前三"],["整流 / 保护器件（功率二极管+MOSFET）","Infineon (IFX.DE) / Onsemi (ON)","扬杰科技","300373","功率二极管+MOSFET 综合布局"],["DrMOS / 智能功率级","Infineon (IFX.DE) / MPS (MPWR)","士兰微","600460","服务器供电核心，涨价带动功率半导体链"]]},{"t":"五、下游应用（价值量分布方向性引导）","k":"table","note":"新能源车三电是最大需求（约40%消费），800V 平台强制采用 SiC 主驱拉动需求。","columns":["细分","全球龙头","国产龙头","代码","现状"],"rows":[["新能源车三电（主驱逆变/OBC/DC-DC）","Infineon (IFX.DE) / STMicro (STM)","斯达半导、天岳先进","603290、688234","最大需求约40%消费，800V 主驱转向 SiC"],["光伏逆变器","—","阳光电源、固德威、华为数字能源","300274、688390、未上市","约20%消费，光伏储能拉动 IGBT 采购"],["充电桩","—","—","—","约8%消费，快速增长"],["数据中心供电（SiC/GaN 电源模块）","Navitas (NVTS) / Power Integrations (POWI)","英诺赛科、纳微半导、斯达半导","未上市、HK2845、603290","新增量，AI 服务器电源效率97%+强制采用 SiC/GaN"],["工业变频 / 轨道交通","Infineon (IFX.DE) / Mitsubishi Electric (6503.T)","时代电气","688187","时代电气中车旗下，轨交/电网应用"]]},{"t":"附 · 价值量分布","k":"md","md":"| 环节 | 2024 全球市场规模 | 全球毛利率 | 占链条总价值 % | 代表龙头 |\n|------|----------------|----------|------------|--------|\n| SiC 衬底（6英寸）| ~$18 亿 | 55-65% | **约 17%** | Wolfspeed (WOLF)，斯达半导 603290 上游依赖 |\n| SiC 外延片 | ~$12 亿 | 45-55% | **约 10%** | Wolfspeed、Coherent (COHR) |\n| SiC 器件（MOSFET/SBD）| ~$35 亿 | 42-55% | **约 27%** | Infineon (IFX.DE)、STMicro (STM) |\n| IGBT 芯片 + 模块 | ~$55 亿 | 32-45% | **约 28%** | Infineon (IFX.DE)、斯达半导 603290 |\n| GaN 功率器件 | ~$15 亿 | 45-58% | **约 12%** | Navitas (NVTS)、英诺赛科（未上市）|\n| SiC / IGBT 封装材料 | ~$8 亿 | 35-42% | **约 5%** | Heraeus（德）、贺利氏 |\n| 驱动 IC | ~$5 亿 | 55-65% | **约 5%** | Infineon、TI (TXN) |\n\n> **核心结论**：SiC 衬底是整条链毛利率最高的环节，Wolfspeed 一家控制全球约 30% 衬底供给；IGBT 模块绝对规模最大，Infineon 跨 SiC + IGBT 双线布局，是全球功率半导体最强综合体（市占约 28%）。国内斯达半导在 IGBT 已实现进口替代，SiC 仍在追赶中。"},{"t":"附 · 国产化率","k":"md","md":"| 子赛道 | 2023 年 | 2025 年（估算）| 2027 年目标 | 主要卡点 |\n|--------|--------|--------------|----------|--------|\n| SiC 衬底（6英寸）| ~8% | **~16%** | 28% | 晶体生长微管密度，良率与 Wolfspeed 差距 |\n| SiC 衬底（8英寸）| ~0% | **~2%** | 8% | 设备不足，8英寸炉体国内空白 |\n| SiC 外延片 | ~10% | **~18%** | 32% | MOCVD 外延均匀性，氮浓度控制 |\n| SiC MOSFET（消费级）| ~10% | **~20%** | 35% | 栅氧可靠性（BTI 偏置温度不稳定性）|\n| SiC MOSFET（车规 AEC-Q101）| ~5% | **~12%** | 25% | 车规认证周期 3-5 年，高温可靠性 |\n| IGBT（工业 / 消费）| ~22% | **~35%** | 50% | 斯达半导已可替代，继续向大功率突破 |\n| IGBT（车规 / 新能源车）| ~12% | **~22%** | 38% | 斯达半导比亚迪供应链认证突破中 |\n| GaN 快充器件 | ~8% | **~18%** | 32% | 英诺赛科国内主导，出口竞争力待验证 |\n| GaN 射频（5G 基站）| ~15% | **~25%** | 40% | 三安光电 GaN-on-SiC 爬坡中 |\n| IGBT 封装模块 | ~18% | **~28%** | 45% | 陶瓷基板（DBC）仍依赖德日进口 |\n| 功率模块驱动 IC | ~10% | **~18%** | 30% | 高共模抑制比（CMRR）设计难度 |"},{"t":"附 · 核心催化剂","k":"md","md":"**1. 新能源车 SiC 主驱渗透率快速提升（最强驱动）**\n2024 年中国新能源车 SiC 渗透率约 25%（800V 平台强制采用），预计 2026 年达 45%。每辆 800V 车用 SiC 模块价值量约 $300-500（vs 硅基 IGBT $100-150）。比亚迪、理想、小鹏的主驱系统批量转向 SiC。\n受益标的：斯达半导 603290、天岳先进 688234\n\n**2. 光伏储能 IGBT 超级周期**\n全球光伏装机 2024 年超 500GW，每 1GW 光伏对应约 500 万颗 IGBT。储能逆变也是 IGBT 重要需求。国内阳光电源、华为数字能源的扩产直接拉动国内 IGBT 采购。\n受益标的：斯达半导 603290、宏微科技 688711、时代电气 688187\n\n**3. 天岳先进 6 英寸 SiC 衬底良率突破**\n天岳先进 2024 年 6 英寸 SiC 良率持续提升（目标>80%），一旦规模产出达到 Wolfspeed 同等水平，将打破国内衬底依赖进口格局（目前国内 SiC 器件企业仍进口约 60% 衬底）。\n受益标的：天岳先进 688234、斯达半导 603290\n\n**4. AI 数据中心高效供电拉动 SiC / GaN 需求**\nAI 服务器电源效率要求从 94% 提升到 97%+，强制使用 SiC/GaN 高效电源模块，取代传统硅基 IGBT 方案。数据中心电源是 GaN 功率最快速增长的新应用。\n受益标的：英诺赛科（未上市）、纳微半导（港股 2845）、斯达半导 603290\n\n**5. Wolfspeed 经营困境带来的国产机会窗口**\nWolfspeed 2024-2025 年面临巨额亏损和债务危机（资产负债率超 90%），扩产节奏被迫放缓，全球 SiC 衬底供给产生缺口。国内 SiC 器件企业有机会加快导入国产衬底。\n受益标的：天岳先进 688234、露笑科技 002617"},{"t":"附 · 地缘政治风险","k":"md","md":"**1. SiC 衬底美国供应风险（Wolfspeed 为美企）**\n若美国将 SiC 衬底纳入出口管制（目前尚未，但存在政策风险），国内 SiC 器件企业（斯达半导 80%+ 衬底依赖进口）将面临原材料断供。这是功率半导体产业链最重要的地缘政治尾部风险。对 A 股影响：短期利空斯达半导，中长期利好天岳先进。\n\n**2. 中国反制：碳化硅粉列入战略管控**\nSiC 原料粉生产中国有一定优势（石英砂资源丰富）。未来若中国将 SiC 原料纳入出口管制范畴（参考镓锗管制逻辑），将对全球 SiC 供应链产生影响。\n\n**3. 中东局势影响新能源车销售节奏**\n高油价环境利好新能源车渗透，反之低油价压制需求。中东冲突导致油价波动，间接影响新能源车销量预期，进而影响 SiC 需求节奏。\n\n**4. 德日欧洲功率半导体企业技术优势**\nInfineon（德）在 IGBT 和 SiC 双线布局，技术领先 3-5 年。日本 Rohm 在 SiC 可靠性技术积累深。欧日企业不在美国直接管制范围，但受美国压力可能限制对中国先进节点供货。"},{"t":"附 · 技术路线图","k":"md","md":"| 技术方向 | 2025 年现状 | 2026 年关键节点 | 2027-2028 年展望 |\n|---------|----------|--------------|---------------|\n| SiC 衬底尺寸 | 6英寸主流，8英寸 Wolfspeed 爬坡 | 8英寸量产（国际）；国内 6英寸良率>85% | 国内 8英寸 SiC 衬底试产 |\n| SiC 器件耐压 | 1200V 主流（新能源车）| 1700V SiC 模块（工业/储能）| 3300V SiC（高压输变电）|\n| IGBT 技术代 | IGBT7（Infineon 最新）| IGBT8 预研 | 混合 SiC+Si 模块普及 |\n| GaN 工作频率 | 650V GaN，1-3MHz | 1200V GaN 器件商业化 | GaN 全面替代 Si MOSFET（<650V 场景）|\n| 封装进步 | 传统 DBC 陶瓷基板 | AMB 活性金属钎焊基板普及 | 双面散热模块（功率密度×2）|\n| 国内 SiC 车规认证 | 斯达半导进入比亚迪/长城 | 更多主机厂 SiC 供应链开放 | 国产 SiC 出海欧美 Tier-1 供应商 |\n\n---\n\n---"}]},{"id":"06","num":6,"title":"PCB 及上游材料","group":"算力核心链","hook":"高速板+铜箔+玻纤布，AI 服务器层数价值齐升","blocks":[{"t":"🔬 底层原理与构成","k":"html","html":"<div class=\"pr\">\n\n<div class=\"pr-lead\">很多人把 PCB 当成一块\"绿色的板子\"。但真正要看懂这条主线，得学会<b>把 PCB 切开看</b>——它是所有电子元件的<b>承载 + 互连地基</b>，往里看是一层层叠起来的材料（铜箔 / 玻纤布 / 树脂 / 基材），往外看是一整条产业链。AI 服务器之所以让这条线价值暴涨，根子就在这些<b>看不见的内层材料</b>上。下面从\"PCB 是什么\"，到\"切开看每一层\"，再到\"为什么 AI 让它涨 4 倍\"，逐层拆。</div>\n\n<h3>一、PCB 是什么：电子世界的\"地基\"</h3>\n<p>PCB（Printed Circuit Board，印刷电路板）的作用只有两件：<b>把元件固定住（承载）</b>，<b>把它们之间的电信号连起来（互连）</b>。芯片、电容、连接器都焊在它上面，信号靠板内一层层的<b>铜线路</b>在不同器件之间穿梭。所以一块 PCB 既是\"桌子\"也是\"公路网\"。它本身不算（不是芯片），但<b>算得快不快、信号糊不糊，很大程度取决于这块板的材料和层数</b>——这就是为什么一块板要切开，一层一层地看价值。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 120\" width=\"100%\">\n  <g font-size=\"11\" text-anchor=\"middle\">\n  <rect x=\"20\" y=\"42\" width=\"150\" height=\"48\" rx=\"8\" fill=\"#eef2f8\" stroke=\"#cbd5e1\"/><text x=\"95\" y=\"64\" font-weight=\"700\">上游材料</text><text x=\"95\" y=\"80\" font-size=\"9\" fill=\"#5b6577\">铜/玻纤/树脂</text>\n  <rect x=\"220\" y=\"42\" width=\"150\" height=\"48\" rx=\"8\" fill=\"#e8f4ec\" stroke=\"#27613f\"/><text x=\"295\" y=\"64\" font-weight=\"700\">CCL 覆铜板</text><text x=\"295\" y=\"80\" font-size=\"9\" fill=\"#3a6b4d\">PCB 核心基材</text>\n  <rect x=\"420\" y=\"42\" width=\"150\" height=\"48\" rx=\"8\" fill=\"#e8f0fe\" stroke=\"#1f5fd6\"/><text x=\"495\" y=\"64\" font-weight=\"700\">PCB 成品</text><text x=\"495\" y=\"80\" font-size=\"9\" fill=\"#27406e\">钻孔/镀铜/压合</text>\n  <rect x=\"620\" y=\"42\" width=\"100\" height=\"48\" rx=\"8\" fill=\"#f5f3fc\" stroke=\"#6a4bbf\"/><text x=\"670\" y=\"64\" font-weight=\"700\">整机</text><text x=\"670\" y=\"80\" font-size=\"9\" fill=\"#4a2e9e\">AI 服务器</text>\n  </g>\n  <g stroke=\"#94a3b8\" stroke-width=\"1.6\" marker-end=\"url(#m6a)\">\n   <line x1=\"170\" y1=\"66\" x2=\"218\" y2=\"66\"/><line x1=\"370\" y1=\"66\" x2=\"418\" y2=\"66\"/><line x1=\"570\" y1=\"66\" x2=\"618\" y2=\"66\"/>\n  </g>\n  <defs><marker id=\"m6a\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#94a3b8\"/></marker></defs>\n  <text x=\"370\" y=\"24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#27613f\" font-weight=\"700\">价值越往上游越集中、毛利越高：成品板量大但薄利，基材与铜箔才是利润高地</text>\n</svg>\n</div>\n\n<h3>二、★ 把 PCB 切开看：从上到下的多层叠构</h3>\n<p>这是这条主线最该记住的一张图。把一块高速 PCB 用刀切开，从最上面的<b>绿油</b>往下看，是一层层<b>铜箔 → 玻纤布 → 树脂 → 基材</b>反复叠压、再用<b>过孔</b>上下打通。每一层都对应一种材料、一个毛利水平、一批厂商——<b>越是\"低损耗\"的内层材料，越贵、越卡脖子</b>。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 470\" width=\"100%\">\n  <text x=\"370\" y=\"20\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"#13233f\">PCB 分层剖面爆炸图（每层标：作用 / 毛利 / 代表公司）</text>\n\n  <!-- 左侧层叠主体 x:60~440 -->\n  <!-- ① 阻焊层 绿油 -->\n  <rect x=\"60\" y=\"44\" width=\"380\" height=\"26\" rx=\"3\" fill=\"#27613f\" stroke=\"#1b4a2f\"/>\n  <text x=\"250\" y=\"61\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#eaf5ee\" font-weight=\"700\">① 阻焊层（绿油 Solder Mask）</text>\n\n  <!-- ② 铜箔/线路层 -->\n  <rect x=\"60\" y=\"74\" width=\"380\" height=\"22\" fill=\"#e8b923\" stroke=\"#b5901a\"/>\n  <g fill=\"#c79a14\"><rect x=\"80\" y=\"79\" width=\"40\" height=\"12\"/><rect x=\"150\" y=\"79\" width=\"60\" height=\"12\"/><rect x=\"250\" y=\"79\" width=\"40\" height=\"12\"/><rect x=\"330\" y=\"79\" width=\"70\" height=\"12\"/></g>\n  <text x=\"250\" y=\"90\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#5a4708\" font-weight=\"700\">② 铜箔层 / 线路层（HVLP 低粗糙度铜箔）</text>\n\n  <!-- ③ 玻纤布 -->\n  <rect x=\"60\" y=\"100\" width=\"380\" height=\"22\" fill=\"#fff3d1\" stroke=\"#d99100\"/>\n  <g stroke=\"#d9a93a\" stroke-width=\"0.8\"><line x1=\"78\" y1=\"100\" x2=\"78\" y2=\"122\"/><line x1=\"110\" y1=\"100\" x2=\"110\" y2=\"122\"/><line x1=\"142\" y1=\"100\" x2=\"142\" y2=\"122\"/><line x1=\"174\" y1=\"100\" x2=\"174\" y2=\"122\"/><line x1=\"206\" y1=\"100\" x2=\"206\" y2=\"122\"/><line x1=\"238\" y1=\"100\" x2=\"238\" y2=\"122\"/><line x1=\"270\" y1=\"100\" x2=\"270\" y2=\"122\"/><line x1=\"302\" y1=\"100\" x2=\"302\" y2=\"122\"/><line x1=\"334\" y1=\"100\" x2=\"334\" y2=\"122\"/><line x1=\"366\" y1=\"100\" x2=\"366\" y2=\"122\"/><line x1=\"398\" y1=\"100\" x2=\"398\" y2=\"122\"/><line x1=\"430\" y1=\"100\" x2=\"430\" y2=\"122\"/><line x1=\"60\" y1=\"106\" x2=\"440\" y2=\"106\"/><line x1=\"60\" y1=\"116\" x2=\"440\" y2=\"116\"/></g>\n  <text x=\"250\" y=\"115\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#8a6d1a\" font-weight=\"700\">③ 电子布层（玻纤布 / 低损耗 Q 布）</text>\n\n  <!-- ④ 树脂层 -->\n  <rect x=\"60\" y=\"126\" width=\"380\" height=\"20\" fill=\"#ede7f6\" stroke=\"#6a4bbf\"/>\n  <text x=\"250\" y=\"140\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#4a2e9e\" font-weight=\"700\">④ 树脂层（碳氢 / PTFE，低 Df / Dk）</text>\n\n  <!-- ⑤ CCL 基材（玻纤+树脂+铜，合称覆铜板，重复堆叠表示芯板） -->\n  <rect x=\"60\" y=\"150\" width=\"380\" height=\"120\" rx=\"3\" fill=\"#e8f4ec\" stroke=\"#27613f\"/>\n  <text x=\"250\" y=\"167\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#1b4a2f\" font-weight=\"700\">⑤ 基材层 CCL 覆铜板（铜箔+玻纤布+树脂压合 = 整板地基）</text>\n  <!-- 内层重复芯板示意 -->\n  <g>\n   <rect x=\"80\" y=\"178\" width=\"340\" height=\"9\" fill=\"#e8b923\"/><rect x=\"80\" y=\"187\" width=\"340\" height=\"14\" fill=\"#fff3d1\" stroke=\"#d9a93a\" stroke-width=\"0.5\"/><rect x=\"80\" y=\"201\" width=\"340\" height=\"9\" fill=\"#e8b923\"/>\n   <rect x=\"80\" y=\"214\" width=\"340\" height=\"9\" fill=\"#e8b923\"/><rect x=\"80\" y=\"223\" width=\"340\" height=\"14\" fill=\"#fff3d1\" stroke=\"#d9a93a\" stroke-width=\"0.5\"/><rect x=\"80\" y=\"237\" width=\"340\" height=\"9\" fill=\"#e8b923\"/>\n   <text x=\"250\" y=\"261\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#3a6b4d\">…多层芯板（core）反复压合，高速板可达 40-60+ 层…</text>\n  </g>\n\n  <!-- ⑥ 过孔/钻孔：穿透整叠的金色镀铜孔 -->\n  <g>\n   <rect x=\"150\" y=\"74\" width=\"12\" height=\"196\" rx=\"2\" fill=\"none\" stroke=\"#e8b923\" stroke-width=\"3\"/>\n   <rect x=\"150\" y=\"74\" width=\"12\" height=\"196\" rx=\"2\" fill=\"#fff6d6\" opacity=\"0.35\"/>\n   <rect x=\"330\" y=\"74\" width=\"12\" height=\"196\" rx=\"2\" fill=\"none\" stroke=\"#e8b923\" stroke-width=\"3\"/>\n   <rect x=\"330\" y=\"74\" width=\"12\" height=\"196\" rx=\"2\" fill=\"#fff6d6\" opacity=\"0.35\"/>\n  </g>\n  <text x=\"246\" y=\"288\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#8a6d1a\" font-weight=\"700\">⑥ 过孔 / 钻孔（钻针钻孔 + 孔壁镀铜 → 层间导通）</text>\n\n  <!-- 右侧引线标注 x:460~735 -->\n  <g font-size=\"9.5\">\n   <!-- ① -->\n   <line x1=\"440\" y1=\"57\" x2=\"470\" y2=\"57\" stroke=\"#27613f\"/>\n   <text x=\"474\" y=\"54\" fill=\"#1b4a2f\" font-weight=\"700\">阻焊绿油</text>\n   <text x=\"474\" y=\"66\" fill=\"#5b6577\">绝缘防氧化 · 毛利低 · 油墨厂配套</text>\n\n   <!-- ② -->\n   <line x1=\"440\" y1=\"85\" x2=\"470\" y2=\"85\" stroke=\"#b5901a\"/>\n   <text x=\"474\" y=\"82\" fill=\"#5a4708\" font-weight=\"700\">铜箔层（毛利 50-60%）</text>\n   <text x=\"474\" y=\"94\" fill=\"#5b6577\">Rz 越低高速损耗越小（趋肤效应）</text>\n  </g>\n\n  <!-- 国产标的（铜箔） -->\n  <text x=\"474\" y=\"106\" font-size=\"9.5\" fill=\"#1f5fd6\">国产：<tspan font-weight=\"700\">铜冠铜箔 / 诺德 / 德福 / 嘉元</tspan></text>\n\n  <g font-size=\"9.5\">\n   <!-- ③ -->\n   <line x1=\"440\" y1=\"111\" x2=\"470\" y2=\"124\" stroke=\"#d99100\"/>\n   <text x=\"474\" y=\"124\" fill=\"#8a6d1a\" font-weight=\"700\">玻纤布（普通30-35%/特种60%+）</text>\n   <text x=\"474\" y=\"136\" fill=\"#5b6577\">增强骨架 · 低损耗 Q 布降高频损耗</text>\n   <text x=\"474\" y=\"148\" fill=\"#1f5fd6\">国产：<tspan font-weight=\"700\">宏和科技 / 中国巨石</tspan></text>\n\n   <!-- ④ -->\n   <line x1=\"440\" y1=\"136\" x2=\"470\" y2=\"166\" stroke=\"#6a4bbf\"/>\n   <text x=\"474\" y=\"166\" fill=\"#4a2e9e\" font-weight=\"700\">树脂层（决定 Df/Dk）</text>\n   <text x=\"474\" y=\"178\" fill=\"#5b6577\">碳氢 / PTFE 低介电低损耗</text>\n   <text x=\"474\" y=\"190\" fill=\"#1f5fd6\">国产：<tspan font-weight=\"700\">东材科技 / 圣泉集团</tspan></text>\n\n   <!-- ⑤ -->\n   <line x1=\"440\" y1=\"210\" x2=\"470\" y2=\"214\" stroke=\"#27613f\"/>\n   <text x=\"474\" y=\"214\" fill=\"#1b4a2f\" font-weight=\"700\">CCL 覆铜板（毛利约 35%）</text>\n   <text x=\"474\" y=\"226\" fill=\"#5b6577\">PCB 最核心基材 = 整板地基</text>\n   <text x=\"474\" y=\"238\" fill=\"#1f5fd6\">国产：<tspan font-weight=\"700\">生益科技 / 南亚新材</tspan></text>\n\n   <!-- ⑥ -->\n   <line x1=\"350\" y1=\"270\" x2=\"470\" y2=\"262\" stroke=\"#e8b923\"/>\n   <text x=\"474\" y=\"262\" fill=\"#8a6d1a\" font-weight=\"700\">过孔 / 钻孔</text>\n   <text x=\"474\" y=\"274\" fill=\"#5b6577\">钻针钻孔实现层间导通</text>\n   <text x=\"474\" y=\"286\" fill=\"#1f5fd6\">国产钻针：<tspan font-weight=\"700\">鼎泰高科</tspan></text>\n  </g>\n\n  <!-- 底部一句话 -->\n  <line x1=\"60\" y1=\"306\" x2=\"680\" y2=\"306\" stroke=\"#e4e7ec\"/>\n  <text x=\"60\" y=\"328\" font-size=\"10.5\" fill=\"#13233f\" font-weight=\"700\">同一块板，越往内层、越\"低损耗\"的材料越贵越卡脖子：</text>\n  <text x=\"60\" y=\"346\" font-size=\"10\" fill=\"#5b6577\">绿油&amp;成品板薄利（22-35%）→ CCL（~35%）→ 铜箔（50-60%）→ 特种玻纤布/高频树脂（60%+，且高度依赖日美）。</text>\n\n  <!-- 可点击国产标的（合法 A 股代码，已与 mainline06.json 核对） -->\n  <foreignObject x=\"60\" y=\"360\" width=\"620\" height=\"100\">\n    <div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"font-size:11px;line-height:1.9;color:#1f5fd6;\">\n      <b style=\"color:#13233f;\">国产标的（点击查看）：</b>\n      <span class=\"tk\" onclick=\"openDetail('600183','生益科技','A股')\">生益科技</span> ·\n      <span class=\"tk\" onclick=\"openDetail('688519','南亚新材','A股')\">南亚新材</span> ·\n      <span class=\"tk\" onclick=\"openDetail('603186','华正新材','A股')\">华正新材</span> ·\n      <span class=\"tk\" onclick=\"openDetail('600110','诺德股份','A股')\">诺德股份</span> ·\n      <span class=\"tk\" onclick=\"openDetail('000630','铜陵有色','A股')\">铜陵有色（铜冠铜箔）</span> ·\n      <span class=\"tk\" onclick=\"openDetail('301511','德福科技','A股')\">德福科技</span> ·\n      <span class=\"tk\" onclick=\"openDetail('688388','嘉元科技','A股')\">嘉元科技</span> ·\n      <span class=\"tk\" onclick=\"openDetail('600176','中国巨石','A股')\">中国巨石</span> ·\n      <span class=\"tk\" onclick=\"openDetail('301377','鼎泰高科','A股')\">鼎泰高科</span>\n    </div>\n  </foreignObject>\n</svg>\n</div>\n<p style=\"font-size:10.5px;color:#64748b;margin-top:-2px\">注：宏和科技、东材科技、圣泉集团为图中提及的相关材料厂商，因不在本主线标的库（mainline06.json）内未做代码标注，避免编造代码。</p>\n\n<h3>三、★ 为什么 AI 服务器让 PCB 价值暴涨 4 倍</h3>\n<p>同样叫\"主板\"，AI 服务器的 PCB 和普通服务器完全不是一个量级。原因全在上面那张剖面图里：<b>层更多、材料更贵、铜箔更光滑、工艺更精细</b>。这四件事叠加，把单板价值从 <b>$150-300 拉到 $800-1200</b>。</p>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card blue\"><div class=\"pc-t\">层数：8-16 → 40-60+</div>信号通道暴增，要在更厚的叠层里布更多内层线路与过孔，<b>压合 / 钻孔难度指数上升</b>。<br><span class=\"pc-s\">层数越多 → 良率越难、单板越贵</span></div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">高速材料：低 Df / Dk</div>112G/224G 信号在普通 FR-4 里会严重衰减，必须换<b>碳氢 / PTFE 树脂 + 低损耗 Q 布</b>。<br><span class=\"pc-s\">材料介电损耗直接决定信号糊不糊</span></div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">HVLP 铜箔：Rz &lt; 1.5μm</div>铜箔表面越粗糙，高频电流走表面（趋肤效应）损耗越大；AI 板要求<b>极低粗糙度铜箔</b>降损耗。<br><span class=\"pc-s\">这是 AI 服务器对铜箔的核心要求</span></div>\n  <div class=\"pr-card red\"><div class=\"pc-t\">mSAP 高阶 HDI 工艺</div>线宽线距做到极细，需要<b>半加成法 mSAP</b> 与高阶 HDI，设备与良率门槛高。<br><span class=\"pc-s\">工艺等级跳档，普通厂做不了</span></div>\n</div>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 150\" width=\"100%\">\n  <text x=\"12\" y=\"20\" font-size=\"11.5\" font-weight=\"700\" fill=\"#13233f\">单板价值对比（AI 服务器 PCB vs 普通服务器 PCB）</text>\n  <g font-size=\"11\">\n   <text x=\"12\" y=\"58\">普通服务器板</text>\n   <rect x=\"130\" y=\"46\" width=\"90\" height=\"18\" rx=\"3\" fill=\"#94a3b8\"/>\n   <text x=\"228\" y=\"60\" fill=\"#5b6577\" font-weight=\"700\">$150–300 · 8-16层 · FR-4 · STD/LP 铜箔</text>\n\n   <text x=\"12\" y=\"98\">AI 服务器板</text>\n   <rect x=\"130\" y=\"86\" width=\"420\" height=\"18\" rx=\"3\" fill=\"#d23f3f\"/>\n   <text x=\"558\" y=\"100\" fill=\"#d23f3f\" font-weight=\"700\">$800–1200</text>\n   <text x=\"130\" y=\"122\" font-size=\"9.5\" fill=\"#7a2020\">40-60+层 · 低 Df/Dk 高速材料 · HVLP 铜箔(Rz&lt;1.5μm) · mSAP 高阶 HDI</text>\n  </g>\n  <text x=\"12\" y=\"142\" font-size=\"10\" fill=\"#64748b\">价值跃升约 4 倍，且增量几乎全部落在\"内层材料 + 高阶工艺\"上 —— 正是国产卡点所在。</text>\n</svg>\n</div>\n\n<h3>四、卡点：越往内层、越\"低损耗\"，越被日美垄断</h3>\n<p>把剖面图反过来看就是一张\"卡点地图\"：成品制造国产化已不低，但<b>越靠近材料、越高频低损耗的环节，国产化率越低</b>。这几个环节才是这条主线真正的弹性与风险所在。</p>\n\n<div class=\"diagram\">\n<svg viewBox=\"0 0 740 200\" width=\"100%\">\n  <text x=\"12\" y=\"18\" font-size=\"11.5\" font-weight=\"700\" fill=\"#13233f\">各环节国产化率（越短越卡脖子）</text>\n  <g font-size=\"10.5\">\n   <text x=\"12\" y=\"44\">PCB 成品制造</text>\n   <rect x=\"150\" y=\"34\" width=\"200\" height=\"14\" rx=\"3\" fill=\"#1f5fd6\"/><text x=\"356\" y=\"45\" fill=\"#1f5fd6\" font-weight=\"700\">~50%（沪电/深南有优势）</text>\n\n   <text x=\"12\" y=\"68\">标准 FR-4 CCL</text>\n   <rect x=\"150\" y=\"58\" width=\"232\" height=\"14\" rx=\"3\" fill=\"#27613f\"/><text x=\"388\" y=\"69\" fill=\"#27613f\" font-weight=\"700\">~58%（生益全球前三）</text>\n\n   <text x=\"12\" y=\"92\">高速 CCL（M6/M7）</text>\n   <rect x=\"150\" y=\"82\" width=\"88\" height=\"14\" rx=\"3\" fill=\"#d99100\"/><text x=\"244\" y=\"93\" fill=\"#8a6d1a\" font-weight=\"700\">~22%（高 Tg 树脂配方卡点）</text>\n\n   <text x=\"12\" y=\"116\">HVLP 极薄铜箔</text>\n   <rect x=\"150\" y=\"106\" width=\"80\" height=\"14\" rx=\"3\" fill=\"#d99100\"/><text x=\"236\" y=\"117\" fill=\"#8a6d1a\" font-weight=\"700\">~20%（Rz 控制难）</text>\n\n   <text x=\"12\" y=\"140\">高频玻纤布(NE/D 玻)</text>\n   <rect x=\"150\" y=\"130\" width=\"60\" height=\"14\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"216\" y=\"141\" fill=\"#d23f3f\" font-weight=\"700\">~15%（日本 Nittobo 近垄断）</text>\n\n   <text x=\"12\" y=\"164\">高频 PTFE CCL</text>\n   <rect x=\"150\" y=\"154\" width=\"24\" height=\"14\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"180\" y=\"165\" fill=\"#d23f3f\" font-weight=\"700\">~6%（Rogers &gt;50%，几乎不可替代）</text>\n\n   <text x=\"12\" y=\"188\">碳氢/PTFE/BT/CE 树脂 · ABF 载板</text>\n   <rect x=\"150\" y=\"178\" width=\"12\" height=\"14\" rx=\"3\" fill=\"#d23f3f\"/><text x=\"168\" y=\"189\" fill=\"#d23f3f\" font-weight=\"700\">~0-4%（味之素 ABF 全球垄断，A股空白）</text>\n  </g>\n</svg>\n</div>\n\n<div class=\"pr-grid\">\n  <div class=\"pr-card red\"><div class=\"pc-t\">最硬卡点（国产空白）</div>高频 PTFE / 碳氢树脂、低损耗 Q 布（NE/D 玻）、<b>ABF 载板</b>（味之素垄断）、BT/CE 树脂 —— 越往内层、越高频，越是日美专利壁垒。</div>\n  <div class=\"pr-card blue\"><div class=\"pc-t\">国产突破口</div>CCL（<span class=\"tk\" onclick=\"openDetail('600183','生益科技','A股')\">生益科技</span>/<span class=\"tk\" onclick=\"openDetail('688519','南亚新材','A股')\">南亚新材</span>）、HVLP 铜箔（<span class=\"tk\" onclick=\"openDetail('688388','嘉元科技','A股')\">嘉元科技</span>/<span class=\"tk\" onclick=\"openDetail('301511','德福科技','A股')\">德福科技</span>）、玻纤（<span class=\"tk\" onclick=\"openDetail('600176','中国巨石','A股')\">中国巨石</span>）、微钻（<span class=\"tk\" onclick=\"openDetail('301377','鼎泰高科','A股')\">鼎泰高科</span>）正逐层向上突围。</div>\n</div>\n\n</div>\n"},{"t":"一、PCB 制造","k":"group","note":"PCB 成品制造体量最大（约 45% 价值），但毛利率仅 22-35%；AI 服务器高速 PCB 是最直接的需求驱动。","children":[{"t":"1
